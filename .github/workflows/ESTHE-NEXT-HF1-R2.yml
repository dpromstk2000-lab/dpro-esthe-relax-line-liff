# DPRO エステ LINE
# 完成後ホットフィックス修正版: ESTHE-NEXT-HF1-R2
# PC・iPad・スタッフ・system-checkの4画面を修正・実ブラウザ検査
# current_step: COMPLETE維持 / final_version: DPRO-ESTHE-NEXT-1.0.1
# Worker / Supabase / API変更なし

name: "DPRO ESTHE NEXT-HF1-R2 - Four Screen Admin Clear Fix"

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ESTHE-NEXT-HF1-R2.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: "dpro-esthe-next"
  cancel-in-progress: false

env:
  WORKFLOW_FILE: ".github/workflows/ESTHE-NEXT-HF1-R2.yml"
  BACKUP_TAG_PREFIX: "backup-esthe-before-next-hf1-r2"
  FRONT_BASE: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff"

jobs:
  esthe-next-hf1-r2:
    name: "Fix and verify admin clear on all four screens"
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: "Checkout ESTHE repository with history"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: "Configure Git identity"
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "DPRO NEXT Actions"
          git config user.email "actions@users.noreply.github.com"

      - name: "Confirm COMPLETE baseline and four target files"
        shell: bash
        run: |
          set -Eeuo pipefail
          for file in owner.html owner-ipad.html staff.html system-check.html; do test -f "$file"; done
          grep -q '^current_step: COMPLETE$' .dpro-next/esthe-step-state.yml
          grep -Eq '^final_version: "DPRO-ESTHE-NEXT-1\.0\.(0|1)"$' .dpro-next/esthe-step-state.yml

      - name: "Create change-before backup tag"
        shell: bash
        run: |
          set -Eeuo pipefail
          CHANGE_BEFORE_SHA="$GITHUB_SHA"
          mapfile -t HEAD_FILES < <(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          if [[ "${#HEAD_FILES[@]}" -eq 1 && "${HEAD_FILES[0]}" == "$WORKFLOW_FILE" ]]; then CHANGE_BEFORE_SHA="$(git rev-parse "${GITHUB_SHA}^")"; fi
          BASE_TAG="${BACKUP_TAG_PREFIX}-$(TZ=Asia/Tokyo date +%Y%m%d)"
          BACKUP_TAG="$BASE_TAG"
          if git ls-remote --exit-code --tags origin "refs/tags/$BACKUP_TAG" >/dev/null 2>&1; then BACKUP_TAG="${BASE_TAG}-run-${GITHUB_RUN_ID}"; fi
          git tag -a "$BACKUP_TAG" "$CHANGE_BEFORE_SHA" -m "DPRO ESTHE before NEXT-HF1-R2"
          git push origin "refs/tags/$BACKUP_TAG"
          echo "BACKUP_TAG=$BACKUP_TAG" >> "$GITHUB_ENV"

      - name: "Apply four-screen admin-code clear fix"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<HF1-R2-apply>","exec"))'

      - name: "Run four-screen source validation"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<HF1-R2-static>","exec"))'
          ruby -e 'require "yaml"; YAML.parse_file(ARGV[0]); puts "YML OK"' "$WORKFLOW_FILE"

      - name: "Commit four-screen patch and push"
        shell: bash
        run: |
          set -Eeuo pipefail
          git add owner.html owner-ipad.html staff.html system-check.html .dpro-next/esthe-next-hf1-r2-stage.json .dpro-next/esthe-next-hf1-r2-static.json
          git diff --cached --quiet && { echo "::error::Commit対象がありません"; exit 1; }
          git commit -m "DPRO ESTHE NEXT-HF1-R2: fix admin clear on four screens"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "PATCH_COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: "Wait for all four public screens"
        shell: bash
        run: |
          set -Eeuo pipefail
          for file in owner.html owner-ipad.html staff.html system-check.html; do
            PUBLISHED=false
            for attempt in $(seq 1 60); do
              BODY="$(curl -L -sS --retry 2 -H 'Cache-Control: no-cache, no-store' "$FRONT_BASE/$file?hf1r2=${PATCH_COMMIT_SHA}_${attempt}" || true)"
              if [[ "$file" == "system-check.html" ]]; then MARKER="ESTHE-NEXT-HF1-R2-SYSTEM-CHECK-CLEAR"; else MARKER="ESTHE-NEXT-HF1-R2-ADMIN-CODE-CLEAR"; fi
              if [[ "$BODY" == *"$MARKER"* && "$BODY" == *'autocomplete="new-password"'* ]]; then PUBLISHED=true; break; fi
              sleep 10
            done
            [[ "$PUBLISHED" == true ]] || { echo "::error::$file 公開反映未確認"; exit 1; }
          done

      - name: "Install Chromium validation"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install playwright
          python3 -m playwright install --with-deps chromium

      - name: "Browser-test all four screens"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<HF1-R2-browser>","exec"))'

      - name: "Write COMPLETE maintenance ledger"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<HF1-R2-final>","exec"))'
          grep -q '^current_step: COMPLETE$' .dpro-next/esthe-step-state.yml
          grep -q '^final_version: "DPRO-ESTHE-NEXT-1.0.1"$' .dpro-next/esthe-step-state.yml
          grep -q 'public_browser_screen_count: 4' .dpro-next/esthe-next-hf1-r2-completion.yml
          grep -q 'input_blank_after_reload_all: true' .dpro-next/esthe-next-hf1-r2-completion.yml
          ruby -e 'require "yaml"; YAML.parse_file(ARGV[0])' .dpro-next/esthe-step-state.yml
          ruby -e 'require "yaml"; YAML.parse_file(ARGV[0])' .dpro-next/esthe-final-completion.yml

      - name: "Upload R2 validation artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "ESTHE-NEXT-HF1-R2-${{ github.run_id }}"
          path: |
            .esthe-next-hf1-r2-artifact/
            .dpro-next/esthe-next-hf1-r2-*.json
            .dpro-next/esthe-next-hf1-r2-*.yml
          if-no-files-found: warn
          retention-days: 90

      - name: "Commit ledger delete old workflows and push"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          git add .dpro-next/esthe-step-state.yml .dpro-next/esthe-current-baseline.yml .dpro-next/esthe-final-completion.yml .dpro-next/esthe-final-completion.json .dpro-next/esthe-next-hf1-r2-static.json .dpro-next/esthe-next-hf1-r2-public.json .dpro-next/esthe-next-hf1-r2-completion.json .dpro-next/esthe-next-hf1-r2-completion.yml
          git rm --ignore-unmatch "$WORKFLOW_FILE" ".github/workflows/ESTHE-NEXT-HF1.yml"
          git commit -m "DPRO ESTHE NEXT-HF1-R2 complete: version 1.0.1"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "FINAL_COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: "Confirm final R2 ledger"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          RAW="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_REF_NAME}/.dpro-next/esthe-next-hf1-r2-completion.yml"
          CONFIRMED=false
          for attempt in $(seq 1 36); do
            BODY="$(curl -L -sS --retry 2 -H 'Cache-Control: no-cache, no-store' "$RAW?sha=${FINAL_COMMIT_SHA}_${attempt}" || true)"
            if [[ "$BODY" == *'hotfix_step: "ESTHE-NEXT-HF1-R2"'* && "$BODY" == *'public_browser_screen_count: 4'* && "$BODY" == *'input_blank_after_reload_all: true'* ]]; then CONFIRMED=true; break; fi
            sleep 10
          done
          [[ "$CONFIRMED" == true ]] || { echo "::error::R2完成台帳未確認"; exit 1; }
          echo "### DPRO エステ / ESTHE-NEXT-HF1-R2 完了" >> "$GITHUB_STEP_SUMMARY"
          echo "- 対象: **PC・iPad・スタッフ・system-checkの4画面**" >> "$GITHUB_STEP_SUMMARY"
          echo "- 管理コード設定: **4 / 4 PASS**" >> "$GITHUB_STEP_SUMMARY"
          echo "- 削除直後・1秒後・再読込後: **4 / 4 空欄PASS**" >> "$GITHUB_STEP_SUMMARY"
          echo "- current_step: **COMPLETE維持**" >> "$GITHUB_STEP_SUMMARY"
          echo "- final_version: **DPRO-ESTHE-NEXT-1.0.1**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Worker / Supabase / API: **変更なし**" >> "$GITHUB_STEP_SUMMARY"
