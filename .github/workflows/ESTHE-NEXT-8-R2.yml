# DPRO エステ LINE
# STEP名: ESTHE-NEXT-8-R2
# 対象: owner.html / DPRO NEXT完成台帳
# 目的: 再来店・施術後・回数券フォローを優先順で個別対応
# R2修正:
# - 初版は本体変更適用後、JavaScript構文検査で安全停止
# - Python re.subがJavaScript内の \n を実改行へ変換
# - join("\n")・replaceAll("\\n","\n")等が壊れUnexpected token
# - R2はlambda経由で置換文字列を無変換挿入
# - 初版はCommit前停止のためNEXT-7正常版から再実行
# 変更前バックアップ: backup-esthe-before-next8-YYYYMMDD
# 前STEP: ESTHE-NEXT-7-COMPLETE / next_step ESTHE-NEXT-8
# Worker変更: なし
# Supabase変更: なし
# API変更: なし
# 次STEP: ESTHE-NEXT-9
# 成功後: 完成台帳更新 / 自動Commit・Push / YML自身削除

name: "DPRO ESTHE NEXT-8-R2 - Revisit and Individual Follow-up"

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ESTHE-NEXT-8-R2.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: "dpro-esthe-next"
  cancel-in-progress: false

env:
  WORKFLOW_FILE: ".github/workflows/ESTHE-NEXT-8-R2.yml"
  EXPECTED_PREVIOUS_STEP: "ESTHE-NEXT-7-COMPLETE"
  EXPECTED_CURRENT_NEXT: "ESTHE-NEXT-8"
  CURRENT_STEP_AFTER_SUCCESS: "ESTHE-NEXT-8-COMPLETE"
  NEXT_STEP_AFTER_SUCCESS: "ESTHE-NEXT-9"
  BACKUP_TAG_PREFIX: "backup-esthe-before-next8-r2"
  API_BASE: "https://dpro-esthe-relax-line-api.dpromstk2000.workers.dev"
  PAGES_BASE: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff"
  SHOP_CODE: "esthe_demo_default"

jobs:
  esthe-next-8:
    name: "Apply ESTHE NEXT-8 safely"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: "Checkout repository with history"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: "Configure Git identity"
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "DPRO NEXT Actions"
          git config user.email "actions@users.noreply.github.com"

      - name: "Confirm ESTHE-NEXT-7 completion"
        shell: bash
        run: |
          set -Eeuo pipefail
          F=".dpro-next/esthe-step-state.yml"
          test -f "$F"
          CURRENT="$(awk -F': *' '/^current_step:/{gsub(/["'"'"']/, "", $2); print $2; exit}' "$F")"
          NEXT="$(awk -F': *' '/^next_step:/{gsub(/["'"'"']/, "", $2); print $2; exit}' "$F")"
          [[ "$CURRENT" == "$EXPECTED_PREVIOUS_STEP" ]] || { echo "::error::前STEP未完了 current_step=$CURRENT"; exit 1; }
          [[ "$NEXT" == "$EXPECTED_CURRENT_NEXT" ]] || { echo "::error::next_step不一致 next_step=$NEXT"; exit 1; }
          echo "### 前STEP完了確認" >> "$GITHUB_STEP_SUMMARY"
          echo "- current_step: \`$CURRENT\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- next_step: \`$NEXT\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- 判定: **OK**" >> "$GITHUB_STEP_SUMMARY"

      - name: "Confirm existing follow-up APIs"
        shell: bash
        run: |
          set -Eeuo pipefail
          D="$(TZ=Asia/Tokyo date +%F)"
          HC="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 40 -o /tmp/n8h.json -w "%{http_code}" "${API_BASE}/api/health")"
          FC="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 45 -H "x-admin-secret: 1234" -o /tmp/n8f.json -w "%{http_code}" "${API_BASE}/api/admin/followups?shop_code=${SHOP_CODE}&status=pending&due_before=${D}&limit=200")"
          [[ "$HC" =~ ^2 ]] || { echo "::error::health API HTTP $HC"; exit 1; }
          [[ "$FC" =~ ^2 ]] || { echo "::error::followups API HTTP $FC"; exit 1; }
          python3 - <<'PY'
          import json
          from pathlib import Path
          h=json.loads(Path("/tmp/n8h.json").read_text())
          f=json.loads(Path("/tmp/n8f.json").read_text())
          assert h.get("ok") is True
          assert isinstance(f.get("followups",[]),list)
          print("Health OK / Followups",len(f.get("followups",[])))
          PY
          grep -q '/api/admin/followups' owner.html
          grep -q 'method:"PATCH"' owner.html
          echo "### 既存フォローAPI" >> "$GITHUB_STEP_SUMMARY"
          echo "- GET / PATCH: **OK・既存再利用**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Worker・SQL変更: **不要**" >> "$GITHUB_STEP_SUMMARY"

      - name: "Create change-before backup tag"
        shell: bash
        run: |
          set -Eeuo pipefail
          SHA="$GITHUB_SHA"
          mapfile -t FILES < <(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          if [[ "${#FILES[@]}" -eq 1 && "${FILES[0]}" == "$WORKFLOW_FILE" ]]; then SHA="$(git rev-parse "${GITHUB_SHA}^")"; fi
          D="$(TZ=Asia/Tokyo date +%Y%m%d)"
          TAG="${BACKUP_TAG_PREFIX}-${D}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then TAG="${TAG}-run-${GITHUB_RUN_ID}"; fi
          git tag -a "$TAG" "$SHA" -m "DPRO ESTHE before NEXT-8: $SHA"
          git push origin "refs/tags/$TAG"
          echo "CHANGE_BEFORE_SHA=$SHA" >> "$GITHUB_ENV"
          echo "BACKUP_TAG=$TAG" >> "$GITHUB_ENV"
          echo "### 変更前バックアップ" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`$SHA\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`$TAG\`" >> "$GITHUB_STEP_SUMMARY"

      - name: "Apply revisit and individual follow-up"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-8-R2-apply>","exec"))'

      - name: "Run HTML JavaScript ID workflow and safety validation"
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p .next8_tmp
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-8-validation>","exec"))'
          ruby -e 'require "yaml"; YAML.parse_file(ARGV[0]); puts "YML syntax OK"' "$WORKFLOW_FILE"

      - name: "Update NEXT completion ledger"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-8-ledger>","exec"))'

      - name: "Final completion validation"
        shell: bash
        run: |
          set -Eeuo pipefail
          grep -q 'current_step: "ESTHE-NEXT-8-COMPLETE"' .dpro-next/esthe-step-state.yml
          grep -q 'next_step: "ESTHE-NEXT-9"' .dpro-next/esthe-step-state.yml
          grep -q '<!-- STEP ESTHE-NEXT-8 -->' owner.html
          grep -q 'id="followupCommandCenter"' owner.html
          grep -q 'function personalizeFollowupText' owner.html
          grep -q 'function confirmFollowupDone' owner.html
          grep -q 'copy_does_not_complete: true' .dpro-next/esthe-step-state.yml
          grep -q 'bulk_auto_line_delivery: false' .dpro-next/esthe-step-state.yml

      - name: "Upload NEXT-8 validation artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "ESTHE-NEXT-8-R2-validation-${{ github.run_id }}"
          path: |
            .next8_tmp/validation.json
            .dpro-next/esthe-next8-report.txt
            .dpro-next/esthe-next8-change-record.json
          if-no-files-found: warn
          retention-days: 30

      - name: "Commit changes, delete workflow and push"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          git add owner.html .dpro-next/esthe-step-state.yml .dpro-next/esthe-current-baseline.yml .dpro-next/esthe-next8-report.txt .dpro-next/esthe-next8-change-record.json
          git rm --ignore-unmatch \
            "$WORKFLOW_FILE" \
            ".github/workflows/ESTHE-NEXT-8.yml"
          git diff --cached --quiet && { echo "::error::Commit対象がありません"; exit 1; }
          git commit -m "DPRO ESTHE NEXT-8-R2 complete: revisit and individual follow-up"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "### 自動Commit・Push" >> "$GITHUB_STEP_SUMMARY"
          echo "- 完了Commit: \`$(git rev-parse HEAD)\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- YML自身: 削除済み" >> "$GITHUB_STEP_SUMMARY"

      - name: "Confirm GitHub Pages publication"
        if: success()
        continue-on-error: true
        shell: bash
        run: |
          set -Eeuo pipefail
          OK=false
          for I in $(seq 1 24); do
            B="$(curl -L -sS --retry 2 --connect-timeout 8 --max-time 25 -H "Cache-Control: no-cache" "${PAGES_BASE}/owner.html?next8=${GITHUB_RUN_ID}_${I}" || true)"
            if [[ "$B" == *"STEP ESTHE-NEXT-8"* && "$B" == *'id="followupCommandCenter"'* && "$B" == *"文面を確認・コピー"* ]]; then OK=true; break; fi
            sleep 10
          done
          echo "### GitHub Pages公開確認" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$OK" == true ]]; then echo "- 判定: **OK**" >> "$GITHUB_STEP_SUMMARY"; else echo "- 判定: **注意（反映待ち）**" >> "$GITHUB_STEP_SUMMARY"; fi
