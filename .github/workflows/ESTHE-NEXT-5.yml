# DPRO エステ LINE
# STEP名: ESTHE-NEXT-5
#
# 目的:
# - エステ向けの「見積・確認・承認」を、施術内容・料金・注意事項・同意確認として実装
# - 予約時の同意、店舗での施術前確認、顧客カルテを予約単位で結び付ける
# - LINEへの自動送信は行わず、個別確認文のコピーを基本にする
#
# 対象ファイル:
# - owner.html
# - member.html
# - index-brush.html
# - .dpro-next/esthe-step-state.yml
# - .dpro-next/esthe-current-baseline.yml
#
# 実施する変更:
# - オーナー受付・施術詳細へ「施術内容・料金・同意確認」を追加
# - 予約時の施術前同意状況を表示
# - メニュー標準料金・所要時間・回数券候補を表示
# - 店舗確認4項目を確認後、既存カルテ保存APIで確認記録を永続保存
# - 保存記録は予約番号・予約IDと関連付け
# - 確認記録がない状態で施術開始を押した場合は、確認画面を開いて安全停止
# - お客様へ送る確認文は個別コピーのみ
# - LINE会員ページへ料金目安・所要時間・施術前案内を表示
# - 予約確認画面へ料金・所要時間・同意済み表示を強化
#
# 変更前バックアップタグ:
# - backup-esthe-before-next5-YYYYMMDD
#
# 前STEP完了確認:
# - current_step: ESTHE-NEXT-4-COMPLETE
# - next_step: ESTHE-NEXT-5
#
# 自動検査:
# - HTML / JavaScript / YML構文
# - HTML ID重複
# - 既存機能維持
# - 予約ID・予約番号と確認記録の関連付け
# - 同意確認表示
# - 施術開始ガード
# - 既存カルテ保存API再利用
# - 個別文面コピー
# - 一括自動LINE配信が追加されていないこと
# - 初期API追加なし
# - Worker既存API疎通
# - ファイル容量
# - GitHub Pages公開反映
#
# Worker変更: なし
# Supabase変更: なし
# API変更: なし
#
# 次のSTEP:
# - ESTHE-NEXT-6
#
# 成功後:
# - 完成台帳更新
# - 自動Commit / Push
# - このYML自身を削除

name: "DPRO ESTHE NEXT-5 - Treatment Confirmation and Consent"

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ESTHE-NEXT-5.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: "dpro-esthe-next"
  cancel-in-progress: false

env:
  STEP_NAME: "ESTHE-NEXT-5"
  SYSTEM_NAME: "DPRO エステ LINE"
  WORKFLOW_FILE: ".github/workflows/ESTHE-NEXT-5.yml"
  EXPECTED_PREVIOUS_STEP: "ESTHE-NEXT-4-COMPLETE"
  EXPECTED_CURRENT_NEXT: "ESTHE-NEXT-5"
  CURRENT_STEP_AFTER_SUCCESS: "ESTHE-NEXT-5-COMPLETE"
  NEXT_STEP_AFTER_SUCCESS: "ESTHE-NEXT-6"
  BACKUP_TAG_PREFIX: "backup-esthe-before-next5"
  API_BASE: "https://dpro-esthe-relax-line-api.dpromstk2000.workers.dev"
  PAGES_BASE: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff"
  SHOP_CODE: "esthe_demo_default"
  WORKER_CHANGED: "false"
  SUPABASE_CHANGED: "false"
  API_CHANGED: "false"

jobs:
  esthe-next-5:
    name: "Apply ESTHE NEXT-5 safely"
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: "Checkout repository with history"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: "Configure Git identity"
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "DPRO NEXT Actions"
          git config user.email "actions@users.noreply.github.com"

      - name: "Confirm ESTHE-NEXT-4 completion"
        shell: bash
        run: |
          set -Eeuo pipefail

          STATE_FILE=".dpro-next/esthe-step-state.yml"
          test -f "$STATE_FILE"

          CURRENT_STEP="$(awk -F': *' '/^current_step:/{gsub(/["'"'"']/, "", $2); print $2; exit}' "$STATE_FILE")"
          NEXT_STEP="$(awk -F': *' '/^next_step:/{gsub(/["'"'"']/, "", $2); print $2; exit}' "$STATE_FILE")"

          if [[ "$CURRENT_STEP" != "$EXPECTED_PREVIOUS_STEP" ]]; then
            echo "::error::前STEP未完了です。current_step=$CURRENT_STEP / expected=$EXPECTED_PREVIOUS_STEP"
            exit 1
          fi

          if [[ "$NEXT_STEP" != "$EXPECTED_CURRENT_NEXT" ]]; then
            echo "::error::実行対象STEPが一致しません。next_step=$NEXT_STEP / expected=$EXPECTED_CURRENT_NEXT"
            exit 1
          fi

          echo "### 前STEP完了確認" >> "$GITHUB_STEP_SUMMARY"
          echo "- current_step: \`$CURRENT_STEP\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- next_step: \`$NEXT_STEP\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- 判定: **OK**" >> "$GITHUB_STEP_SUMMARY"

      - name: "Confirm existing APIs and consent baseline"
        shell: bash
        run: |
          set -Eeuo pipefail

          JST_DATE="$(TZ=Asia/Tokyo date +%F)"

          HEALTH_CODE="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 40 \
            -o /tmp/esthe-next5-health.json \
            -w "%{http_code}" \
            "${API_BASE}/api/health")"

          SETTINGS_CODE="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 40 \
            -o /tmp/esthe-next5-settings.json \
            -w "%{http_code}" \
            "${API_BASE}/api/public/settings?shop_code=${SHOP_CODE}")"

          DAY_CODE="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 45 \
            -H "Accept: application/json" \
            -H "x-admin-secret: 1234" \
            -o /tmp/esthe-next5-day.json \
            -w "%{http_code}" \
            "${API_BASE}/api/admin/day?shop_code=${SHOP_CODE}&date=${JST_DATE}")"

          for pair in "health:$HEALTH_CODE" "settings:$SETTINGS_CODE" "day:$DAY_CODE"; do
            label="${pair%%:*}"
            code="${pair#*:}"
            if [[ ! "$code" =~ ^2 ]]; then
              echo "::error::$label API確認失敗 HTTP $code"
              exit 1
            fi
          done

          python3 <<'PY'
          import json
          from pathlib import Path

          health = json.loads(Path("/tmp/esthe-next5-health.json").read_text(encoding="utf-8"))
          settings = json.loads(Path("/tmp/esthe-next5-settings.json").read_text(encoding="utf-8"))
          day = json.loads(Path("/tmp/esthe-next5-day.json").read_text(encoding="utf-8"))

          if health.get("ok") is not True:
              raise SystemExit("health ok=false")
          if settings.get("ok") is False:
              raise SystemExit("settings ok=false")
          if day.get("ok") is not True:
              raise SystemExit("day ok=false")
          if not isinstance(settings.get("menus", []), list):
              raise SystemExit("settings.menus is not a list")
          if not isinstance(day.get("reservations", []), list):
              raise SystemExit("day.reservations is not a list")

          print("Health: OK")
          print("Public settings: OK")
          print("Menus:", len(settings.get("menus", [])))
          print("Day reservations:", len(day.get("reservations", [])))
          PY

          grep -q '/api/admin/karte/save' owner.html
          grep -q 'consent_checked: $("consent").checked' index-brush.html
          grep -q '施術前確認事項への同意が必要です' index-brush.html

          echo "### 既存機能再利用" >> "$GITHUB_STEP_SUMMARY"
          echo "- public/settings: **OK**" >> "$GITHUB_STEP_SUMMARY"
          echo "- admin/day: **OK**" >> "$GITHUB_STEP_SUMMARY"
          echo "- 既存カルテ保存API: **確認済み**" >> "$GITHUB_STEP_SUMMARY"
          echo "- 予約時同意保存: **確認済み**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Worker・SQL変更: **不要**" >> "$GITHUB_STEP_SUMMARY"

      - name: "Create change-before backup tag"
        shell: bash
        run: |
          set -Eeuo pipefail

          CHANGE_BEFORE_SHA="$GITHUB_SHA"
          mapfile -t HEAD_FILES < <(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")

          if [[ "${#HEAD_FILES[@]}" -eq 1 && "${HEAD_FILES[0]}" == "$WORKFLOW_FILE" ]]; then
            CHANGE_BEFORE_SHA="$(git rev-parse "${GITHUB_SHA}^")"
          fi

          JST_DATE="$(TZ=Asia/Tokyo date +%Y%m%d)"
          BASE_TAG="${BACKUP_TAG_PREFIX}-${JST_DATE}"
          BACKUP_TAG="$BASE_TAG"

          if git ls-remote --exit-code --tags origin "refs/tags/$BACKUP_TAG" >/dev/null 2>&1; then
            BACKUP_TAG="${BASE_TAG}-run-${GITHUB_RUN_ID}"
          fi

          git tag -a "$BACKUP_TAG" "$CHANGE_BEFORE_SHA" \
            -m "DPRO ESTHE before NEXT-5: $CHANGE_BEFORE_SHA"
          git push origin "refs/tags/$BACKUP_TAG"

          {
            echo "CHANGE_BEFORE_SHA=$CHANGE_BEFORE_SHA"
            echo "BACKUP_TAG=$BACKUP_TAG"
          } >> "$GITHUB_ENV"

          echo "### 変更前バックアップ" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`$CHANGE_BEFORE_SHA\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`$BACKUP_TAG\`" >> "$GITHUB_STEP_SUMMARY"

      - name: "Apply treatment confirmation and customer linkage"
        shell: bash
        run: |
          set -Eeuo pipefail

          python3 <<'PY'
          from __future__ import annotations

          import datetime as dt
          import json
          from pathlib import Path

          ROOT = Path(".")

          def read(path: str) -> str:
              target = ROOT / path
              if not target.exists():
                  raise RuntimeError(f"対象ファイルがありません: {path}")
              return target.read_text(encoding="utf-8")

          def write(path: str, text: str) -> None:
              (ROOT / path).write_text(text.rstrip() + "\n", encoding="utf-8")

          def replace_once(source: str, old: str, new: str, label: str) -> str:
              count = source.count(old)
              if count != 1:
                  raise RuntimeError(f"{label}: 置換対象が1件ではありません count={count}")
              return source.replace(old, new, 1)

          def insert_before_once(source: str, anchor: str, addition: str, label: str) -> str:
              count = source.count(anchor)
              if count != 1:
                  raise RuntimeError(f"{label}: 挿入位置が1件ではありません count={count}")
              return source.replace(anchor, addition + "\n" + anchor, 1)

          # ============================================================
          # owner.html
          # ============================================================
          owner = read("owner.html")

          if "<!-- STEP ESTHE-NEXT-4 -->" not in owner:
              raise RuntimeError("owner.html: NEXT-4基準マーカーがありません")
          if "ESTHE-NEXT-4-TREATMENT-PROGRESS-BOARD-20260723" not in owner:
              raise RuntimeError("owner.html: NEXT-4 VERSIONがありません")
          if 'id="preTreatmentConfirmSection"' in owner:
              raise RuntimeError("owner.html: NEXT-5確認セクションが既に存在します")

          owner = replace_once(
              owner,
              "<!-- STEP ESTHE-NEXT-4 -->",
              "<!-- STEP ESTHE-NEXT-5 -->",
              "owner STEPマーカー",
          )
          owner = replace_once(
              owner,
              "<title>DPRO Esthe Relaxation｜STEP ESTHE-NEXT-4｜owner.html</title>",
              "<title>DPRO Esthe Relaxation｜STEP ESTHE-NEXT-5｜owner.html</title>",
              "owner title",
          )
          owner = replace_once(
              owner,
              '<div class="badge">STEP ESTHE-NEXT-4｜施術進捗・ステータス見える化</div>',
              '<div class="badge">STEP ESTHE-NEXT-5｜施術内容・料金・同意確認</div>',
              "owner badge",
          )
          owner = replace_once(
              owner,
              'const VERSION = "ESTHE-NEXT-4-TREATMENT-PROGRESS-BOARD-20260723";',
              'const VERSION = "ESTHE-NEXT-5-TREATMENT-CONFIRMATION-20260723";',
              "owner VERSION",
          )
          owner = replace_once(
              owner,
              """  integratedVisit: null,
            integratedVisitCache: {}
          };""",
              """  integratedVisit: null,
            integratedVisitCache: {},
            menuCatalog: []
          };""",
              "owner state",
          )

          owner_css = r"""
          /* DPRO NEXT-5: 施術内容・料金・同意確認 */
          .preconfirm-status-grid{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:9px;
            margin-bottom:12px;
          }
          .preconfirm-status{
            border:1px solid var(--line);
            border-radius:15px;
            background:var(--soft);
            padding:12px;
          }
          .preconfirm-status strong{
            display:block;
            color:var(--main);
            font-size:15px;
            line-height:1.35;
          }
          .preconfirm-status span{
            display:block;
            margin-top:5px;
            color:var(--muted);
            font-size:11px;
            font-weight:850;
            line-height:1.55;
          }
          .preconfirm-status.ok{
            background:#eaf8f2;
            border-color:#bce9d8;
          }
          .preconfirm-status.ok strong{color:#087a59}
          .preconfirm-status.warn{
            background:#fff8e8;
            border-color:#f0d6a4;
          }
          .preconfirm-status.warn strong{color:#8b5c0b}
          .preconfirm-checks{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:8px;
            margin-top:12px;
          }
          .preconfirm-check{
            display:flex;
            gap:9px;
            align-items:flex-start;
            min-height:52px;
            padding:10px;
            border:1px solid var(--line);
            border-radius:14px;
            background:#fff;
            color:var(--text);
            font-size:12px;
            font-weight:900;
            line-height:1.55;
          }
          .preconfirm-check input{
            width:auto;
            margin-top:3px;
            accent-color:var(--main);
          }
          .preconfirm-note{
            width:100%;
            min-height:74px;
            margin-top:10px;
            padding:11px 12px;
            border:1px solid var(--line);
            border-radius:14px;
            background:#fff;
            color:var(--text);
            font:inherit;
            font-size:13px;
            font-weight:800;
            line-height:1.6;
            resize:vertical;
          }
          .preconfirm-saved{
            margin-top:10px;
            padding:11px 12px;
            border:1px solid #bce9d8;
            border-radius:14px;
            background:#eaf8f2;
            color:#087a59;
            font-size:12px;
            font-weight:900;
            line-height:1.6;
          }
          @media(max-width:680px){
            .preconfirm-status-grid,
            .preconfirm-checks{grid-template-columns:1fr}
          }
          """
          owner = insert_before_once(
              owner,
              "</style>",
              owner_css,
              "owner NEXT-5 CSS",
          )

          owner_functions = r"""
          function yenText(value){
            const amount = Number(value);
            return Number.isFinite(amount) ? `${amount.toLocaleString("ja-JP")}円` : "当日確認";
          }

          function menuForReservation(r){
            const menus = state.menuCatalog || [];
            const menuId = String(r?.menu_id || r?.menu?.id || "");
            const menuName = String(r?.menu_name || r?.menu?.menu_name || "");
            return menus.find(menu =>
              (menuId && String(menu.id || "") === menuId) ||
              (menuName && String(menu.menu_name || "") === menuName)
            ) || r?.menu || null;
          }

          function reservationPriceInfo(r){
            const menu = menuForReservation(r) || {};
            const price = r?.price_yen ?? r?.menu_price_yen ?? menu.price_yen;
            const duration = r?.duration_minutes ?? r?.menu_duration_minutes ?? menu.duration_minutes;
            return {
              price,
              duration,
              priceText: Number.isFinite(Number(price)) ? yenText(price) : "当日確認",
              durationText: Number.isFinite(Number(duration)) ? `${Number(duration)}分` : "当日確認"
            };
          }

          function latestConsultation(detail){
            return (detail?.consultations || [])
              .slice()
              .sort((a,b) =>
                new Date(b.answered_at || b.created_at || 0) -
                new Date(a.answered_at || a.created_at || 0)
              )[0] || null;
          }

          function reservationConsentChecked(detail){
            const consultation = latestConsultation(detail);
            if(!consultation) return false;
            const answers = parseConsultationAnswers(consultation);
            const raw = consultation.consent_checked ??
              consultation.consent ??
              answers.consent_checked ??
              answers.consent;
            return raw === true || raw === 1 || raw === "1" || raw === "true";
          }

          function preTreatmentConfirmationTitle(r){
            const key = r?.reservation_code || r?.id || "予約";
            return `施術前確認｜${key}`;
          }

          function findPreTreatmentConfirmation(detail, r){
            const title = preTreatmentConfirmationTitle(r);
            const relationKey = String(r?.reservation_code || r?.id || "");
            return (detail?.notes || []).find(note => {
              if(String(note.note_title || "") === title) return true;
              const typeMatch = String(note.note_type || "") === "pre_treatment_confirmation";
              const bodyMatch = relationKey && String(note.note_body || "").includes(relationKey);
              return typeMatch && bodyMatch;
            }) || null;
          }

          async function loadMenuCatalogIfNeeded(){
            if((state.menuCatalog || []).length) return;
            const existing = state.settings?.menus;
            if(Array.isArray(existing) && existing.length){
              state.menuCatalog = existing;
              return;
            }
            try{
              const settings = await api("/api/public/settings");
              state.menuCatalog = settings.menus || [];
            }catch(error){
              state.menuCatalog = [];
            }
          }

          function preTreatmentCustomerText(r){
            const p = isoParts(r.start_at);
            const info = reservationPriceInfo(r);
            return [
              `${r.customer_name || "お客様"}様`,
              "",
              "施術内容のご確認です。",
              `日時：${p.date ? dateText(p.date) : "-"} ${p.time || ""}`,
              `メニュー：${r.menu_name || "-"}`,
              `料金目安：${info.priceText}`,
              `所要時間目安：${info.durationText}`,
              `担当：${r.staff_name || "指名なし"}`,
              `予約番号：${r.reservation_code || "-"}`,
              "",
              "当日の体調・肌状態により、メニュー変更や施術を控える場合があります。",
              "回数券・追加内容・当日の変更がある場合は、最終金額を店頭で確認します。",
              "内容を確認してから施術を開始します。"
            ].join("\n");
          }

          function copyPreTreatmentCustomerText(){
            const r = state.integratedVisit?.reservation;
            if(!r) return;
            const text = preTreatmentCustomerText(r);
            navigator.clipboard?.writeText(text)
              .then(() => showToast("お客様確認文をコピーしました。"))
              .catch(() => showToast("確認文をコピーできませんでした。"));
          }

          async function savePreTreatmentConfirmation(){
            const hub = state.integratedVisit;
            const r = hub?.reservation;
            const detail = hub?.detail || {};
            const customer = detail.customer || {};
            if(!r || !customer.id){
              showToast("顧客詳細を確認してから保存してください。");
              return;
            }

            const requiredIds = [
              "preconfirmMenu",
              "preconfirmPrice",
              "preconfirmSafety",
              "preconfirmCustomer"
            ];
            const missing = requiredIds.filter(id => !$(id)?.checked);
            if(missing.length){
              showToast("4つの確認項目をすべて確認してください。");
              return;
            }

            const p = isoParts(r.start_at);
            const info = reservationPriceInfo(r);
            const bookingConsent = reservationConsentChecked(detail);
            const note = $("preconfirmNote")?.value.trim() || "";
            const title = preTreatmentConfirmationTitle(r);
            const body = [
              "[DPRO_PRE_TREATMENT_CONFIRMATION]",
              `予約番号：${r.reservation_code || "-"}`,
              `予約ID：${r.id || "-"}`,
              `日時：${p.date ? dateText(p.date) : "-"} ${p.time || ""}`,
              `メニュー：${r.menu_name || "-"}`,
              `標準料金：${info.priceText}`,
              `所要時間：${info.durationText}`,
              `予約時同意：${bookingConsent ? "同意済み" : "当日確認"}`,
              "店舗確認：メニュー説明済み／料金説明済み／注意事項確認済み／お客様本人確認済み",
              `補足：${note || "-"}`,
              `記録画面：${VERSION}`
            ].join("\n");

            try{
              await api("/api/admin/karte/save", {
                method:"POST",
                body:{
                  customer_id:customer.id,
                  note_title:title,
                  note_body:body,
                  note_type:"pre_treatment_confirmation",
                  created_by:"owner",
                  is_demo:true
                }
              });

              const query = r.customer_id
                ? `customer_id=${encodeURIComponent(r.customer_id)}`
                : `phone=${encodeURIComponent(normalizePhone(r.customer_phone || r.phone || customer.phone || ""))}`;
              const refreshed = await api(`/api/admin/customers/detail?${query}`);
              hub.detail = refreshed;
              const cacheKey = String(r.customer_id || normalizePhone(r.customer_phone || r.phone || customer.phone || ""));
              if(cacheKey) state.integratedVisitCache[cacheKey] = refreshed;
              showToast("施術前確認を顧客カルテへ保存しました。");
              renderIntegratedVisit();
            }catch(error){
              showToast("施術前確認の保存に失敗しました。");
              setMessage("ng", "施術前確認の保存に失敗しました：" + error.message);
            }
          }

          async function requestTreatmentStart(source, index){
            await openIntegratedVisit(source, index);
            const hub = state.integratedVisit;
            if(!hub?.reservation) return;

            const saved = findPreTreatmentConfirmation(hub.detail, hub.reservation);
            if(saved){
              closeIntegratedVisit();
              await updateStatus(source, index, "in_treatment", true);
              return;
            }

            showToast("施術前確認を保存してから施術を開始してください。");
            setTimeout(() => {
              document.getElementById("preTreatmentConfirmSection")
                ?.scrollIntoView({behavior:"smooth", block:"start"});
            }, 80);
          }

          """
          owner = replace_once(
              owner,
              "function renderIntegratedVisit(){",
              owner_functions + "\nfunction renderIntegratedVisit(){",
              "owner NEXT-5 functions",
          )

          owner = replace_once(
              owner,
              """  const detailError = hub.detailError
              ? `<div class="notice warn">顧客詳細の取得に失敗しました：${escapeHtml(hub.detailError)}</div>`
              : "";

