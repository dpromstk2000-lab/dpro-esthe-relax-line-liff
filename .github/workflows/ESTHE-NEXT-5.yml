          from collections import Counter
          from html.parser import HTMLParser
          from pathlib import Path

          files = ["owner.html", "member.html", "index-brush.html"]
          texts = {path:Path(path).read_text(encoding="utf-8") for path in files}
          errors = []
          warnings = []
          ok = []

          class Parser(HTMLParser):
              def __init__(self):
                  super().__init__(convert_charrefs=True)
                  self.ids = []
              def handle_starttag(self, tag, attrs):
                  for key, value in attrs:
                      if key.lower() == "id" and value:
                          self.ids.append(value)
              def handle_startendtag(self, tag, attrs):
                  self.handle_starttag(tag, attrs)

          for path, text in texts.items():
              parser = Parser()
              try:
                  parser.feed(text)
                  parser.close()
                  ok.append(f"HTML解析: {path}")
              except Exception as exc:
                  errors.append(f"HTML解析NG: {path}: {exc}")
                  continue

              duplicates = sorted(key for key, count in Counter(parser.ids).items() if count > 1)
              if duplicates:
                  errors.append(f"HTML ID重複: {path}: {', '.join(duplicates)}")
              else:
                  ok.append(f"HTML ID重複なし: {path}")

              scripts = re.findall(
                  r'<script\b(?![^>]*\bsrc=)[^>]*>(.*?)</script\s*>',
                  text,
                  flags=re.DOTALL | re.IGNORECASE,
              )
