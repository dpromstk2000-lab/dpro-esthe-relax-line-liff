              stdout=subprocess.PIPE,
              check=True,
          ).stdout.splitlines()
          allowed = {
              "owner.html",
              "member.html",
              "index-brush.html",
              ".dpro-next/esthe-next5-change-record.json",
              ".dpro-next/esthe-step-state.yml",
              ".dpro-next/esthe-current-baseline.yml",
              ".dpro-next/esthe-next5-report.txt",
          }
          unexpected = sorted(item for item in diff if item not in allowed)
          if unexpected:
              errors.append("想定外変更ファイル: " + ", ".join(unexpected))
          else:
              ok.append("変更範囲正常")

          for path in files:
              size = Path(path).stat().st_size
              if size > 1_000_000:
                  errors.append(f"ファイル容量過大: {path}: {size} bytes")
              elif size > 600_000:
                  warnings.append(f"ファイル容量注意: {path}: {size} bytes")
              else:
                  ok.append(f"ファイル容量: {path}: {size} bytes")

          report = {
              "step": "ESTHE-NEXT-5",
              "ok": len(ok),
              "attention": len(warnings),
              "ng": len(errors),
              "ok_items": ok,
              "attention_items": warnings,
              "ng_items": errors,
          }
          Path(".next5_tmp/validation.json").write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          summary = Path(__import__("os").environ["GITHUB_STEP_SUMMARY"])
          with summary.open("a", encoding="utf-8") as file:
              file.write("\n### NEXT-5 自動検査\n")
              file.write(f"- OK: {len(ok)}\n")
              file.write(f"- 注意: {len(warnings)}\n")
              file.write(f"- NG: {len(errors)}\n")
              if warnings:
                  file.write("\n#### 注意\n")
                  for item in warnings:
                      file.write(f"- {item}\n")
              if errors:
                  file.write("\n#### NG\n")
                  for item in errors:
                      file.write(f"- {item}\n")

          print(json.dumps(report, ensure_ascii=False, indent=2))
          if errors:
              sys.exit(1)
          PY

          ruby -e 'require "yaml"; YAML.parse_file(ARGV[0]); puts "YML syntax OK"' "$WORKFLOW_FILE"

      - name: "Update NEXT completion ledger"
        shell: bash
        run: |
          set -Eeuo pipefail

          python3 <<'PY'
          import datetime as dt
          import json
          import os
          from pathlib import Path

          now = dt.datetime.now(dt.timezone(dt.timedelta(hours=9))).replace(microsecond=0)
          result = json.loads(Path(".next5_tmp/validation.json").read_text(encoding="utf-8"))

          def q(value):
              return json.dumps(str(value), ensure_ascii=False)

          state_lines = [
              "schema_version: 1",
              f"system: {q('DPRO エステ LINE')}",
              f"current_step: {q(os.environ['CURRENT_STEP_AFTER_SUCCESS'])}",
              f"next_step: {q(os.environ['NEXT_STEP_AFTER_SUCCESS'])}",
              f"updated_at_jst: {q(now.isoformat())}",
              f"source_commit: {q(os.environ['CHANGE_BEFORE_SHA'])}",
              f"backup_tag: {q(os.environ['BACKUP_TAG'])}",
              f"result: {q('ATTENTION' if result['attention'] else 'OK')}",
              "changes:",
              "  worker: false",
              "  supabase: false",
              "  api: false",
              "  treatment_confirmation: true",
              "  booking_consent_visible: true",
              "  persistent_confirmation_via_karte: true",
              "  reservation_relation: true",
              "  treatment_start_guard: true",
              "  individual_customer_message_copy: true",
              "  bulk_auto_line_delivery: false",
              "  additional_initial_api_requests: 0",
          ]
          Path(".dpro-next/esthe-step-state.yml").write_text(
              "\n".join(state_lines) + "\n",
              encoding="utf-8",
          )

          report_lines = [
              "DPRO エステ LINE / ESTHE-NEXT-5 実行結果",
              f"完了日時JST: {now.isoformat()}",
              f"変更前Commit: {os.environ['CHANGE_BEFORE_SHA']}",
              f"バックアップタグ: {os.environ['BACKUP_TAG']}",
              f"OK: {result['ok']}",
              f"注意: {result['attention']}",
              f"NG: {result['ng']}",
              "",
              "実施内容:",
              "- 予約時の施術前同意状況をオーナー画面へ表示",
              "- メニュー標準料金・所要時間・回数券候補を表示",
              "- 店舗確認4項目を顧客カルテへ永続保存",
              "- 予約番号・予約IDを確認記録へ保存",
              "- 確認記録がない場合は施術開始を安全停止",
              "- お客様確認文は個別コピーのみ",
              "- LINE会員ページへ料金目安・所要時間・注意事項を表示",
              "- 予約確認画面へ同意済み表示を追加",
              "- 初期API取得数は増加なし",
              "",
              "変更記録:",
              "- Worker: 変更なし",
              "- Supabase: 変更なし",
              "- API: 変更なし",
              "",
              "次STEP: ESTHE-NEXT-6",
          ]
          if result["attention_items"]:
              report_lines.extend(["", "注意:"])
              report_lines.extend(f"- {item}" for item in result["attention_items"])

          Path(".dpro-next/esthe-next5-report.txt").write_text(
              "\n".join(report_lines) + "\n",
              encoding="utf-8",
          )

          baseline = Path(".dpro-next/esthe-current-baseline.yml")
          if baseline.exists():
              with baseline.open("a", encoding="utf-8") as file:
                  file.write("\nnext5_completion:\n")
                  file.write(f"  completed_at_jst: {q(now.isoformat())}\n")
                  file.write(f"  backup_tag: {q(os.environ['BACKUP_TAG'])}\n")
                  file.write("  treatment_confirmation: true\n")
                  file.write("  booking_consent_visible: true\n")
                  file.write("  persistent_confirmation_via_karte: true\n")
                  file.write("  reservation_relation: true\n")
                  file.write("  treatment_start_guard: true\n")
                  file.write("  individual_customer_message_copy: true\n")
                  file.write("  bulk_auto_line_delivery: false\n")
                  file.write("  additional_initial_api_requests: 0\n")
                  file.write("  worker_changed: false\n")
                  file.write("  supabase_changed: false\n")
                  file.write("  api_changed: false\n")
          PY

      - name: "Final completion validation"
        shell: bash
        run: |
          set -Eeuo pipefail

          grep -q 'current_step: "ESTHE-NEXT-5-COMPLETE"' .dpro-next/esthe-step-state.yml
          grep -q 'next_step: "ESTHE-NEXT-6"' .dpro-next/esthe-step-state.yml
          grep -q '<!-- STEP ESTHE-NEXT-5 -->' owner.html
          grep -q '<!-- STEP ESTHE-NEXT-5 -->' member.html
          grep -q '<!-- STEP ESTHE-NEXT-5 -->' index-brush.html
          grep -q 'id="preTreatmentConfirmSection"' owner.html
          grep -q 'function savePreTreatmentConfirmation' owner.html
          grep -q 'function requestTreatmentStart' owner.html
          grep -q 'pre_treatment_confirmation' owner.html
          grep -q '料金目安：' member.html
          grep -q '施術前確認：同意済み' index-brush.html
          grep -q 'bulk_auto_line_delivery: false' .dpro-next/esthe-step-state.yml
          grep -q 'additional_initial_api_requests: 0' .dpro-next/esthe-step-state.yml

      - name: "Upload NEXT-5 validation artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "ESTHE-NEXT-5-validation-${{ github.run_id }}"
          path: |
            .next5_tmp/validation.json
            .dpro-next/esthe-next5-report.txt
            .dpro-next/esthe-next5-change-record.json
          if-no-files-found: warn
          retention-days: 30

      - name: "Commit changes, delete workflow and push"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail

          git add \
            owner.html \
            member.html \
            index-brush.html \
            .dpro-next/esthe-step-state.yml \
            .dpro-next/esthe-current-baseline.yml \
            .dpro-next/esthe-next5-report.txt \
            .dpro-next/esthe-next5-change-record.json

          git rm --ignore-unmatch "$WORKFLOW_FILE"

          if git diff --cached --quiet; then
            echo "::error::Commit対象がありません。"
            exit 1
          fi

          git commit -m "DPRO ESTHE NEXT-5 complete: treatment confirmation and consent"
          git push origin "HEAD:${GITHUB_REF_NAME}"

          echo "### 自動Commit・Push" >> "$GITHUB_STEP_SUMMARY"
          echo "- 完了Commit: \`$(git rev-parse HEAD)\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- YML自身: 削除済み" >> "$GITHUB_STEP_SUMMARY"
          echo "- current_step: \`$CURRENT_STEP_AFTER_SUCCESS\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- next_step: \`$NEXT_STEP_AFTER_SUCCESS\`" >> "$GITHUB_STEP_SUMMARY"

      - name: "Confirm GitHub Pages publication"
        if: success()
        continue-on-error: true
        shell: bash
        run: |
          set -Eeuo pipefail

          PUBLISHED="false"
          for attempt in $(seq 1 24); do
            OWNER_BODY="$(curl -L -sS --retry 2 --connect-timeout 8 --max-time 25 \
              -H "Cache-Control: no-cache" \
              "${PAGES_BASE}/owner.html?next5_check=${GITHUB_RUN_ID}_${attempt}" || true)"
            MEMBER_BODY="$(curl -L -sS --retry 2 --connect-timeout 8 --max-time 25 \
              -H "Cache-Control: no-cache" \
              "${PAGES_BASE}/member.html?next5_check=${GITHUB_RUN_ID}_${attempt}" || true)"
            BRUSH_BODY="$(curl -L -sS --retry 2 --connect-timeout 8 --max-time 25 \
              -H "Cache-Control: no-cache" \
              "${PAGES_BASE}/index-brush.html?next5_check=${GITHUB_RUN_ID}_${attempt}" || true)"

            if [[ "$OWNER_BODY" == *"STEP ESTHE-NEXT-5"* \
              && "$OWNER_BODY" == *'id="preTreatmentConfirmSection"'* \
              && "$MEMBER_BODY" == *"STEP ESTHE-NEXT-5"* \
              && "$BRUSH_BODY" == *"STEP ESTHE-NEXT-5"* ]]; then
              PUBLISHED="true"
              break
            fi
            sleep 10
          done

          echo "### GitHub Pages公開確認" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$PUBLISHED" == "true" ]]; then
            echo "- 判定: **OK**" >> "$GITHUB_STEP_SUMMARY"
            echo "- owner / member / index-brush: NEXT-5確認" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- 判定: **注意**" >> "$GITHUB_STEP_SUMMARY"
            echo "- Pages反映待ちの可能性があります。ソースCommitは完了しています。" >> "$GITHUB_STEP_SUMMARY"
          fi
