                  temp.write_text(script, encoding="utf-8")
                  proc = subprocess.run(
                      ["node", "--check", str(temp)],
                      text=True,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.PIPE,
                      check=False,
                  )
                  if proc.returncode:
                      detail = (proc.stderr or proc.stdout).replace("\n", " ")[:800]
                      errors.append(f"JavaScript構文NG: {path} script#{number}: {detail}")
                  else:
                      ok.append(f"JavaScript構文: {path} script#{number}")

