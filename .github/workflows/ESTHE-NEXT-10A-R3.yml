# DPRO エステ LINE
# STEP名: ESTHE-NEXT-10A-R3
#
# 目的:
# - R2で完成・Commit済みの操作体験シートを再生成しない
# - GitHub Pagesの公開切替を正しく待機
# - PDF・PNGの公開バイトがCommit済みSHA256と一致するまで待機
# - 公開PDF内QR6件を再読取
#
# R2失敗原因:
# - HTTP 200だけで公開完了と判定
# - Pages切替前の旧PDFを取得してSHA256不一致
#
# R3修正:
# - HTTP 200かつPDF SHA256一致かつPNG SHA256一致で完了
# - 最大10分、10秒間隔で再確認
# - no-cacheヘッダーとキャッシュ回避クエリを使用
#
# 前STEP:
# - current_step: ESTHE-NEXT-10A-R2-COMPLETE
# - next_step: ESTHE-NEXT-10B-PRODUCT-SITE
#
# 次STEP:
# - ESTHE-NEXT-10B-PRODUCT-SITE
#
# Worker変更: なし
# Supabase変更: なし
# API変更: なし
# PDF・PNG再生成: なし
#
# 成功後:
# - 公開検査記録を保存
# - 完成台帳をR3-COMPLETEへ更新
# - 自動Commit / Push
# - R3 YML自身を削除

name: "DPRO ESTHE NEXT-10A-R3 - Publication Verification Retry"

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ESTHE-NEXT-10A-R3.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: "dpro-esthe-next"
  cancel-in-progress: false

env:
  WORKFLOW_FILE: ".github/workflows/ESTHE-NEXT-10A-R3.yml"
  EXPECTED_PREVIOUS_STEP: "ESTHE-NEXT-10A-R2-COMPLETE"
  EXPECTED_NEXT_STEP: "ESTHE-NEXT-10B-PRODUCT-SITE"
  BACKUP_TAG_PREFIX: "backup-esthe-before-next10a-r3"
  PAGES_BASE: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff"

jobs:
  esthe-next-10a-r3:
    name: "Verify exact published ESTHE operation sheet"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: "Checkout repository with history"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: "Configure Git identity"
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "DPRO NEXT Actions"
          git config user.email "actions@users.noreply.github.com"

      - name: "Confirm R2 completion and committed assets"
        shell: bash
        run: |
          set -Eeuo pipefail
          STATE=".dpro-next/esthe-step-state.yml"
          META="deliverables/esthe-next-10/operation-sheet-validation.json"
          LAYOUT="deliverables/esthe-next-10/operation-sheet-layout-r2-validation.json"

          test -f "$STATE"
          test -f "$META"
          test -f "$LAYOUT"

          CURRENT_STEP="$(awk -F': *' '/^current_step:/{gsub(/["'"'"']/, "", $2); print $2; exit}' "$STATE")"
          NEXT_STEP="$(awk -F': *' '/^next_step:/{gsub(/["'"'"']/, "", $2); print $2; exit}' "$STATE")"

          [[ "$CURRENT_STEP" == "$EXPECTED_PREVIOUS_STEP" ]] || {
            echo "::error::current_step不一致 $CURRENT_STEP"; exit 1;
          }
          [[ "$NEXT_STEP" == "$EXPECTED_NEXT_STEP" ]] || {
            echo "::error::next_step不一致 $NEXT_STEP"; exit 1;
          }

          python3 - <<'PY'
          import hashlib,json
          from pathlib import Path

          meta=json.loads(
              Path("deliverables/esthe-next-10/operation-sheet-validation.json")
              .read_text(encoding="utf-8")
          )
          layout=json.loads(
              Path("deliverables/esthe-next-10/operation-sheet-layout-r2-validation.json")
              .read_text(encoding="utf-8")
          )

          pdf=Path(meta["pdf"])
          png=Path(meta["png"])
          assert pdf.is_file() and png.is_file()
          assert hashlib.sha256(pdf.read_bytes()).hexdigest()==meta["sha256"]["pdf"]
          assert hashlib.sha256(png.read_bytes()).hexdigest()==meta["sha256"]["png"]
          assert meta["step"]=="ESTHE-NEXT-10A-R2"
          assert meta["a4_portrait"] is True
          assert meta["page_count"]==1
          assert meta["qr_all_pass"] is True
          assert layout["layout_reference"]=="DPRO_KSH_NEXT"
          assert len(layout["expected_urls"])==6
          print("R2 committed assets and SHA256: PASS")
          PY

      - name: "Create change-before backup tag"
        shell: bash
        run: |
          set -Eeuo pipefail
          CHANGE_BEFORE_SHA="$GITHUB_SHA"
          mapfile -t HEAD_FILES < <(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          if [[ "${#HEAD_FILES[@]}" -eq 1 && "${HEAD_FILES[0]}" == "$WORKFLOW_FILE" ]]; then
            CHANGE_BEFORE_SHA="$(git rev-parse "${GITHUB_SHA}^")"
          fi

          JST_DATE="$(TZ=Asia/Tokyo date +%Y%m%d)"
          BASE_TAG="${BACKUP_TAG_PREFIX}-${JST_DATE}"
          BACKUP_TAG="$BASE_TAG"
          if git ls-remote --exit-code --tags origin "refs/tags/$BACKUP_TAG" >/dev/null 2>&1; then
            BACKUP_TAG="${BASE_TAG}-run-${GITHUB_RUN_ID}"
          fi

          git tag -a "$BACKUP_TAG" "$CHANGE_BEFORE_SHA"             -m "DPRO ESTHE before NEXT-10A-R3: $CHANGE_BEFORE_SHA"
          git push origin "refs/tags/$BACKUP_TAG"

          echo "CHANGE_BEFORE_SHA=$CHANGE_BEFORE_SHA" >> "$GITHUB_ENV"
          echo "BACKUP_TAG=$BACKUP_TAG" >> "$GITHUB_ENV"

      - name: "Read expected publication metadata"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          import json,os
          from pathlib import Path

          meta=json.loads(
              Path("deliverables/esthe-next-10/operation-sheet-validation.json")
              .read_text(encoding="utf-8")
          )
          with open(os.environ["GITHUB_ENV"],"a",encoding="utf-8") as f:
              f.write(f"PDF_REL={meta['pdf']}\n")
              f.write(f"PNG_REL={meta['png']}\n")
              f.write(f"EXPECTED_PDF_SHA={meta['sha256']['pdf']}\n")
              f.write(f"EXPECTED_PNG_SHA={meta['sha256']['png']}\n")
          PY

      - name: "Wait until published PDF and PNG exactly match"
        shell: bash
        run: |
          set -Eeuo pipefail
          PDF_URL="$PAGES_BASE/${PDF_REL}"
          PNG_URL="$PAGES_BASE/${PNG_REL}"
          MATCHED="false"
          : > /tmp/esthe-next10a-r3-publication-wait.log

          for attempt in $(seq 1 60); do
            CACHE_KEY="${EXPECTED_PDF_SHA}-${GITHUB_RUN_ID}-${attempt}"
            PDF_CODE="$(curl -L -sS --compressed --retry 2               --connect-timeout 8 --max-time 35               -H "Cache-Control: no-cache, no-store, max-age=0"               -H "Pragma: no-cache"               -o /tmp/esthe-next10a-r3-public.pdf               -w "%{http_code}"               "$PDF_URL?publication_sha=$CACHE_KEY" || true)"

            PNG_CODE="$(curl -L -sS --compressed --retry 2               --connect-timeout 8 --max-time 35               -H "Cache-Control: no-cache, no-store, max-age=0"               -H "Pragma: no-cache"               -o /tmp/esthe-next10a-r3-public.png               -w "%{http_code}"               "$PNG_URL?publication_sha=$CACHE_KEY" || true)"

            PDF_SHA="$(sha256sum /tmp/esthe-next10a-r3-public.pdf 2>/dev/null | awk '{print $1}' || true)"
            PNG_SHA="$(sha256sum /tmp/esthe-next10a-r3-public.png 2>/dev/null | awk '{print $1}' || true)"
            PDF_BYTES="$(stat -c '%s' /tmp/esthe-next10a-r3-public.pdf 2>/dev/null || echo 0)"
            PNG_BYTES="$(stat -c '%s' /tmp/esthe-next10a-r3-public.png 2>/dev/null || echo 0)"

            printf 'attempt=%s pdf_http=%s pdf_sha=%s pdf_bytes=%s png_http=%s png_sha=%s png_bytes=%s\n'               "$attempt" "$PDF_CODE" "$PDF_SHA" "$PDF_BYTES"               "$PNG_CODE" "$PNG_SHA" "$PNG_BYTES"               | tee -a /tmp/esthe-next10a-r3-publication-wait.log

            if [[ "$PDF_CODE" == "200"               && "$PNG_CODE" == "200"               && "$PDF_SHA" == "$EXPECTED_PDF_SHA"               && "$PNG_SHA" == "$EXPECTED_PNG_SHA" ]]; then
              MATCHED="true"
              echo "PUBLICATION_ATTEMPT=$attempt" >> "$GITHUB_ENV"
              break
            fi

            sleep 10
          done

          if [[ "$MATCHED" != "true" ]]; then
            echo "::error::GitHub Pages公開ファイルがCommit済みSHA256へ切り替わりませんでした"
            echo "Expected PDF: $EXPECTED_PDF_SHA"
            echo "Actual PDF:   $(sha256sum /tmp/esthe-next10a-r3-public.pdf 2>/dev/null | awk '{print $1}' || true)"
            echo "Expected PNG: $EXPECTED_PNG_SHA"
            echo "Actual PNG:   $(sha256sum /tmp/esthe-next10a-r3-public.png 2>/dev/null | awk '{print $1}' || true)"
            exit 1
          fi

      - name: "Install public PDF verification dependencies"
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y libzbar0
          python3 -m pip install --upgrade pip
          python3 -m pip install             pillow pymupdf opencv-python-headless pyzbar

      - name: "Verify published PDF PNG and six QR codes"
        shell: bash
        env:
          PUBLIC_PDF_PATH: "/tmp/esthe-next10a-r3-public.pdf"
          PUBLIC_PNG_PATH: "/tmp/esthe-next10a-r3-public.png"
          PUBLIC_REPORT_PATH: ".dpro-next/esthe-next10a-r3-publication-validation.json"
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-10A-R3-verify>","exec"))'

      - name: "Update R3 completion ledger"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-10A-R3-ledger>","exec"))'

          grep -q 'current_step: "ESTHE-NEXT-10A-R3-COMPLETE"'             .dpro-next/esthe-step-state.yml
          grep -q 'next_step: "ESTHE-NEXT-10B-PRODUCT-SITE"'             .dpro-next/esthe-step-state.yml
          grep -q 'public_pdf_sha256_match: true'             .dpro-next/esthe-step-state.yml
          grep -q 'public_png_sha256_match: true'             .dpro-next/esthe-step-state.yml
          grep -q 'public_pdf_qr_decode_pass: true'             .dpro-next/esthe-step-state.yml

      - name: "Upload R3 publication verification artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "ESTHE-NEXT-10A-R3-publication-${{ github.run_id }}"
          path: |
            .dpro-next/esthe-next10a-r3-publication-validation.json
            .dpro-next/esthe-next10a-r3-report.txt
            /tmp/esthe-next10a-r3-publication-wait.log
          if-no-files-found: warn
          retention-days: 30

      - name: "Commit publication record, delete workflow and push"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          git add             .dpro-next/esthe-step-state.yml             .dpro-next/esthe-current-baseline.yml             .dpro-next/esthe-next10a-r3-publication-validation.json             .dpro-next/esthe-next10a-r3-report.txt

          git rm --ignore-unmatch             "$WORKFLOW_FILE"             ".github/workflows/ESTHE-NEXT-10A-R2.yml"             ".github/workflows/ESTHE-NEXT-10A.yml"

          git diff --cached --quiet && {
            echo "::error::Commit対象がありません"; exit 1;
          }

          git commit -m "DPRO ESTHE NEXT-10A-R3 complete: publication verified"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: "Final post-commit exact publication confirmation"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          PDF_URL="$PAGES_BASE/${PDF_REL}"
          PNG_URL="$PAGES_BASE/${PNG_REL}"
          FINAL_MATCH="false"

          for attempt in $(seq 1 36); do
            CACHE_KEY="final-${EXPECTED_PDF_SHA}-${GITHUB_RUN_ID}-${attempt}"

            PDF_CODE="$(curl -L -sS --compressed --retry 2               --connect-timeout 8 --max-time 35               -H "Cache-Control: no-cache, no-store, max-age=0"               -H "Pragma: no-cache"               -o /tmp/esthe-next10a-r3-final.pdf               -w "%{http_code}"               "$PDF_URL?publication_sha=$CACHE_KEY" || true)"

            PNG_CODE="$(curl -L -sS --compressed --retry 2               --connect-timeout 8 --max-time 35               -H "Cache-Control: no-cache, no-store, max-age=0"               -H "Pragma: no-cache"               -o /tmp/esthe-next10a-r3-final.png               -w "%{http_code}"               "$PNG_URL?publication_sha=$CACHE_KEY" || true)"

            PDF_SHA="$(sha256sum /tmp/esthe-next10a-r3-final.pdf 2>/dev/null | awk '{print $1}' || true)"
            PNG_SHA="$(sha256sum /tmp/esthe-next10a-r3-final.png 2>/dev/null | awk '{print $1}' || true)"

            if [[ "$PDF_CODE" == "200"               && "$PNG_CODE" == "200"               && "$PDF_SHA" == "$EXPECTED_PDF_SHA"               && "$PNG_SHA" == "$EXPECTED_PNG_SHA" ]]; then
              FINAL_MATCH="true"
              break
            fi

            sleep 10
          done

          [[ "$FINAL_MATCH" == "true" ]] || {
            echo "::error::最終Commit後の公開SHA256確認に失敗しました"
            exit 1
          }

          echo "### NEXT-10A-R3公開確認" >> "$GITHUB_STEP_SUMMARY"
          echo "- R2操作体験シート本体: **変更なし・正常**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pages切替待機回数: **${PUBLICATION_ATTEMPT}**" >> "$GITHUB_STEP_SUMMARY"
          echo "- 公開PDF SHA256: **一致**" >> "$GITHUB_STEP_SUMMARY"
          echo "- 公開PNG SHA256: **一致**" >> "$GITHUB_STEP_SUMMARY"
          echo "- 公開PDF内QR: **6 / 6 PASS**" >> "$GITHUB_STEP_SUMMARY"
          echo "- 次STEP: **ESTHE-NEXT-10B-PRODUCT-SITE**" >> "$GITHUB_STEP_SUMMARY"
