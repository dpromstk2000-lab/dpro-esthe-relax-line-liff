# DPRO エステ LINE
# STEP名: ESTHE-NEXT-10A
#
# 対象ファイル:
# - deliverables/esthe-next-10/ 操作体験シートPDF・PNG・QR検査結果
# - 実画面スクリーンショット
# - DPRO NEXT完成台帳
#
# 目的:
# - 実画面を自動撮影
# - A4縦1ページの操作体験シートを生成
# - PDFをPNG化
# - 最終PDF内の全QRを実読取してURL一致を検査
#
# 前STEP:
# - current_step: ESTHE-NEXT-9-COMPLETE
# - next_step: ESTHE-NEXT-10
#
# 次STEP:
# - ESTHE-NEXT-10B-PRODUCT-SITE
#
# Worker変更: なし
# Supabase変更: なし
# API変更: なし
#
# 成功後:
# - 自動Commit / Push
# - このYML自身を削除

name: "DPRO ESTHE NEXT-10A - Operation Experience Sheet"

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ESTHE-NEXT-10A.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: "dpro-esthe-next"
  cancel-in-progress: false

env:
  WORKFLOW_FILE: ".github/workflows/ESTHE-NEXT-10A.yml"
  EXPECTED_PREVIOUS_STEP: "ESTHE-NEXT-9-COMPLETE"
  EXPECTED_NEXT_STEP: "ESTHE-NEXT-10"
  BACKUP_TAG_PREFIX: "backup-esthe-before-next10a"
  API_BASE: "https://dpro-esthe-relax-line-api.dpromstk2000.workers.dev"
  PAGES_BASE: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff"
  PRODUCT_URL: "https://dpromstk2000-lab.github.io/dpro-line-systems-site/systems/esthe.html"
  LINE_URL: "https://lin.ee/YxJGXV6D"

jobs:
  esthe-next-10a:
    name: "Create and validate ESTHE operation sheet"
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: "Checkout repository with history"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: "Configure Git identity"
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "DPRO NEXT Actions"
          git config user.email "actions@users.noreply.github.com"

      - name: "Confirm ESTHE-NEXT-9 completion"
        shell: bash
        run: |
          set -Eeuo pipefail
          STATE_FILE=".dpro-next/esthe-step-state.yml"
          STATIC_FILE="esthe-next9-static-report.json"
          test -f "$STATE_FILE"
          test -f "$STATIC_FILE"
          CURRENT_STEP="$(awk -F': *' '/^current_step:/{gsub(/["'"'"']/, "", $2); print $2; exit}' "$STATE_FILE")"
          NEXT_STEP="$(awk -F': *' '/^next_step:/{gsub(/["'"'"']/, "", $2); print $2; exit}' "$STATE_FILE")"
          [[ "$CURRENT_STEP" == "$EXPECTED_PREVIOUS_STEP" ]] || { echo "::error::前STEP未完了 current_step=$CURRENT_STEP"; exit 1; }
          [[ "$NEXT_STEP" == "$EXPECTED_NEXT_STEP" ]] || { echo "::error::next_step不一致 next_step=$NEXT_STEP"; exit 1; }
          python3 - <<'PY'
          import json
          from pathlib import Path
          report=json.loads(Path("esthe-next9-static-report.json").read_text(encoding="utf-8"))
          if report.get("summary",{}).get("ng") != 0:
              raise SystemExit("NEXT-9 static report contains NG")
          print(json.dumps(report["summary"],ensure_ascii=False))
          PY

      - name: "Verify public baseline URLs"
        shell: bash
        run: |
          set -Eeuo pipefail
          for url in             "$PAGES_BASE/index-brush.html"             "$PAGES_BASE/member.html"             "$PAGES_BASE/owner.html"             "$PAGES_BASE/owner-ipad.html"             "$PAGES_BASE/staff.html"             "$PAGES_BASE/system-check.html"             "$PRODUCT_URL"             "$LINE_URL"
          do
            code="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 50 -o /dev/null -w "%{http_code}" "$url")"
            [[ "$code" =~ ^2|^3 ]] || { echo "::error::URL HTTP $code $url"; exit 1; }
          done
          HEALTH_CODE="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 40 -o /tmp/next10a-health.json -w "%{http_code}" "$API_BASE/api/health")"
          [[ "$HEALTH_CODE" =~ ^2 ]] || { echo "::error::health HTTP $HEALTH_CODE"; exit 1; }

      - name: "Create change-before backup tag"
        shell: bash
        run: |
          set -Eeuo pipefail
          CHANGE_BEFORE_SHA="$GITHUB_SHA"
          mapfile -t HEAD_FILES < <(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          if [[ "${#HEAD_FILES[@]}" -eq 1 && "${HEAD_FILES[0]}" == "$WORKFLOW_FILE" ]]; then
            CHANGE_BEFORE_SHA="$(git rev-parse "${GITHUB_SHA}^")"
          fi
          JST_DATE="$(TZ=Asia/Tokyo date +%Y%m%d)"
          BASE_TAG="${BACKUP_TAG_PREFIX}-${JST_DATE}"
          BACKUP_TAG="$BASE_TAG"
          if git ls-remote --exit-code --tags origin "refs/tags/$BACKUP_TAG" >/dev/null 2>&1; then
            BACKUP_TAG="${BASE_TAG}-run-${GITHUB_RUN_ID}"
          fi
          git tag -a "$BACKUP_TAG" "$CHANGE_BEFORE_SHA" -m "DPRO ESTHE before NEXT-10A: $CHANGE_BEFORE_SHA"
          git push origin "refs/tags/$BACKUP_TAG"
          echo "CHANGE_BEFORE_SHA=$CHANGE_BEFORE_SHA" >> "$GITHUB_ENV"
          echo "BACKUP_TAG=$BACKUP_TAG" >> "$GITHUB_ENV"

      - name: "Prepare demo data"
        shell: bash
        run: |
          set -Eeuo pipefail
          CODE="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 60             -X POST -H "Accept: application/json" -H "x-admin-secret: 1234"             -o /tmp/next10a-demo.json -w "%{http_code}"             "$API_BASE/api/admin/demo/prepare")"
          [[ "$CODE" =~ ^2 ]] || { cat /tmp/next10a-demo.json; echo "::error::demo prepare HTTP $CODE"; exit 1; }
          python3 - <<'PY'
          import json
          from pathlib import Path
          data=json.loads(Path("/tmp/next10a-demo.json").read_text(encoding="utf-8"))
          if data.get("ok") is False:
              raise SystemExit(data)
          print(json.dumps(data,ensure_ascii=False,indent=2))
          PY

      - name: "Install screenshot and PDF dependencies"
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y libzbar0 fonts-ipafont-gothic
          python3 -m pip install --upgrade pip
          python3 -m pip install             playwright reportlab qrcode pillow pymupdf             opencv-python-headless pyzbar
          python3 -m playwright install --with-deps chromium

      - name: "Capture real public screens"
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p deliverables/esthe-next-10
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-10A-capture>","exec"))'

      - name: "Create A4 PDF PNG and verify every QR"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-10A-pdf>","exec"))'

      - name: "Validate operation sheet artifacts"
        shell: bash
        run: |
          set -Eeuo pipefail
          DATE="$(TZ=Asia/Tokyo date +%Y%m%d)"
          PDF="deliverables/esthe-next-10/DPRO_ESTHE_NEXT_operation_experience_sheet_${DATE}.pdf"
          PNG="deliverables/esthe-next-10/DPRO_ESTHE_NEXT_operation_experience_sheet_${DATE}.png"
          test -s "$PDF"
          test -s "$PNG"
          test -s deliverables/esthe-next-10/operation-sheet-qr-validation.json
          test -s deliverables/esthe-next-10/operation-sheet-validation.json
          test -s deliverables/esthe-next-10/screenshot-validation.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          qr=json.loads(Path("deliverables/esthe-next-10/operation-sheet-qr-validation.json").read_text(encoding="utf-8"))
          meta=json.loads(Path("deliverables/esthe-next-10/operation-sheet-validation.json").read_text(encoding="utf-8"))
          shots=json.loads(Path("deliverables/esthe-next-10/screenshot-validation.json").read_text(encoding="utf-8"))
          assert qr["all_pass"] is True
          assert len(qr["final_pdf_qr"]) == 6
          assert all(item["pass"] for item in qr["final_pdf_qr"])
          assert meta["a4_portrait"] is True and meta["page_count"] == 1
          assert meta["qr_all_pass"] is True
          assert shots["count"] == 5
          print("A4/PDF/PNG/QR/screenshots: PASS")
          PY

      - name: "Update NEXT-10A ledger"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-10A-ledger>","exec"))'
          grep -q 'current_step: "ESTHE-NEXT-10A-COMPLETE"' .dpro-next/esthe-step-state.yml
          grep -q 'next_step: "ESTHE-NEXT-10B-PRODUCT-SITE"' .dpro-next/esthe-step-state.yml
          grep -q 'final_pdf_qr_decode_pass: true' .dpro-next/esthe-step-state.yml

      - name: "Upload NEXT-10A artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "ESTHE-NEXT-10A-operation-sheet-${{ github.run_id }}"
          path: |
            deliverables/esthe-next-10/
            .dpro-next/esthe-next10a-assets-result.yml
            .dpro-next/esthe-next10a-report.txt
          if-no-files-found: warn
          retention-days: 30

      - name: "Commit assets, delete workflow and push"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          git add             deliverables/esthe-next-10             .dpro-next/esthe-step-state.yml             .dpro-next/esthe-current-baseline.yml             .dpro-next/esthe-next10a-assets-result.yml             .dpro-next/esthe-next10a-report.txt
          git rm --ignore-unmatch "$WORKFLOW_FILE"
          git diff --cached --quiet && { echo "::error::Commit対象がありません"; exit 1; }
          git commit -m "DPRO ESTHE NEXT-10A complete: operation experience sheet"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "COMPLETION_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: "Confirm GitHub Pages PDF and PNG publication"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          DATE="$(TZ=Asia/Tokyo date +%Y%m%d)"
          PDF_URL="$PAGES_BASE/deliverables/esthe-next-10/DPRO_ESTHE_NEXT_operation_experience_sheet_${DATE}.pdf"
          PNG_URL="$PAGES_BASE/deliverables/esthe-next-10/DPRO_ESTHE_NEXT_operation_experience_sheet_${DATE}.png"
          PUBLISHED="false"
          for attempt in $(seq 1 30); do
            PDF_HEADERS="$(curl -L -sSI --retry 2 --connect-timeout 8 --max-time 30 "$PDF_URL?run=${GITHUB_RUN_ID}_${attempt}" || true)"
            PNG_CODE="$(curl -L -sS --retry 2 --connect-timeout 8 --max-time 30 -o /dev/null -w "%{http_code}" "$PNG_URL?run=${GITHUB_RUN_ID}_${attempt}" || true)"
            if echo "$PDF_HEADERS" | grep -qi "content-type: application/pdf" && [[ "$PNG_CODE" == "200" ]]; then
              PUBLISHED="true"
              break
            fi
            sleep 10
          done
          [[ "$PUBLISHED" == "true" ]] || { echo "::error::PDF/PNG public publication not confirmed"; exit 1; }
          echo "### NEXT-10A公開結果" >> "$GITHUB_STEP_SUMMARY"
          echo "- 操作体験シートPDF: $PDF_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- PNG: $PNG_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- QR実読取: **6 / 6 PASS**" >> "$GITHUB_STEP_SUMMARY"
          echo "- 次STEP: **ESTHE-NEXT-10B-PRODUCT-SITE**" >> "$GITHUB_STEP_SUMMARY"
