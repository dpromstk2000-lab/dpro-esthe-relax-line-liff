          class Parser(HTMLParser):
              def __init__(self):
                  super().__init__(convert_charrefs=True)
                  self.ids = []
              def handle_starttag(self, tag, attrs):
                  for key, value in attrs:
                      if key.lower() == "id" and value:
                          self.ids.append(value)
              def handle_startendtag(self, tag, attrs):
                  self.handle_starttag(tag, attrs)

          for file in files:
              text = (ROOT / file).read_text(encoding="utf-8")
              parser = Parser()
              try:
                  parser.feed(text)
                  parser.close()
              except Exception as exc:
                  errors.append(f"HTML解析NG: {file}: {exc}")
                  continue

              if not all(token in text.lower() for token in ["<html", "<head", "<body"]):
                  errors.append(f"HTML基本構造NG: {file}")
              else:
                  ok.append(f"HTML基本構造: {file}")

              duplicates = sorted(key for key, value in Counter(parser.ids).items() if value > 1)
