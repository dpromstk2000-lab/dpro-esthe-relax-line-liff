# DPRO エステ LINE
# STEP名: ESTHE-NEXT-2-R2
#
# 対象ファイル:
# - index.html
# - index-brush.html
# - member.html
# - owner.html
# - admin.html
# - staff.html
# - system-check.html
# - .dpro-next/esthe-step-state.yml
#
# 実施する変更:
# - 公開画面から管理コード表示・管理画面リンク・内部確認情報を分離
# - 管理画面のコードをsessionStorageへ一時保存し、削除ボタンを常設
# - admin_keyのURL付与を廃止し、既存Worker対応済みのx-admin-secretヘッダーへ統一
# - owner.htmlの「今日やること」を優先度・状態・期限順に再構成
# - 初期取得は既存/api/admin/dayのままとし、新しい全件取得を追加しない
# - 主要画面へSTEP ESTHE-NEXT-2マーカーを付与
#
# 追加・修正する機能:
# - 管理コード入力・設定・削除
# - 管理コード未入力時の安全停止
# - 会計待ち、来店済み、施術中、まもなく来店、予約、期限フォローの優先表示
# - 今日やることから対象予約へ移動、フォロー画面へ移動
#
# 変更前バックアップタグ:
# - backup-esthe-before-next2-YYYYMMDD
#
# 前STEP完了確認:
# - current_step: ESTHE-NEXT-1-COMPLETE
# - next_step: ESTHE-NEXT-2
#
# 自動検査:
# - HTML / JavaScript / YML構文
# - HTML ID重複
# - 既存機能維持
# - エステ進捗ロジック
# - 公開画面への管理情報混入
# - 管理コード入力・削除ボタン
# - admin_key URL付与の残存
# - x-admin-secretヘッダー対応
# - Workerヘッダー認証互換性
# - 公開URL
#
# Worker変更: なし
# Supabase変更: なし
# API変更: なし（既存認証方法の利用方法のみ変更）
#
# 次のSTEP:
# - ESTHE-NEXT-3
#
# R2修正内容:
# - 初版はmember.htmlの「確認URL」パネルを正規表現で置換できずcount=0で安全停止
# - R2は見出し位置とdiv階層から外側panelを特定して置換
# - 初版は画面ファイル・台帳をCommitしていないため、正常版から再実行
#
# 成功後:
# - 台帳更新
# - 自動Commit / Push
# - このYML自身を削除

name: "DPRO ESTHE NEXT-2-R2 - Owner Today and Admin Separation"

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ESTHE-NEXT-2-R2.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: "dpro-esthe-next"
  cancel-in-progress: false

env:
  STEP_NAME: "ESTHE-NEXT-2"
  SYSTEM_NAME: "DPRO エステ LINE"
  WORKFLOW_FILE: ".github/workflows/ESTHE-NEXT-2-R2.yml"
  EXPECTED_PREVIOUS_STEP: "ESTHE-NEXT-1-COMPLETE"
  EXPECTED_CURRENT_NEXT: "ESTHE-NEXT-2"
  CURRENT_STEP_AFTER_SUCCESS: "ESTHE-NEXT-2-COMPLETE"
  NEXT_STEP_AFTER_SUCCESS: "ESTHE-NEXT-3"
  BACKUP_TAG_PREFIX: "backup-esthe-before-next2-r2"
  API_BASE: "https://dpro-esthe-relax-line-api.dpromstk2000.workers.dev"
  PAGES_BASE: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff"
  SHOP_CODE: "esthe_demo_default"
  WORKER_CHANGED: "false"
  SUPABASE_CHANGED: "false"
  API_CHANGED: "false"

jobs:
  esthe-next-2:
    name: "Apply ESTHE NEXT-2 safely"
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: "Checkout repository with history"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: "Configure Git identity"
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "DPRO NEXT Actions"
          git config user.email "actions@users.noreply.github.com"

      - name: "Confirm ESTHE-NEXT-1 completion"
        id: precheck
        shell: bash
        run: |
          set -Eeuo pipefail

          STATE_FILE=".dpro-next/esthe-step-state.yml"
          test -f "$STATE_FILE"

          CURRENT_STEP="$(awk -F': *' '/^current_step:/{gsub(/["'"'"']/, "", $2); print $2; exit}' "$STATE_FILE")"
          NEXT_STEP="$(awk -F': *' '/^next_step:/{gsub(/["'"'"']/, "", $2); print $2; exit}' "$STATE_FILE")"

          if [[ "$CURRENT_STEP" != "$EXPECTED_PREVIOUS_STEP" ]]; then
            echo "::error::前STEP未完了です。current_step=$CURRENT_STEP / expected=$EXPECTED_PREVIOUS_STEP"
            exit 1
          fi

          if [[ "$NEXT_STEP" != "$EXPECTED_CURRENT_NEXT" ]]; then
            echo "::error::実行対象STEPが一致しません。next_step=$NEXT_STEP / expected=$EXPECTED_CURRENT_NEXT"
            exit 1
          fi

          echo "### 前STEP完了確認" >> "$GITHUB_STEP_SUMMARY"
          echo "- current_step: \`$CURRENT_STEP\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- next_step: \`$NEXT_STEP\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- 判定: **OK**" >> "$GITHUB_STEP_SUMMARY"

      - name: "Confirm Worker supports header-based admin access"
        shell: bash
        run: |
          set -Eeuo pipefail

          URL="${API_BASE}/api/admin/system-check?shop_code=${SHOP_CODE}"
          HTTP_CODE="$(curl -L -sS --retry 3 --retry-delay 2 \
            --connect-timeout 10 --max-time 45 \
            -H "Accept: application/json" \
            -H "x-admin-secret: 1234" \
            -o /tmp/esthe-next2-admin-check.json \
            -w "%{http_code}" \
            "$URL")"

          if [[ ! "$HTTP_CODE" =~ ^2 ]]; then
            echo "::error::x-admin-secretヘッダーで管理APIを確認できません。HTTP $HTTP_CODE"
            cat /tmp/esthe-next2-admin-check.json || true
            exit 1
          fi

          python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("/tmp/esthe-next2-admin-check.json").read_text(encoding="utf-8"))
          if data.get("ok") is not True:
              raise SystemExit("Worker system-check returned ok=false")
          print("Worker header authentication compatibility: OK")
          print("Worker version:", data.get("version", "-"))
          PY

          echo "### Worker認証互換性" >> "$GITHUB_STEP_SUMMARY"
          echo "- x-admin-secret: **利用可能**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Worker差し替え: **不要**" >> "$GITHUB_STEP_SUMMARY"

      - name: "Create change-before backup tag"
        id: backup
        shell: bash
        run: |
          set -Eeuo pipefail

          CHANGE_BEFORE_SHA="$GITHUB_SHA"
          mapfile -t HEAD_FILES < <(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")

          if [[ "${#HEAD_FILES[@]}" -eq 1 && "${HEAD_FILES[0]}" == "$WORKFLOW_FILE" ]]; then
            CHANGE_BEFORE_SHA="$(git rev-parse "${GITHUB_SHA}^")"
          fi

          JST_DATE="$(TZ=Asia/Tokyo date +%Y%m%d)"
          BASE_TAG="${BACKUP_TAG_PREFIX}-${JST_DATE}"
          BACKUP_TAG="$BASE_TAG"

          if git ls-remote --exit-code --tags origin "refs/tags/$BACKUP_TAG" >/dev/null 2>&1; then
            BACKUP_TAG="${BASE_TAG}-run-${GITHUB_RUN_ID}"
          fi

          git tag -a "$BACKUP_TAG" "$CHANGE_BEFORE_SHA" \
            -m "DPRO ESTHE before NEXT-2: $CHANGE_BEFORE_SHA"
          git push origin "refs/tags/$BACKUP_TAG"

          {
            echo "CHANGE_BEFORE_SHA=$CHANGE_BEFORE_SHA"
            echo "BACKUP_TAG=$BACKUP_TAG"
          } >> "$GITHUB_ENV"

          echo "### 変更前バックアップ" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`$CHANGE_BEFORE_SHA\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`$BACKUP_TAG\`" >> "$GITHUB_STEP_SUMMARY"

      - name: "Apply NEXT-2 changes"
        shell: bash
        run: |
          set -Eeuo pipefail

          python3 <<'PY'
          from __future__ import annotations

          import datetime as dt
          import json
          import re
          from pathlib import Path
          from typing import Dict, List

          ROOT = Path(".")
          STEP_MARKER = "<!-- STEP ESTHE-NEXT-2 -->"
          MANAGER_FILES = ["owner.html", "admin.html", "staff.html", "system-check.html"]
          PUBLIC_FILES = ["index.html", "index-brush.html", "member.html"]
          ALL_FILES = PUBLIC_FILES + MANAGER_FILES
          changed: List[str] = []

          def read(path: str) -> str:
              p = ROOT / path
              if not p.exists():
                  raise RuntimeError(f"対象ファイルがありません: {path}")
              return p.read_text(encoding="utf-8")

          def write(path: str, text: str) -> None:
              if not text.endswith("\n"):
                  text += "\n"
              (ROOT / path).write_text(text, encoding="utf-8")
              if path not in changed:
                  changed.append(path)

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{label}: 置換対象が1件ではありません count={count}")
              return text.replace(old, new, 1)

          def regex_once(text: str, pattern: str, replacement: str, label: str, flags=0) -> str:
              result, count = re.subn(pattern, replacement, text, count=1, flags=flags)
              if count != 1:
                  raise RuntimeError(f"{label}: 正規表現置換対象が1件ではありません count={count}")
              return result

          def replace_panel_by_heading(text: str, heading: str, replacement: str, label: str) -> str:
              marker = f"<h2>{heading}</h2>"
              marker_count = text.count(marker)
              if marker_count != 1:
                  raise RuntimeError(f"{label}: 見出しが1件ではありません count={marker_count}")

              heading_pos = text.find(marker)
              panel_start = text.rfind('<div class="panel">', 0, heading_pos)
              if panel_start < 0:
                  raise RuntimeError(f"{label}: 外側panel開始位置を特定できません")

              depth = 0
              panel_end = -1
              for match in re.finditer(r"</?div\b[^>]*>", text[panel_start:], flags=re.IGNORECASE):
                  tag = match.group(0).lower()
                  if tag.startswith("</div"):
                      depth -= 1
                      if depth == 0:
                          panel_end = panel_start + match.end()
                          break
                  else:
                      depth += 1

              if panel_end < 0:
                  raise RuntimeError(f"{label}: 外側panel終了位置を特定できません")

              target = text[panel_start:panel_end]
              if marker not in target:
                  raise RuntimeError(f"{label}: 特定したpanel内に見出しがありません")

              return text[:panel_start] + replacement.strip() + text[panel_end:]

          def ensure_step_marker(text: str) -> str:
              if STEP_MARKER in text:
                  return text
              return regex_once(
                  text,
                  r"(<!doctype\s+html\s*>\s*)",
                  r"\1" + STEP_MARKER + "\n",
                  "STEPマーカー追加",
                  re.IGNORECASE,
              )

          ADMIN_CSS = r"""
          /* DPRO NEXT-2: 管理コード入力・削除 */
          .dpro-admin-access{
            margin:0 0 18px;
            padding:16px 18px;
            border:1px solid var(--line);
            border-radius:20px;
            background:rgba(255,255,255,.96);
            box-shadow:0 10px 28px rgba(88,55,46,.07);
          }
          .dpro-admin-head{
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:12px;
            flex-wrap:wrap;
          }
          .dpro-admin-title{font-size:16px;font-weight:1000;color:var(--main)}
          .dpro-admin-status{
            display:inline-flex;
            align-items:center;
            min-height:30px;
            padding:6px 10px;
            border-radius:999px;
            background:#fff6df;
            border:1px solid #efd49e;
            color:#8d600d;
            font-size:12px;
            font-weight:950;
          }
          .dpro-admin-status.ok{
            background:#e8f8f1;
            border-color:#bce9d8;
            color:#087a59;
          }
          .dpro-admin-controls{
            display:grid;
            grid-template-columns:minmax(180px,1fr) auto auto;
            gap:9px;
            margin-top:12px;
          }
          .dpro-admin-controls input{
            width:100%;
            min-height:46px;
            border:1px solid var(--line);
            border-radius:14px;
            background:#fff;
            color:var(--text,var(--ink,#2d211f));
            padding:11px 13px;
            font-size:16px;
            font-weight:900;
          }
          .dpro-admin-button{
            min-height:46px;
            border:1px solid var(--line);
            border-radius:14px;
            padding:10px 15px;
            background:var(--main);
            color:#fff;
            font-weight:950;
            cursor:pointer;
          }
          .dpro-admin-button.clear{
            background:#fff;
            color:var(--danger,var(--bad,#b33a3a));
          }
          .dpro-admin-help{
            margin:9px 0 0;
            color:var(--muted);
            font-size:12px;
            line-height:1.65;
            font-weight:750;
          }
          @media(max-width:680px){
            .dpro-admin-controls{grid-template-columns:1fr}
            .dpro-admin-button{width:100%}
          }
          """

          ADMIN_HTML = r"""
          <section class="dpro-admin-access" id="dproAdminAccess" aria-label="管理コード">
            <div class="dpro-admin-head">
              <div class="dpro-admin-title">管理画面の接続</div>
              <span class="dpro-admin-status" id="dproAdminStatus">管理コード未入力</span>
            </div>
            <div class="dpro-admin-controls">
              <input id="dproAdminCode" type="password" inputmode="numeric"
                autocomplete="current-password" placeholder="管理コードを入力">
              <button class="dpro-admin-button" id="dproAdminSave" type="button">管理コードを設定</button>
              <button class="dpro-admin-button clear" id="dproAdminClear" type="button">管理コードを削除</button>
            </div>
            <p class="dpro-admin-help">
              管理コードはこのタブの一時領域だけに保存します。共有端末では操作後に「管理コードを削除」を押してください。
            </p>
          </section>
          """

          ADMIN_JS = r"""
          function dproAdminStatusMessage(message, ok=false){
            const status = document.getElementById("dproAdminStatus");
            if(!status) return;
            status.textContent = message;
            status.classList.toggle("ok", ok);
          }

          function dproRequireAdminCode(){
            if(!ADMIN_KEY){
              throw new Error("管理コードを入力し、「管理コードを設定」を押してください。");
            }
          }

          function dproInitAdminAccess(){
            const input = document.getElementById("dproAdminCode");
            const save = document.getElementById("dproAdminSave");
            const clear = document.getElementById("dproAdminClear");
            if(!input || !save || !clear) return;

            if(ADMIN_KEY && ADMIN_KEY !== DEMO_ADMIN_CODE){
              sessionStorage.removeItem(ADMIN_STORAGE_KEY);
              ADMIN_KEY = "";
            }

            if(ADMIN_KEY){
              input.value = "";
              input.placeholder = "管理コード設定済み";
              dproAdminStatusMessage("管理コード設定済み", true);
            }else{
              dproAdminStatusMessage("管理コード未入力", false);
            }

            save.addEventListener("click", () => {
              const value = String(input.value || "").trim();
              if(!value){
                dproAdminStatusMessage("管理コードを入力してください", false);
                input.focus();
                return;
              }
              if(value !== DEMO_ADMIN_CODE){
                dproAdminStatusMessage("管理コードが違います", false);
                input.select();
                return;
              }
              sessionStorage.setItem(ADMIN_STORAGE_KEY, value);
              ADMIN_KEY = value;
              dproAdminStatusMessage("管理コード設定済み", true);
              window.location.reload();
            });

            clear.addEventListener("click", () => {
              sessionStorage.removeItem(ADMIN_STORAGE_KEY);
              ADMIN_KEY = "";
              input.value = "";
              input.placeholder = "管理コードを入力";
              dproAdminStatusMessage("管理コードを削除しました", false);
              window.location.reload();
            });

            input.addEventListener("keydown", (event) => {
              if(event.key === "Enter") save.click();
            });
          }

          document.addEventListener("DOMContentLoaded", dproInitAdminAccess);
          """

          def add_admin_gate(path: str, nav_class: str) -> None:
              text = read(path)
              text = ensure_step_marker(text)

              # 固定表示された管理コードを削除
              text = re.sub(
                  r"\s*<span>\s*管理コード\s*[：:]\s*1234\s*</span>",
                  "",
                  text,
                  flags=re.IGNORECASE,
              )

              # CSS追加
              if "DPRO NEXT-2: 管理コード入力・削除" not in text:
                  text = replace_once(
                      text,
                      "</style>",
                      ADMIN_CSS + "\n</style>",
                      f"{path}: 管理コードCSS",
                  )

              # ナビゲーション直後に入力欄追加
              if 'id="dproAdminAccess"' not in text:
                  nav_pattern = rf'(<div\s+class="{re.escape(nav_class)}"[^>]*>.*?</div>)'
                  text = regex_once(
                      text,
                      nav_pattern,
                      r"\1\n" + ADMIN_HTML,
                      f"{path}: 管理コード入力欄",
                      re.DOTALL | re.IGNORECASE,
                  )

              # 固定ADMIN_KEYをsessionStorage方式へ変更
              text, count = re.subn(
                  r"""const\s+ADMIN_KEY\s*=\s*["']1234["'];""",
                  'const ADMIN_STORAGE_KEY = "dpro_esthe_admin_secret";\n'
                  'const DEMO_ADMIN_CODE = "1234";\n'
                  'let ADMIN_KEY = sessionStorage.getItem(ADMIN_STORAGE_KEY) || "";',
                  text,
                  count=1,
              )
              if count != 1:
                  raise RuntimeError(f"{path}: ADMIN_KEY置換対象が1件ではありません count={count}")

              # 共通JS追加
              if "function dproInitAdminAccess()" not in text:
                  dollar_pattern = r'(const\s+\$\s*=\s*\(id\)\s*=>\s*document\.getElementById\(id\);)'
                  text = regex_once(
                      text,
                      dollar_pattern,
                      r"\1\n\n" + ADMIN_JS,
                      f"{path}: 管理コードJS",
                  )

              write(path, text)

          # ---------- 公開画面の管理情報分離 ----------
          index = ensure_step_marker(read("index.html"))
          index = re.sub(
              r'<div class="version">.*?</div>',
              '<div class="version">LINE予約｜かんたん予約</div>',
              index,
              count=1,
              flags=re.DOTALL,
          )
          index = re.sub(
              r'<div class="dev-note">.*?</div>',
              '<div class="dev-note">ご予約内容は送信前の確認画面で確認できます。</div>',
              index,
              count=1,
              flags=re.DOTALL,
          )
          index = re.sub(
              r"const\s+VERSION\s*=\s*['\"][^'\"]+['\"];",
              "const VERSION = 'ESTHE-NEXT-2-PUBLIC-SIMPLE-20260723';",
              index,
              count=1,
          )
          write("index.html", index)

          brush = ensure_step_marker(read("index-brush.html"))
          brush = re.sub(
              r'<div class="badge">.*?index-brush\.html</div>',
              '<div class="badge">LINE予約・会員確認</div>',
              brush,
              count=1,
              flags=re.DOTALL | re.IGNORECASE,
          )
          brush = re.sub(
              r"\s*<span>\s*管理コード\s*[：:]\s*1234\s*</span>",
              "",
              brush,
              flags=re.IGNORECASE,
          )
          brush = re.sub(
              r'\s*<a\b[^>]*href=["\'][^"\']*(?:admin|owner|staff|system-check)\.html[^"\']*["\'][^>]*>.*?</a>',
              "",
              brush,
              flags=re.DOTALL | re.IGNORECASE,
          )
          brush = regex_once(
              brush,
              r'(<a class="btn" href="index\.html">シンプル予約へ</a>)',
              r'\1\n      <a class="btn" href="member.html">予約・履歴を確認</a>',
              "index-brush.html: 公開ナビゲーション",
          )
          brush = re.sub(
              r'const\s+VERSION\s*=\s*["\'][^"\']+["\'];',
              'const VERSION = "ESTHE-NEXT-2-PUBLIC-BRUSH-20260723";',
              brush,
              count=1,
          )
          write("index-brush.html", brush)

          member = ensure_step_marker(read("member.html"))
          member = re.sub(
              r'<div class="badge">.*?member\.html</div>',
              '<div class="badge">LINE会員ページ</div>',
              member,
              count=1,
              flags=re.DOTALL | re.IGNORECASE,
          )
          member = re.sub(
              r"\s*<span>\s*管理コード\s*[：:]\s*1234\s*</span>",
              "",
              member,
              flags=re.IGNORECASE,
          )
          member = re.sub(
              r'\s*<a\b[^>]*href=["\'][^"\']*(?:admin|owner|staff|system-check)\.html[^"\']*["\'][^>]*>.*?</a>',
              "",
              member,
              flags=re.DOTALL | re.IGNORECASE,
          )
          member = replace_panel_by_heading(
              member,
              "確認URL",
              """
              <div class="panel">
                <h2>ご利用案内</h2>
                <p class="sub">次回予約、回数券残数、来店履歴はこのページから確認できます。</p>
                <a class="btn primary" href="index-brush.html">新しい予約へ進む</a>
              </div>
              """,
              "member.html: 内部確認URLパネル分離",
          )
          member = re.sub(
              r'const\s+VERSION\s*=\s*["\'][^"\']+["\'];',
              'const VERSION = "ESTHE-NEXT-2-MEMBER-20260723";',
              member,
              count=1,
          )
          write("member.html", member)

          # ---------- 管理画面の管理コード方式 ----------
          add_admin_gate("owner.html", "topnav")
          add_admin_gate("admin.html", "topActions")
          add_admin_gate("staff.html", "toolbar")
          add_admin_gate("system-check.html", "top-actions")

          # owner.html: admin_keyクエリを廃止しヘッダーへ統一
          owner = read("owner.html")
          owner = regex_once(
              owner,
              r"""if\(url\.pathname\.startsWith\("/api/admin/"\)\)\{\s*
                    url\.searchParams\.set\("admin_key",\s*ADMIN_KEY\);\s*
                  \}""",
              """if(url.pathname.startsWith("/api/admin/")){
                dproRequireAdminCode();
              }""",
              "owner.html: admin_key URL廃止",
              re.DOTALL | re.VERBOSE,
          )
          owner = replace_once(
              owner,
