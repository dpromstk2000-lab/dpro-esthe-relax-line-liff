              "staff.html": [
                  "reservationList", "staffTabs", "statusFilter",
                  "refreshBtn", "copyTodayBtn",
              ],
              "member.html": [
                  "phoneInput", "reservationList", "ticketList", "historyList",
              ],
              "index-brush.html": [
                  "menuList", "staffList", "slotList",
                  "viewConsultation", "concerns",
              ],
              "index.html": [
                  "menuList", "staffList", "slotList",
                  "customerName", "customerPhone", "submitBtn",
              ],
              "system-check.html": [
                  "checks", "btnReload", "btnPrepare",
                  "phoneNormalizeList", "reflectList",
              ],
          }
          for file, tokens in feature_map.items():
              text = (ROOT / file).read_text(encoding="utf-8")
              missing = [token for token in tokens if token not in text]
              if missing:
                  errors.append(f"既存機能維持NG: {file}: {', '.join(missing)}")
              else:
                  ok.append(f"既存機能維持: {file}")

          # エステ業務ロジック
          combined = "\n".join((ROOT / file).read_text(encoding="utf-8") for file in files)
          statuses = [
              "reserved", "checked_in", "in_treatment",
              "waiting_payment", "completed", "cancelled",
          ]
          missing = [status for status in statuses if status not in combined]
          if missing:
              errors.append("進捗ステータス不足: " + ", ".join(missing))
          else:
              ok.append("エステ進捗ステータス維持")

          if combined.count("normalizePhone") < 4:
              errors.append("電話番号正規化の維持確認NG")
          else:
              ok.append("電話番号正規化維持")

          if "isPastSlot" not in combined and "過去日は予約できません" not in combined:
              warnings.append("過去日時防止はWorker側検査を継続")
          else:
              ok.append("過去日時防止ロジック維持")

          # 変更範囲
          diff = subprocess.run(
              ["git", "diff", "--name-only"],
              text=True,
              stdout=subprocess.PIPE,
              check=True,
          ).stdout.splitlines()
          allowed = set(files + [
              ".dpro-next/esthe-next2-change-record.json",
              ".dpro-next/esthe-step-state.yml",
              ".dpro-next/esthe-next2-report.txt",
              ".dpro-next/esthe-current-baseline.yml",
          ])
          unexpected = sorted(path for path in diff if path not in allowed)
          if unexpected:
              errors.append("想定外変更ファイル: " + ", ".join(unexpected))
          else:
              ok.append("変更範囲正常")

          report = {
              "step": "ESTHE-NEXT-2",
              "ok": len(ok),
              "attention": len(warnings),
              "ng": len(errors),
              "ok_items": ok,
              "attention_items": warnings,
              "ng_items": errors,
          }
          Path(".next2_tmp/validation.json").write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          summary = Path(__import__("os").environ["GITHUB_STEP_SUMMARY"])
          with summary.open("a", encoding="utf-8") as f:
              f.write("\n### NEXT-2 自動検査\n")
              f.write(f"- OK: {len(ok)}\n")
              f.write(f"- 注意: {len(warnings)}\n")
              f.write(f"- NG: {len(errors)}\n")
              if warnings:
                  f.write("\n#### 注意\n")
                  for item in warnings:
                      f.write(f"- {item}\n")
              if errors:
                  f.write("\n#### NG\n")
                  for item in errors:
                      f.write(f"- {item}\n")

          print(json.dumps(report, ensure_ascii=False, indent=2))
          if errors:
              sys.exit(1)
          PY

          ruby -e 'require "yaml"; YAML.parse_file(ARGV[0]); puts "YML syntax OK"' "$WORKFLOW_FILE"

      - name: "Update NEXT completion ledger"
        shell: bash
        run: |
          set -Eeuo pipefail

          python3 <<'PY'
          from __future__ import annotations

          import datetime as dt
          import json
          import os
          from pathlib import Path

          now = dt.datetime.now(dt.timezone(dt.timedelta(hours=9))).replace(microsecond=0)
          state_path = Path(".dpro-next/esthe-step-state.yml")
          report_data = json.loads(Path(".next2_tmp/validation.json").read_text(encoding="utf-8"))

          def q(value):
              return json.dumps(str(value), ensure_ascii=False)

          state = [
              "schema_version: 1",
              f"system: {q('DPRO エステ LINE')}",
              f"current_step: {q(os.environ['CURRENT_STEP_AFTER_SUCCESS'])}",
              f"next_step: {q(os.environ['NEXT_STEP_AFTER_SUCCESS'])}",
              f"updated_at_jst: {q(now.isoformat())}",
              f"source_commit: {q(os.environ['CHANGE_BEFORE_SHA'])}",
              f"backup_tag: {q(os.environ['BACKUP_TAG'])}",
              f"result: {q('ATTENTION' if report_data['attention'] else 'OK')}",
              "changes:",
              f"  worker: {os.environ['WORKER_CHANGED']}",
              f"  supabase: {os.environ['SUPABASE_CHANGED']}",
              f"  api: {os.environ['API_CHANGED']}",
              "  public_admin_information_separated: true",
              "  owner_today_priority: true",
              "  admin_code_clear_button: true",
              "  admin_auth_transport: \"x-admin-secret\"",
          ]
          state_path.write_text("\n".join(state) + "\n", encoding="utf-8")

          report_lines = [
              "DPRO エステ LINE / ESTHE-NEXT-2 実行結果",
              f"完了日時JST: {now.isoformat()}",
              f"変更前Commit: {os.environ['CHANGE_BEFORE_SHA']}",
              f"バックアップタグ: {os.environ['BACKUP_TAG']}",
              f"OK: {report_data['ok']}",
              f"注意: {report_data['attention']}",
              f"NG: {report_data['ng']}",
              "",
              "実施内容:",
              "- 公開画面から管理コード表示・管理画面リンクを分離",
              "- 管理コードをsessionStorageへ一時保存",
              "- 管理コード削除ボタンをowner/admin/staff/system-checkへ設置",
              "- admin_keyのURL付与を廃止",
              "- x-admin-secretヘッダーへ統一",
              "- owner.htmlの今日やることを優先度順へ変更",
              "- 新しい初期API全件取得は追加していない",
              "",
              "変更記録:",
              "- Worker: 変更なし",
              "- Supabase: 変更なし",
              "- API: 変更なし",
              "",
              "次STEP: ESTHE-NEXT-3",
          ]
          if report_data["attention_items"]:
              report_lines.extend(["", "注意:"])
              report_lines.extend(f"- {item}" for item in report_data["attention_items"])

          Path(".dpro-next/esthe-next2-report.txt").write_text(
              "\n".join(report_lines) + "\n",
              encoding="utf-8",
          )

          baseline = Path(".dpro-next/esthe-current-baseline.yml")
          if baseline.exists():
              text = baseline.read_text(encoding="utf-8")
              text += (
                  "\nnext2_completion:\n"
                  f"  completed_at_jst: {q(now.isoformat())}\n"
                  f"  backup_tag: {q(os.environ['BACKUP_TAG'])}\n"
                  "  worker_changed: false\n"
                  "  supabase_changed: false\n"
                  "  api_changed: false\n"
                  "  public_admin_information_separated: true\n"
                  "  owner_today_priority: true\n"
              )
              baseline.write_text(text, encoding="utf-8")
          PY

      - name: "Re-run final source validation"
        shell: bash
        run: |
          set -Eeuo pipefail

          grep -q 'current_step: "ESTHE-NEXT-2-COMPLETE"' .dpro-next/esthe-step-state.yml
          grep -q 'next_step: "ESTHE-NEXT-3"' .dpro-next/esthe-step-state.yml
          grep -q 'id="todoSummary"' owner.html
          grep -q 'id="dproAdminClear"' owner.html
          grep -q 'id="dproAdminClear"' admin.html
          grep -q 'id="dproAdminClear"' staff.html
          grep -q 'id="dproAdminClear"' system-check.html

          for file in index.html index-brush.html member.html owner.html admin.html staff.html system-check.html; do
            grep -q "STEP ESTHE-NEXT-2" "$file"
          done

          for file in owner.html admin.html staff.html system-check.html; do
            if grep -q "admin_key" "$file"; then
              echo "::error::admin_keyが残っています: $file"
              exit 1
            fi
            grep -q "x-admin-secret" "$file"
          done

          for file in index.html index-brush.html member.html; do
            if grep -Eq '管理コード[：:]1234|href="(admin|owner|staff|system-check)\.html|/api/admin/|admin_key' "$file"; then
              echo "::error::公開画面に管理情報が残っています: $file"
              exit 1
            fi
          done

      - name: "Upload NEXT-2 validation artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "ESTHE-NEXT-2-R2-validation-${{ github.run_id }}"
          path: |
            .next2_tmp/validation.json
            .dpro-next/esthe-next2-report.txt
            .dpro-next/esthe-next2-change-record.json
          if-no-files-found: warn
          retention-days: 30

      - name: "Commit changes, delete workflow and push"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail

          git add \
            index.html \
            index-brush.html \
            member.html \
            owner.html \
            admin.html \
            staff.html \
            system-check.html \
            .dpro-next/esthe-step-state.yml \
            .dpro-next/esthe-next2-report.txt \
            .dpro-next/esthe-next2-change-record.json \
            .dpro-next/esthe-current-baseline.yml

          git rm --ignore-unmatch             "$WORKFLOW_FILE"             ".github/workflows/ESTHE-NEXT-2.yml"

          if git diff --cached --quiet; then
            echo "::error::Commit対象がありません。"
            exit 1
          fi

          git commit -m "DPRO ESTHE NEXT-2-R2 complete: admin separation and owner today"
          git push origin "HEAD:${GITHUB_REF_NAME}"

          COMPLETE_SHA="$(git rev-parse HEAD)"
          echo "COMPLETE_SHA=$COMPLETE_SHA" >> "$GITHUB_ENV"

          echo "### 自動Commit・Push" >> "$GITHUB_STEP_SUMMARY"
          echo "- 完了Commit: \`$COMPLETE_SHA\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- YML自身: 削除済み" >> "$GITHUB_STEP_SUMMARY"
          echo "- current_step: \`$CURRENT_STEP_AFTER_SUCCESS\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- next_step: \`$NEXT_STEP_AFTER_SUCCESS\`" >> "$GITHUB_STEP_SUMMARY"

      - name: "Confirm GitHub Pages publication"
        if: success()
        continue-on-error: true
        shell: bash
        run: |
          set -Eeuo pipefail

          URLS=(
            "${PAGES_BASE}/index.html"
            "${PAGES_BASE}/index-brush.html"
            "${PAGES_BASE}/member.html"
            "${PAGES_BASE}/owner.html"
            "${PAGES_BASE}/admin.html"
            "${PAGES_BASE}/staff.html"
            "${PAGES_BASE}/system-check.html"
          )

          PUBLISHED="false"
          for attempt in $(seq 1 24); do
            ALL_OK="true"
            for url in "${URLS[@]}"; do
              body="$(curl -L -sS --retry 2 --connect-timeout 8 --max-time 25 \
                -H 'Cache-Control: no-cache' \
                "${url}?next2_check=${GITHUB_RUN_ID}_${attempt}" || true)"
              if [[ "$body" != *"STEP ESTHE-NEXT-2"* ]]; then
                ALL_OK="false"
                break
              fi
            done

            if [[ "$ALL_OK" == "true" ]]; then
              PUBLISHED="true"
              break
            fi

            sleep 10
          done

          echo "### GitHub Pages公開確認" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$PUBLISHED" == "true" ]]; then
            echo "- 判定: **OK**" >> "$GITHUB_STEP_SUMMARY"
            echo "- NEXT-2マーカー: 全対象画面で確認" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- 判定: **注意**" >> "$GITHUB_STEP_SUMMARY"
            echo "- Pages反映待ちの可能性があります。ソースCommitとActionsは完了しています。" >> "$GITHUB_STEP_SUMMARY"
          fi
