# DPRO エステ LINE
# STEP名: ESTHE-NEXT-9
#
# 対象ファイル:
# - system-check.html
# - esthe-next9-static-report.json
# - DPRO NEXT完成台帳
#
# 目的:
# - 性能・セキュリティ・system-checkの最終強化
# - Actions静的検査と公開環境ライブ検査の統合
# - OK・注意・NG表示と検査結果コピー
#
# 変更前バックアップタグ:
# - backup-esthe-before-next9-YYYYMMDD
#
# 前STEP:
# - current_step: ESTHE-NEXT-8-COMPLETE
# - next_step: ESTHE-NEXT-9
#
# Worker変更: なし
# Supabase変更: なし
# API変更: なし
#
# 次STEP:
# - ESTHE-NEXT-10
#
# 成功後:
# - 完成台帳更新
# - 自動Commit / Push
# - このYML自身を削除

name: "DPRO ESTHE NEXT-9 - Performance Security and System Check"

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ESTHE-NEXT-9.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: "dpro-esthe-next"
  cancel-in-progress: false

env:
  STEP_NAME: "ESTHE-NEXT-9"
  WORKFLOW_FILE: ".github/workflows/ESTHE-NEXT-9.yml"
  EXPECTED_PREVIOUS_STEP: "ESTHE-NEXT-8-COMPLETE"
  EXPECTED_CURRENT_NEXT: "ESTHE-NEXT-9"
  CURRENT_STEP_AFTER_SUCCESS: "ESTHE-NEXT-9-COMPLETE"
  NEXT_STEP_AFTER_SUCCESS: "ESTHE-NEXT-10"
  BACKUP_TAG_PREFIX: "backup-esthe-before-next9"
  API_BASE: "https://dpro-esthe-relax-line-api.dpromstk2000.workers.dev"
  PAGES_BASE: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff"
  SHOP_CODE: "esthe_demo_default"
  SYSTEM_CHECK_HTML_B64: ""

jobs:
  esthe-next-9:
    name: "Apply ESTHE NEXT-9 safely"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: "Checkout repository with history"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: "Configure Git identity"
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "DPRO NEXT Actions"
          git config user.email "actions@users.noreply.github.com"

      - name: "Confirm ESTHE-NEXT-8 completion"
        shell: bash
        run: |
          set -Eeuo pipefail
          STATE_FILE=".dpro-next/esthe-step-state.yml"
          test -f "$STATE_FILE"
          CURRENT_STEP="$(awk -F': *' '/^current_step:/{gsub(/["'"'"']/, "", $2); print $2; exit}' "$STATE_FILE")"
          NEXT_STEP="$(awk -F': *' '/^next_step:/{gsub(/["'"'"']/, "", $2); print $2; exit}' "$STATE_FILE")"
          [[ "$CURRENT_STEP" == "$EXPECTED_PREVIOUS_STEP" ]] || { echo "::error::前STEP未完了 current_step=$CURRENT_STEP"; exit 1; }
          [[ "$NEXT_STEP" == "$EXPECTED_CURRENT_NEXT" ]] || { echo "::error::next_step不一致 next_step=$NEXT_STEP"; exit 1; }
          echo "### 前STEP完了確認" >> "$GITHUB_STEP_SUMMARY"
          echo "- current_step: \`$CURRENT_STEP\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- next_step: \`$NEXT_STEP\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- 判定: **OK**" >> "$GITHUB_STEP_SUMMARY"

      - name: "Confirm Worker APIs and wrong-code rejection"
        shell: bash
        run: |
          set -Eeuo pipefail
          HEALTH_CODE="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 45 -o /tmp/next9-health.json -w "%{http_code}" "${API_BASE}/api/health")"
          SYSTEM_CODE="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 50 -H "Accept: application/json" -H "x-admin-secret: 1234" -o /tmp/next9-system.json -w "%{http_code}" "${API_BASE}/api/admin/system-check")"
          SETTINGS_CODE="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 45 -H "Accept: application/json" -H "x-admin-secret: 1234" -o /tmp/next9-settings.json -w "%{http_code}" "${API_BASE}/api/admin/settings?shop_code=${SHOP_CODE}")"
          PHONE_CODE="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 45 -H "Accept: application/json" -H "x-admin-secret: 1234" -o /tmp/next9-phone.json -w "%{http_code}" "${API_BASE}/api/admin/phone-normalize-check")"
          WRONG_CODE="$(curl -L -sS --retry 2 --connect-timeout 10 --max-time 40 -H "Accept: application/json" -H "x-admin-secret: DPRO-NEXT-WRONG-CODE" -o /tmp/next9-wrong.json -w "%{http_code}" "${API_BASE}/api/admin/system-check" || true)"
          [[ "$HEALTH_CODE" =~ ^2 ]] || { echo "::error::health HTTP $HEALTH_CODE"; exit 1; }
          [[ "$SYSTEM_CODE" =~ ^2 ]] || { echo "::error::system-check HTTP $SYSTEM_CODE"; exit 1; }
          [[ "$SETTINGS_CODE" =~ ^2 ]] || { echo "::error::settings HTTP $SETTINGS_CODE"; exit 1; }
          [[ "$PHONE_CODE" =~ ^2 ]] || { echo "::error::phone normalize HTTP $PHONE_CODE"; exit 1; }
          python3 - "$WRONG_CODE" <<'PY'
          import json,sys
          from pathlib import Path
          code=int(sys.argv[1] or 0)
          try:data=json.loads(Path("/tmp/next9-wrong.json").read_text(encoding="utf-8"))
          except Exception:data={}
          rejected=code in (400,401,403) or data.get("ok") is False
          Path("/tmp/next9-security.json").write_text(json.dumps({
              "http_status":code,
              "rejected":rejected,
              "body_ok":data.get("ok")
          },ensure_ascii=False),encoding="utf-8")
          if not rejected:raise SystemExit("wrong admin code was not rejected")
          PY
          echo "### Worker・セキュリティ基準" >> "$GITHUB_STEP_SUMMARY"
          echo "- health / system-check / settings / phone-normalize: **OK**" >> "$GITHUB_STEP_SUMMARY"
          echo "- 誤った管理コード拒否: **OK（HTTP $WRONG_CODE）**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Worker・SQL変更: **不要**" >> "$GITHUB_STEP_SUMMARY"

      - name: "Create change-before backup tag"
        shell: bash
        run: |
          set -Eeuo pipefail
          CHANGE_BEFORE_SHA="$GITHUB_SHA"
          mapfile -t HEAD_FILES < <(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          if [[ "${#HEAD_FILES[@]}" -eq 1 && "${HEAD_FILES[0]}" == "$WORKFLOW_FILE" ]]; then
            CHANGE_BEFORE_SHA="$(git rev-parse "${GITHUB_SHA}^")"
          fi
          JST_DATE="$(TZ=Asia/Tokyo date +%Y%m%d)"
          BASE_TAG="${BACKUP_TAG_PREFIX}-${JST_DATE}"
          BACKUP_TAG="$BASE_TAG"
          if git ls-remote --exit-code --tags origin "refs/tags/$BACKUP_TAG" >/dev/null 2>&1; then
            BACKUP_TAG="${BASE_TAG}-run-${GITHUB_RUN_ID}"
          fi
          git tag -a "$BACKUP_TAG" "$CHANGE_BEFORE_SHA" -m "DPRO ESTHE before NEXT-9: $CHANGE_BEFORE_SHA"
          git push origin "refs/tags/$BACKUP_TAG"
          echo "CHANGE_BEFORE_SHA=$CHANGE_BEFORE_SHA" >> "$GITHUB_ENV"
          echo "BACKUP_TAG=$BACKUP_TAG" >> "$GITHUB_ENV"

      - name: "Apply NEXT-9 system-check"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-9-apply>","exec"))'

      - name: "Run static HTML JavaScript ID size security and business validation"
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p .next9_tmp
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-9-static>","exec"))'
          ruby -e 'require "yaml"; YAML.parse_file(ARGV[0]); puts "YML syntax OK"' "$WORKFLOW_FILE"

      - name: "Update NEXT completion ledger"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-9-ledger>","exec"))'

      - name: "Final completion validation"
        shell: bash
        run: |
          set -Eeuo pipefail
          grep -q 'current_step: "ESTHE-NEXT-9-COMPLETE"' .dpro-next/esthe-step-state.yml
          grep -q 'next_step: "ESTHE-NEXT-10"' .dpro-next/esthe-step-state.yml
          grep -q '<!-- STEP ESTHE-NEXT-9 -->' system-check.html
          grep -q 'ESTHE-NEXT-9-SYSTEM-CHECK-20260724' system-check.html
          grep -q 'STATIC_REPORT_URL' system-check.html
          grep -q '誤った管理コードの拒否' system-check.html
          grep -q '"ng": 0' esthe-next9-static-report.json
          grep -q 'wrong_admin_code_rejection: true' .dpro-next/esthe-step-state.yml

      - name: "Upload NEXT-9 validation artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "ESTHE-NEXT-9-validation-${{ github.run_id }}"
          path: |
            esthe-next9-static-report.json
            .dpro-next/esthe-next9-actions-result.txt
            .dpro-next/esthe-next9-report.txt
            .dpro-next/esthe-next9-change-record.json
          if-no-files-found: warn
          retention-days: 30

      - name: "Commit changes, delete workflow and push"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          git add system-check.html \
            esthe-next9-static-report.json \
            .dpro-next/esthe-next9-actions-result.txt \
            .dpro-next/esthe-step-state.yml \
            .dpro-next/esthe-current-baseline.yml \
            .dpro-next/esthe-next9-report.txt \
            .dpro-next/esthe-next9-change-record.json
          git rm --ignore-unmatch "$WORKFLOW_FILE"
          git diff --cached --quiet && { echo "::error::Commit対象がありません"; exit 1; }
          git commit -m "DPRO ESTHE NEXT-9 complete: performance security and system check"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "### 自動Commit・Push" >> "$GITHUB_STEP_SUMMARY"
          echo "- 完了Commit: \`$(git rev-parse HEAD)\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- YML自身: 削除済み" >> "$GITHUB_STEP_SUMMARY"
          echo "- current_step: \`$CURRENT_STEP_AFTER_SUCCESS\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- next_step: \`$NEXT_STEP_AFTER_SUCCESS\`" >> "$GITHUB_STEP_SUMMARY"

      - name: "Confirm GitHub Pages publication"
        if: success()
        continue-on-error: true
        shell: bash
        run: |
          set -Eeuo pipefail
          PUBLISHED="false"
          for attempt in $(seq 1 30); do
            CHECK_BODY="$(curl -L -sS --retry 2 --connect-timeout 8 --max-time 30 -H "Cache-Control: no-cache" "${PAGES_BASE}/system-check.html?next9=${GITHUB_RUN_ID}_${attempt}" || true)"
            STATIC_BODY="$(curl -L -sS --retry 2 --connect-timeout 8 --max-time 30 -H "Cache-Control: no-cache" "${PAGES_BASE}/esthe-next9-static-report.json?next9=${GITHUB_RUN_ID}_${attempt}" || true)"
            if [[ "$CHECK_BODY" == *"STEP ESTHE-NEXT-9"* && "$CHECK_BODY" == *"STATIC_REPORT_URL"* && "$STATIC_BODY" == *'"step": "ESTHE-NEXT-9"'* ]]; then
              PUBLISHED="true"
              break
            fi
            sleep 10
          done
          echo "### GitHub Pages公開確認" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$PUBLISHED" == "true" ]]; then
            echo "- 判定: **OK**" >> "$GITHUB_STEP_SUMMARY"
            echo "- system-check.html / 静的レポート: NEXT-9確認" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- 判定: **注意**" >> "$GITHUB_STEP_SUMMARY"
            echo "- Pages反映待ちの可能性があります。ソースCommitは完了しています。" >> "$GITHUB_STEP_SUMMARY"
          fi
