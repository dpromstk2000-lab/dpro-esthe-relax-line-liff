# DPRO エステ LINE
# STEP名: ESTHE-NEXT-10A-R2
#
# 参考レイアウト:
# - DPRO 車検・整備工場 NEXT 操作体験シート
#
# 対象ファイル:
# - deliverables/esthe-next-10/ 操作体験シートPDF・PNG
# - owner-pc.png / owner-ipad.png
# - QR検査・レイアウト検査結果
# - DPRO NEXT完成台帳
#
# 実施する変更:
# - QRコード5件を最上部へ横一列配置
# - 5分で見る順番を時間付きで表示
# - PC・iPad実画面を紙面中央へ大きく配置
# - 導入効果を3項目へ整理
# - 公式LINE相談導線を下部へ大きく配置
# - 既存PDF・PNGと同じ公開URLへ上書き
#
# 変更前バックアップタグ:
# - backup-esthe-before-next10a-r2-YYYYMMDD
#
# 前STEP:
# - current_step: ESTHE-NEXT-10A-COMPLETE
# - next_step: ESTHE-NEXT-10B-PRODUCT-SITE
#
# 次STEP:
# - ESTHE-NEXT-10B-PRODUCT-SITE
#
# Worker変更: なし
# Supabase変更: なし
# API変更: なし
#
# 自動検査:
# - 公開URL
# - 実画面表示文字
# - スクリーンショット破損・ノイズ
# - A4縦1ページ
# - PDF・PNG
# - QR元画像6件
# - 最終PDF内QR6件
# - 公開後PDF・PNG SHA256
# - 公開後PDF内QR6件
#
# 成功後:
# - 自動Commit / Push
# - 初版YMLとR2 YML自身を削除

name: "DPRO ESTHE NEXT-10A-R2 - KSH Style Operation Sheet"

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ESTHE-NEXT-10A-R2.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: "dpro-esthe-next"
  cancel-in-progress: false

env:
  WORKFLOW_FILE: ".github/workflows/ESTHE-NEXT-10A-R2.yml"
  EXPECTED_PREVIOUS_STEP: "ESTHE-NEXT-10A-COMPLETE"
  EXPECTED_NEXT_STEP: "ESTHE-NEXT-10B-PRODUCT-SITE"
  BACKUP_TAG_PREFIX: "backup-esthe-before-next10a-r2"
  API_BASE: "https://dpro-esthe-relax-line-api.dpromstk2000.workers.dev"
  PAGES_BASE: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff"
  PRODUCT_URL: "https://dpromstk2000-lab.github.io/dpro-line-systems-site/systems/esthe.html"
  LINE_URL: "https://lin.ee/YxJGXV6D"

jobs:
  esthe-next-10a-r2:
    name: "Replace ESTHE operation sheet with KSH style"
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: "Checkout repository with history"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: "Configure Git identity"
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "DPRO NEXT Actions"
          git config user.email "actions@users.noreply.github.com"

      - name: "Confirm ESTHE-NEXT-10A completion and R2 target"
        shell: bash
        run: |
          set -Eeuo pipefail
          STATE_FILE=".dpro-next/esthe-step-state.yml"
          ROOT="deliverables/esthe-next-10"
          test -f "$STATE_FILE"
          test -f "$ROOT/DPRO_ESTHE_NEXT_operation_experience_sheet_$(TZ=Asia/Tokyo date +%Y%m%d).pdf"
          test -f "$ROOT/DPRO_ESTHE_NEXT_operation_experience_sheet_$(TZ=Asia/Tokyo date +%Y%m%d).png"
          test -f "$ROOT/screenshots/owner-pc.png"
          test -f "$ROOT/screenshots/owner-ipad.png"

          CURRENT_STEP="$(awk -F': *' '/^current_step:/{gsub(/["'"'"']/, "", $2); print $2; exit}' "$STATE_FILE")"
          NEXT_STEP="$(awk -F': *' '/^next_step:/{gsub(/["'"'"']/, "", $2); print $2; exit}' "$STATE_FILE")"
          [[ "$CURRENT_STEP" == "$EXPECTED_PREVIOUS_STEP" ]] || {
            echo "::error::前STEP不一致 current_step=$CURRENT_STEP"; exit 1;
          }
          [[ "$NEXT_STEP" == "$EXPECTED_NEXT_STEP" ]] || {
            echo "::error::next_step不一致 next_step=$NEXT_STEP"; exit 1;
          }

      - name: "Verify public baseline and Worker"
        shell: bash
        run: |
          set -Eeuo pipefail
          for url in \
            "$PAGES_BASE/owner.html" \
            "$PAGES_BASE/owner-ipad.html" \
            "$PAGES_BASE/index-brush.html" \
            "$PAGES_BASE/member.html" \
            "$PRODUCT_URL" \
            "$LINE_URL"
          do
            code="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 50 \
              -o /dev/null -w "%{http_code}" "$url")"
            [[ "$code" =~ ^2|^3 ]] || {
              echo "::error::URL HTTP $code $url"; exit 1;
            }
          done
          HEALTH_CODE="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 40 \
            -o /tmp/next10a-r2-health.json -w "%{http_code}" \
            "$API_BASE/api/health")"
          [[ "$HEALTH_CODE" =~ ^2 ]] || {
            echo "::error::health HTTP $HEALTH_CODE"; exit 1;
          }

      - name: "Create change-before backup tag"
        shell: bash
        run: |
          set -Eeuo pipefail
          CHANGE_BEFORE_SHA="$GITHUB_SHA"
          mapfile -t HEAD_FILES < <(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          if [[ "${#HEAD_FILES[@]}" -eq 1 && "${HEAD_FILES[0]}" == "$WORKFLOW_FILE" ]]; then
            CHANGE_BEFORE_SHA="$(git rev-parse "${GITHUB_SHA}^")"
          fi
          JST_DATE="$(TZ=Asia/Tokyo date +%Y%m%d)"
          BASE_TAG="${BACKUP_TAG_PREFIX}-${JST_DATE}"
          BACKUP_TAG="$BASE_TAG"
          if git ls-remote --exit-code --tags origin "refs/tags/$BACKUP_TAG" >/dev/null 2>&1; then
            BACKUP_TAG="${BASE_TAG}-run-${GITHUB_RUN_ID}"
          fi
          git tag -a "$BACKUP_TAG" "$CHANGE_BEFORE_SHA" \
            -m "DPRO ESTHE before NEXT-10A-R2: $CHANGE_BEFORE_SHA"
          git push origin "refs/tags/$BACKUP_TAG"
          echo "CHANGE_BEFORE_SHA=$CHANGE_BEFORE_SHA" >> "$GITHUB_ENV"
          echo "BACKUP_TAG=$BACKUP_TAG" >> "$GITHUB_ENV"

      - name: "Prepare demo data"
        shell: bash
        run: |
          set -Eeuo pipefail
          CODE="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 60 \
            -X POST -H "Accept: application/json" -H "x-admin-secret: 1234" \
            -o /tmp/next10a-r2-demo.json -w "%{http_code}" \
            "$API_BASE/api/admin/demo/prepare")"
          [[ "$CODE" =~ ^2 ]] || {
            cat /tmp/next10a-r2-demo.json
            echo "::error::demo prepare HTTP $CODE"
            exit 1
          }

      - name: "Install screenshot and PDF dependencies"
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y libzbar0 fonts-ipafont-gothic
          python3 -m pip install --upgrade pip
          python3 -m pip install \
            playwright reportlab qrcode pillow pymupdf \
            opencv-python-headless pyzbar numpy
          python3 -m playwright install --with-deps chromium

      - name: "Refresh large PC and iPad screenshots"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-10A-R2-capture>","exec"))'

      - name: "Create KSH-style A4 PDF PNG and verify every QR"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-10A-R2-pdf>","exec"))'

      - name: "Validate R2 operation-sheet artifacts"
        shell: bash
        run: |
          set -Eeuo pipefail
          ROOT="deliverables/esthe-next-10"
          DATE="$(TZ=Asia/Tokyo date +%Y%m%d)"
          PDF="$ROOT/DPRO_ESTHE_NEXT_operation_experience_sheet_${DATE}.pdf"
          PNG="$ROOT/DPRO_ESTHE_NEXT_operation_experience_sheet_${DATE}.png"

          test -s "$PDF"
          test -s "$PNG"
          test -s "$ROOT/screenshot-r2-validation.json"
          test -s "$ROOT/operation-sheet-qr-validation.json"
          test -s "$ROOT/operation-sheet-validation.json"
          test -s "$ROOT/operation-sheet-layout-r2-validation.json"

          python3 - <<'PY'
          import json
          from pathlib import Path
          root=Path("deliverables/esthe-next-10")
          qr=json.loads((root/"operation-sheet-qr-validation.json").read_text(encoding="utf-8"))
          meta=json.loads((root/"operation-sheet-validation.json").read_text(encoding="utf-8"))
          layout=json.loads((root/"operation-sheet-layout-r2-validation.json").read_text(encoding="utf-8"))
          shots=json.loads((root/"screenshot-r2-validation.json").read_text(encoding="utf-8"))

          assert qr["all_pass"] is True
          assert len(qr["final_pdf_qr"]) == 6
          assert all(item["pass"] for item in qr["final_pdf_qr"])
          assert meta["a4_portrait"] is True and meta["page_count"] == 1
          assert meta["replaces_previous_operation_sheet"] is True
          assert layout["layout_reference"] == "DPRO_KSH_NEXT"
          assert layout["top_qr_cards"] == 5
          assert layout["five_minute_route_items"] == 5
          assert layout["large_real_screens"] == 2
          assert layout["benefit_cards"] == 3
          assert shots["quality_pass"] is True and shots["count"] == 2
          print("KSH layout / screenshots / PDF / QR: PASS")
          PY

      - name: "Update NEXT-10A-R2 ledger"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-10A-R2-ledger>","exec"))'
          grep -q 'current_step: "ESTHE-NEXT-10A-R2-COMPLETE"' .dpro-next/esthe-step-state.yml
          grep -q 'next_step: "ESTHE-NEXT-10B-PRODUCT-SITE"' .dpro-next/esthe-step-state.yml
          grep -q 'operation_sheet_layout_reference: DPRO_KSH_NEXT' .dpro-next/esthe-step-state.yml
          grep -q 'final_pdf_qr_decode_pass: true' .dpro-next/esthe-step-state.yml

      - name: "Upload NEXT-10A-R2 artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "ESTHE-NEXT-10A-R2-operation-sheet-${{ github.run_id }}"
          path: |
            deliverables/esthe-next-10/
            .dpro-next/esthe-next10a-r2-assets-result.yml
            .dpro-next/esthe-next10a-r2-report.txt
          if-no-files-found: warn
          retention-days: 30

      - name: "Commit replacement assets, delete workflows and push"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          git add \
            deliverables/esthe-next-10 \
            .dpro-next/esthe-step-state.yml \
            .dpro-next/esthe-current-baseline.yml \
            .dpro-next/esthe-next10a-r2-assets-result.yml \
            .dpro-next/esthe-next10a-r2-report.txt

          git rm --ignore-unmatch \
            "$WORKFLOW_FILE" \
            ".github/workflows/ESTHE-NEXT-10A.yml"

          git diff --cached --quiet && {
            echo "::error::Commit対象がありません"; exit 1;
          }
          git commit -m "DPRO ESTHE NEXT-10A-R2 complete: KSH style operation sheet"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: "Confirm publication and re-verify public PDF QR"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          ROOT="deliverables/esthe-next-10"
          DATE="$(TZ=Asia/Tokyo date +%Y%m%d)"
          PDF_NAME="DPRO_ESTHE_NEXT_operation_experience_sheet_${DATE}.pdf"
          PNG_NAME="DPRO_ESTHE_NEXT_operation_experience_sheet_${DATE}.png"
          PDF_URL="$PAGES_BASE/deliverables/esthe-next-10/$PDF_NAME"
          PNG_URL="$PAGES_BASE/deliverables/esthe-next-10/$PNG_NAME"

          PUBLISHED="false"
          for attempt in $(seq 1 30); do
            PDF_CODE="$(curl -L -sS --retry 2 --connect-timeout 8 --max-time 30 \
              -o /tmp/esthe-next10a-r2-public.pdf -w "%{http_code}" \
              "$PDF_URL?run=${GITHUB_RUN_ID}_${attempt}" || true)"
            PNG_CODE="$(curl -L -sS --retry 2 --connect-timeout 8 --max-time 30 \
              -o /tmp/esthe-next10a-r2-public.png -w "%{http_code}" \
              "$PNG_URL?run=${GITHUB_RUN_ID}_${attempt}" || true)"
            if [[ "$PDF_CODE" == "200" && "$PNG_CODE" == "200" ]]; then
              PUBLISHED="true"
              break
            fi
            sleep 10
          done
          [[ "$PUBLISHED" == "true" ]] || {
            echo "::error::R2 PDF/PNG public publication not confirmed"; exit 1;
          }

          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-10A-R2-public>","exec"))'

          echo "### NEXT-10A-R2公開結果" >> "$GITHUB_STEP_SUMMARY"
          echo "- レイアウト: **DPRO 車検・整備工場 NEXT基準**" >> "$GITHUB_STEP_SUMMARY"
          echo "- PDF: $PDF_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- PNG: $PNG_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- 公開PDF/PNG SHA256: **一致**" >> "$GITHUB_STEP_SUMMARY"
          echo "- 公開PDF内QR: **6 / 6 PASS**" >> "$GITHUB_STEP_SUMMARY"
          echo "- 次STEP: **ESTHE-NEXT-10B-PRODUCT-SITE**" >> "$GITHUB_STEP_SUMMARY"
