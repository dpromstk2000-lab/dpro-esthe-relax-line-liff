# DPRO エステ LINE
# STEP: ESTHE-NEXT-1
# 目的: 正常版保護・現状基準台帳・構文/既存機能/業務ロジック検査
# 対象: リポジトリ内の既存ファイル一式（画面・JavaScript・既存YML）
# 変更: .dpro-next/配下に基準台帳を追加するだけ。画面、Worker、Supabase、APIは変更しない。
# 前STEP確認: NEXT-1は初回STEPのため前STEP不要。既にNEXT-2以降の場合は停止。
# 成功時: 自動Commit/Push後、このYML自身を削除する。

name: "DPRO ESTHE NEXT-1 - Baseline Protection"

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ESTHE-NEXT-1.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: "dpro-esthe-next"
  cancel-in-progress: false

env:
  STEP_NAME: "ESTHE-NEXT-1"
  SYSTEM_NAME: "DPRO エステ LINE"
  WORKFLOW_FILE: ".github/workflows/ESTHE-NEXT-1.yml"
  CURRENT_STEP_AFTER_SUCCESS: "ESTHE-NEXT-1-COMPLETE"
  NEXT_STEP_AFTER_SUCCESS: "ESTHE-NEXT-2"
  BACKUP_TAG_PREFIX: "backup-esthe-before-next"
  PAGES_BASE: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff"
  API_HEALTH_URL: "https://dpro-esthe-relax-line-api.dpromstk2000.workers.dev/api/health"
  WORKER_CHANGED: "false"
  SUPABASE_CHANGED: "false"
  API_CHANGED: "false"
  TARGET_FILES: "index.html,index-brush.html,admin.html,owner.html,member.html,staff.html,system-check.html,existing JavaScript,existing YAML"
  CHANGE_SUMMARY: "正常版保護、現状ファイル台帳、SHA256、API基準、セキュリティ注意点、STEP状態を.dpro-nextへ保存"
  FUNCTION_SUMMARY: "バックアップタグ、前STEP確認、HTML/JavaScript/YML構文、HTML ID重複、既存機能維持、エステ業務ロジック、公開URL/API疎通、変更有無記録"
  ROLLBACK_METHOD: "バックアップタグから対象ファイルを復元し、通常のCommit/Pushでmainへ戻す"

jobs:
  protect-and-baseline:
    name: "Protect current ESTHE system and create baseline ledger"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: "Checkout repository with history"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: "Configure Git identity"
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "DPRO NEXT Actions"
          git config user.email "actions@users.noreply.github.com"

      - name: "Confirm previous STEP state"
        id: precheck
        shell: bash
        run: |
          set -Eeuo pipefail

          STATE_FILE=".dpro-next/esthe-step-state.yml"
          PRECHECK_STATUS="OK"
          PRECHECK_DETAIL="NEXT-1 is the initial NEXT step; no predecessor is required."

          if [[ -f "$STATE_FILE" ]]; then
            EXISTING_STEP="$(awk -F': *' '/^current_step:/{gsub(/["'"'"']/, "", $2); print $2; exit}' "$STATE_FILE" || true)"

            case "$EXISTING_STEP" in
              ""|"ESTHE-NEXT-0"|"ESTHE-NEXT-1"|"ESTHE-NEXT-1-COMPLETE")
                PRECHECK_DETAIL="Existing state is compatible with NEXT-1 rerun: ${EXISTING_STEP:-empty}."
                ;;
              "ESTHE-NEXT-2"|"ESTHE-NEXT-2-COMPLETE"|"ESTHE-NEXT-3"|"ESTHE-NEXT-3-COMPLETE"|"COMPLETE")
                echo "::error::A later STEP is already recorded: $EXISTING_STEP"
                echo "::error::NEXT-1 will not overwrite a later completion state."
                exit 1
                ;;
              *)
                PRECHECK_STATUS="ATTENTION"
                PRECHECK_DETAIL="Unknown existing state was found and recorded: $EXISTING_STEP"
                ;;
            esac
          fi

          {
            echo "status=$PRECHECK_STATUS"
            echo "detail=$PRECHECK_DETAIL"
          } >> "$GITHUB_OUTPUT"

          echo "### 前STEP完了確認" >> "$GITHUB_STEP_SUMMARY"
          echo "- 状態: $PRECHECK_STATUS" >> "$GITHUB_STEP_SUMMARY"
          echo "- 内容: $PRECHECK_DETAIL" >> "$GITHUB_STEP_SUMMARY"

      - name: "Resolve protected commit and create backup tag"
        id: backup
        shell: bash
        run: |
          set -Eeuo pipefail

          BASELINE_SHA="$GITHUB_SHA"
          mapfile -t HEAD_FILES < <(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")

          # YMLアップロードCommitがこのworkflowだけなら、その親Commitを「変更前正常版」として保護する。
          if [[ "${#HEAD_FILES[@]}" -eq 1 && "${HEAD_FILES[0]}" == "$WORKFLOW_FILE" ]]; then
            BASELINE_SHA="$(git rev-parse "${GITHUB_SHA}^")"
          fi

          JST_DATE="$(TZ=Asia/Tokyo date +%Y%m%d)"
          BASE_TAG="${BACKUP_TAG_PREFIX}-${JST_DATE}"
          BACKUP_TAG="$BASE_TAG"

          if git ls-remote --exit-code --tags origin "refs/tags/$BACKUP_TAG" >/dev/null 2>&1; then
            BACKUP_TAG="${BASE_TAG}-run-${GITHUB_RUN_ID}"
          fi

          git tag -a "$BACKUP_TAG" "$BASELINE_SHA" -m "DPRO ESTHE before NEXT baseline: $BASELINE_SHA"
          git push origin "refs/tags/$BACKUP_TAG"

          {
            echo "baseline_sha=$BASELINE_SHA"
            echo "backup_tag=$BACKUP_TAG"
          } >> "$GITHUB_OUTPUT"

          {
            echo "BASELINE_SHA=$BASELINE_SHA"
            echo "BACKUP_TAG=$BACKUP_TAG"
          } >> "$GITHUB_ENV"

          echo "### 変更前バックアップ" >> "$GITHUB_STEP_SUMMARY"
          echo "- 保護Commit: \`$BASELINE_SHA\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- バックアップタグ: \`$BACKUP_TAG\`" >> "$GITHUB_STEP_SUMMARY"

      - name: "Check public pages and Worker health"
        id: livecheck
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p .next1_tmp
          : > .next1_tmp/public-checks.txt

          check_url() {
            local label="$1"
            local url="$2"
            local output
            local code
            local seconds

            output="$(curl -L -sS --retry 2 --connect-timeout 10 --max-time 30 \
              -o /tmp/dpro-next-body \
              -w '%{http_code}|%{time_total}' "$url" 2>/tmp/dpro-next-curl-error || true)"

            code="${output%%|*}"
            seconds="${output#*|}"

            if [[ -z "$code" || "$code" == "$output" ]]; then
              code="000"
              seconds="-"
            fi

            if [[ "$code" =~ ^2|3 ]]; then
              status="OK"
            else
              status="ATTENTION"
            fi

            error_text="$(tr '\n' ' ' </tmp/dpro-next-curl-error | sed 's/[[:space:]]\+/ /g' | cut -c1-300)"
            printf '%s\t%s\t%s\t%s\t%s\t%s\n' \
              "$label" "$status" "$code" "$seconds" "$url" "$error_text" \
              >> .next1_tmp/public-checks.txt
          }

          check_url "GitHub Pages top" "$PAGES_BASE/"
          check_url "Customer reservation" "$PAGES_BASE/index-brush.html"
          check_url "Owner PC" "$PAGES_BASE/owner.html"
          check_url "Staff" "$PAGES_BASE/staff.html"
          check_url "Member" "$PAGES_BASE/member.html"
          check_url "System check" "$PAGES_BASE/system-check.html"
          check_url "Worker health" "$API_HEALTH_URL"

          echo "### 公開URL・Worker疎通" >> "$GITHUB_STEP_SUMMARY"
          while IFS=$'\t' read -r label status code seconds url error_text; do
            echo "- $status / $label / HTTP $code / ${seconds}s" >> "$GITHUB_STEP_SUMMARY"
          done < .next1_tmp/public-checks.txt

      - name: "Create baseline ledger and run automatic inspections"
        id: inspect
        shell: bash
        env:
          PRECHECK_STATUS: "${{ steps.precheck.outputs.status }}"
          PRECHECK_DETAIL: "${{ steps.precheck.outputs.detail }}"
        run: |
          set -Eeuo pipefail
          mkdir -p .dpro-next .next1_tmp

          python3 <<'PY'
          from __future__ import annotations

          import datetime as dt
          import hashlib
          import json
          import os
          import re
          import subprocess
          import sys
          from collections import Counter
          from html.parser import HTMLParser
          from pathlib import Path
          from typing import Dict, List, Tuple

          ROOT = Path(".")
          OUT = ROOT / ".dpro-next"
          TMP = ROOT / ".next1_tmp"
          OUT.mkdir(parents=True, exist_ok=True)
          TMP.mkdir(parents=True, exist_ok=True)

          base_sha = os.environ["BASELINE_SHA"]
          backup_tag = os.environ["BACKUP_TAG"]
          workflow_file = os.environ["WORKFLOW_FILE"]
          current_step = os.environ["CURRENT_STEP_AFTER_SUCCESS"]
          next_step = os.environ["NEXT_STEP_AFTER_SUCCESS"]
          precheck_status = os.environ.get("PRECHECK_STATUS", "OK")
          precheck_detail = os.environ.get("PRECHECK_DETAIL", "")
          now_jst = dt.datetime.now(dt.timezone(dt.timedelta(hours=9))).replace(microsecond=0)

          errors: List[str] = []
          warnings: List[str] = []
          ok_items: List[str] = []

          required_files = [
              "index.html",
              "index-brush.html",
              "admin.html",
              "owner.html",
              "member.html",
              "staff.html",
              "system-check.html",
          ]

          def git_bytes(path: str) -> bytes:
              proc = subprocess.run(
                  ["git", "show", f"{base_sha}:{path}"],
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  check=False,
              )
              if proc.returncode != 0:
                  raise FileNotFoundError(path)
              return proc.stdout

          tracked_proc = subprocess.run(
              ["git", "ls-tree", "-r", "--name-only", base_sha],
              text=True,
              stdout=subprocess.PIPE,
              stderr=subprocess.PIPE,
              check=False,
          )
          if tracked_proc.returncode != 0:
              raise RuntimeError(tracked_proc.stderr.strip() or "git ls-tree failed")

          tracked_files = [
              line.strip()
              for line in tracked_proc.stdout.splitlines()
              if line.strip() and not line.startswith(".git/")
          ]

          for path in required_files:
              if path not in tracked_files:
                  errors.append(f"必須ファイル不足: {path}")
              else:
                  ok_items.append(f"必須ファイル存在: {path}")

          hashes = []
          text_cache: Dict[str, str] = {}

          for path in tracked_files:
              try:
                  raw = git_bytes(path)
              except FileNotFoundError:
                  errors.append(f"基準Commitから取得できないファイル: {path}")
                  continue

              hashes.append({
                  "path": path,
                  "sha256": hashlib.sha256(raw).hexdigest(),
                  "size_bytes": len(raw),
              })

              if len(raw) > 2_000_000:
                  errors.append(f"ファイル容量2MB超過: {path} ({len(raw)} bytes)")
              elif len(raw) > 600_000:
                  warnings.append(f"ファイル容量600KB超過: {path} ({len(raw)} bytes)")

              try:
                  text_cache[path] = raw.decode("utf-8")
              except UnicodeDecodeError:
                  pass

          class StructureParser(HTMLParser):
              def __init__(self) -> None:
                  super().__init__(convert_charrefs=True)
                  self.ids: List[str] = []
                  self.tags: List[str] = []

              def handle_starttag(self, tag, attrs):
                  self.tags.append(tag.lower())
                  for key, value in attrs:
                      if key.lower() == "id" and value:
                          self.ids.append(value)

              def handle_startendtag(self, tag, attrs):
                  self.handle_starttag(tag, attrs)

          html_files = [p for p in tracked_files if p.lower().endswith((".html", ".htm"))]
          inline_script_count = 0
          js_check_count = 0
          id_check_count = 0

          for path in html_files:
              text = text_cache.get(path)
              if text is None:
                  errors.append(f"HTML UTF-8読込失敗: {path}")
                  continue

              parser = StructureParser()
              try:
                  parser.feed(text)
                  parser.close()
              except Exception as exc:
                  errors.append(f"HTML解析失敗: {path}: {exc}")
                  continue

              lower = text.lower()
              if "<html" not in lower or "<head" not in lower or "<body" not in lower:
                  errors.append(f"HTML基本構造不足: {path}")
              else:
                  ok_items.append(f"HTML基本構造: {path}")

              duplicates = sorted(k for k, v in Counter(parser.ids).items() if v > 1)
              if duplicates:
                  errors.append(f"HTML ID重複: {path}: {', '.join(duplicates)}")
              else:
                  id_check_count += 1

              script_pattern = re.compile(
                  r"<script\b(?P<attrs>[^>]*)>(?P<body>.*?)</script\s*>",
                  re.IGNORECASE | re.DOTALL,
              )

              for index, match in enumerate(script_pattern.finditer(text), start=1):
                  attrs = match.group("attrs") or ""
                  body = match.group("body") or ""

                  if re.search(r"\bsrc\s*=", attrs, re.IGNORECASE):
                      continue

                  type_match = re.search(
                      r"\btype\s*=\s*['\"]([^'\"]+)['\"]",
                      attrs,
                      re.IGNORECASE,
                  )
                  script_type = (type_match.group(1).strip().lower() if type_match else "")
                  if script_type and script_type not in {
                      "text/javascript",
                      "application/javascript",
                      "module",
                  }:
                      continue

                  if not body.strip():
                      continue

                  suffix = ".mjs" if script_type == "module" else ".js"
                  temp_js = TMP / f"inline-{Path(path).name}-{index}{suffix}"
                  temp_js.write_text(body, encoding="utf-8")
                  proc = subprocess.run(
                      ["node", "--check", str(temp_js)],
                      text=True,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.PIPE,
                      check=False,
                  )
                  inline_script_count += 1
                  if proc.returncode != 0:
                      detail = (proc.stderr or proc.stdout).strip().replace("\n", " ")
                      errors.append(f"JavaScript構文NG: {path} inline#{index}: {detail[:500]}")
                  else:
                      js_check_count += 1

          for path in [p for p in tracked_files if p.lower().endswith((".js", ".mjs", ".cjs"))]:
              raw = git_bytes(path)
              suffix = Path(path).suffix.lower() or ".js"
              temp_js = TMP / ("file-" + re.sub(r"[^A-Za-z0-9_.-]", "_", path))
              if temp_js.suffix.lower() not in {".js", ".mjs", ".cjs"}:
                  temp_js = temp_js.with_suffix(suffix)
              temp_js.write_bytes(raw)
              proc = subprocess.run(
                  ["node", "--check", str(temp_js)],
                  text=True,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  check=False,
              )
              if proc.returncode != 0:
                  detail = (proc.stderr or proc.stdout).strip().replace("\n", " ")
                  errors.append(f"JavaScript構文NG: {path}: {detail[:500]}")
              else:
                  js_check_count += 1

          yaml_sources: List[Tuple[str, bytes]] = []
          for path in tracked_files:
              if path.lower().endswith((".yml", ".yaml")):
                  yaml_sources.append((path, git_bytes(path)))

          current_workflow = ROOT / workflow_file
          if current_workflow.exists():
              yaml_sources.append((workflow_file, current_workflow.read_bytes()))

          yaml_check_count = 0
          ruby_available = subprocess.run(
              ["bash", "-lc", "command -v ruby >/dev/null 2>&1"],
              check=False,
          ).returncode == 0

          if not ruby_available:
              warnings.append("Rubyが見つからないため、既存YMLの追加構文検査を省略")
          else:
              for index, (path, raw) in enumerate(yaml_sources, start=1):
                  temp_yml = TMP / f"yaml-{index}.yml"
                  temp_yml.write_bytes(raw)
                  proc = subprocess.run(
                      [
                          "ruby",
                          "-e",
                          "require 'yaml'; YAML.parse_file(ARGV[0]); puts 'OK'",
                          str(temp_yml),
                      ],
                      text=True,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.PIPE,
                      check=False,
                  )
                  if proc.returncode != 0:
                      detail = (proc.stderr or proc.stdout).strip().replace("\n", " ")
                      errors.append(f"YML構文NG: {path}: {detail[:500]}")
                  else:
                      yaml_check_count += 1

          combined_text = "\n".join(text_cache.values())

          feature_requirements = {
              "PC今日の予約": ("owner.html", ["todayList", "loadDayBtn"]),
              "PC今日やること": ("owner.html", ["todoList"]),
              "PC予約一覧": ("owner.html", ["reservationList", "loadReservationsBtn"]),
              "PC顧客カルテ": ("owner.html", ["customerList", "customerDetail", "saveNoteBtn"]),
              "PC回数券": ("owner.html", ["ticketList", "loadTicketsBtn"]),
              "PCフォロー": ("owner.html", ["followupList", "loadFollowupsBtn"]),
              "会員次回予約": ("member.html", ["reservationList", "phoneInput"]),
              "会員回数券": ("member.html", ["ticketList"]),
              "会員来店履歴": ("member.html", ["historyList"]),
              "スタッフ本日予約": ("staff.html", ["refreshBtn", "statTotal"]),
              "予約メニュー選択": ("index-brush.html", ["menuList", "viewMenu"]),
              "予約日時選択": ("index-brush.html", ["slotList", "dateInput"]),
              "カウンセリング": ("index-brush.html", ["viewConsultation", "concerns"]),
              "system-check": ("system-check.html", ["checks", "btnReload", "btnPrepare"]),
          }

          for label, (path, tokens) in feature_requirements.items():
              text = text_cache.get(path, "")
              missing = [token for token in tokens if token not in text]
              if missing:
                  errors.append(f"既存機能維持NG: {label} / {path} / 不足: {', '.join(missing)}")
              else:
                  ok_items.append(f"既存機能維持: {label}")

          esthe_statuses = [
              "reserved",
              "checked_in",
              "in_treatment",
              "waiting_payment",
              "completed",
              "cancelled",
          ]
          missing_statuses = [s for s in esthe_statuses if s not in combined_text]
          if missing_statuses:
              errors.append("エステ進捗ステータス不足: " + ", ".join(missing_statuses))
          else:
              ok_items.append("エステ業務進捗ステータス維持")

          business_tokens = {
              "顧客カルテ": ["カルテ", "note"],
              "回数券": ["回数券", "ticket"],
              "施術後フォロー": ["フォロー", "follow"],
              "カウンセリング": ["カウンセリング", "concern"],
              "スタッフ指名": ["スタッフ", "staff"],
          }
          for label, tokens in business_tokens.items():
              if all(token.lower() in combined_text.lower() for token in tokens):
                  ok_items.append(f"エステ業務ロジック: {label}")
              else:
                  warnings.append(f"エステ業務ロジック要確認: {label}")

          normalize_hits = [
              path for path, text in text_cache.items()
              if "normalizePhone" in text or "normalize_phone" in text
          ]
          if len(normalize_hits) < 3:
              errors.append(
                  "電話番号正規化の維持確認NG: "
                  + (", ".join(normalize_hits) if normalize_hits else "該当なし")
              )
          else:
              ok_items.append(f"電話番号正規化: {len(normalize_hits)}ファイル")

          if "isPastSlot" in combined_text or "過去日時" in combined_text:
              ok_items.append("過去日時防止ロジック存在")
          else:
              warnings.append("過去日時防止ロジックを画面ソースから明確に確認できない")

          duplicate_terms = [
              "duplicate",
              "重複",
              "overlap",
              "already_reserved",
              "conflict",
          ]
          if any(term.lower() in combined_text.lower() for term in duplicate_terms):
              ok_items.append("重複防止関連ロジック存在")
          else:
              warnings.append("重複防止はWorker側依存の可能性。NEXT-3前にAPI実査が必要")

          endpoint_pattern = re.compile(r"""(?P<q>["'`])(?P<url>/api/[A-Za-z0-9_./?&=${}-]+)(?P=q)""")
          endpoints = sorted({
              m.group("url")
              for text in text_cache.values()
              for m in endpoint_pattern.finditer(text)
          })

          security_findings: List[str] = []
          public_files = ["index.html", "index-brush.html", "member.html"]
          management_links = ["admin.html", "owner.html", "staff.html", "system-check.html"]

          for path in public_files:
              text = text_cache.get(path, "")
              if re.search(r"管理コード\s*[：:]\s*1234", text):
                  security_findings.append(
                      f"ATTENTION\t{path}\t公開系画面に管理コード1234の表示が含まれる"
                  )
              linked = [name for name in management_links if name in text]
              if linked:
                  security_findings.append(
                      f"ATTENTION\t{path}\t公開系画面から管理系リンクが参照される: {', '.join(linked)}"
                  )
              if re.search(r"[?&]admin_key=", text):
                  security_findings.append(
                      f"ATTENTION\t{path}\tURLクエリへadmin_keyを付与する記述がある"
                  )

          for path in ["owner.html", "admin.html", "staff.html", "system-check.html"]:
              text = text_cache.get(path, "")
              if re.search(r"管理コード\s*[：:]\s*1234", text):
                  security_findings.append(
                      f"ATTENTION\t{path}\t管理コードが画面本文へ固定表示される"
                  )
              if re.search(r"[?&]admin_key=", text):
                  security_findings.append(
                      f"ATTENTION\t{path}\tURLクエリへadmin_keyを付与する記述がある"
                  )

          if security_findings:
              warnings.extend(
                  "セキュリティ注意: " + line.split("\t", 2)[-1]
                  for line in security_findings
              )
          else:
              ok_items.append("管理情報混入の静的検査で重大所見なし")

          version_rows = []
          for path in required_files:
              text = text_cache.get(path, "")
              steps = sorted(set(re.findall(r"STEP\s+(ESTHE-[A-Za-z0-9-]+)", text)))
              versions = sorted(set(re.findall(r"""(?:const\s+VERSION|version)\s*[:=]\s*["']([^"']+)["']""", text)))
              version_rows.append({
                  "path": path,
                  "step_labels": steps,
                  "internal_versions": versions[:10],
              })

          all_step_labels = sorted({
              label
              for row in version_rows
              for label in row["step_labels"]
          })
          if len(all_step_labels) > 1:
              warnings.append("画面STEP表記が複数存在: " + ", ".join(all_step_labels))

          public_check_file = TMP / "public-checks.txt"
          public_rows = []
          if public_check_file.exists():
              for line in public_check_file.read_text(encoding="utf-8").splitlines():
                  parts = line.split("\t")
                  while len(parts) < 6:
                      parts.append("")
                  public_rows.append({
                      "label": parts[0],
                      "status": parts[1],
                      "http_code": parts[2],
                      "seconds": parts[3],
                      "url": parts[4],
                      "error": parts[5],
                  })
                  if parts[1] != "OK":
                      warnings.append(
                          f"公開疎通注意: {parts[0]} HTTP {parts[2]} {parts[5]}".strip()
                      )

          hashes.sort(key=lambda row: row["path"])
          (OUT / "esthe-file-hashes.json").write_text(
              json.dumps(
                  {
                      "schema_version": 1,
                      "system": "DPRO エステ LINE",
                      "step": "ESTHE-NEXT-1",
                      "source_commit": base_sha,
                      "generated_at_jst": now_jst.isoformat(),
                      "files": hashes,
                  },
                  ensure_ascii=False,
                  indent=2,
              ) + "\n",
              encoding="utf-8",
          )

          security_text = [
              "DPRO エステ LINE / ESTHE-NEXT-1 セキュリティ静的検査",
              f"検査基準Commit: {base_sha}",
              f"作成日時JST: {now_jst.isoformat()}",
              "",
          ]
          if security_findings:
              security_text.extend(security_findings)
          else:
              security_text.append("OK\t-\t管理情報混入の静的検査で所見なし")
          security_text.extend([
              "",
              "対応方針:",
              "- NEXT-2で公開画面から管理コード表示と管理系リンクを分離する。",
              "- 管理コードをURLへ固定付与せず、管理画面内で入力・削除できる方式へ整理する。",
              "- NEXT-1では既存画面を変更しない。",
          ])
          (OUT / "esthe-security-findings.txt").write_text(
              "\n".join(security_text) + "\n",
              encoding="utf-8",
          )

          api_lines = [
              "DPRO エステ LINE / ESTHE-NEXT-1 API・公開基準",
              f"基準Commit: {base_sha}",
              f"バックアップタグ: {backup_tag}",
              f"作成日時JST: {now_jst.isoformat()}",
              f"Worker変更: {os.environ['WORKER_CHANGED']}",
              f"Supabase変更: {os.environ['SUPABASE_CHANGED']}",
              f"API変更: {os.environ['API_CHANGED']}",
              "",
              "公開疎通:",
          ]
          if public_rows:
              for row in public_rows:
                  api_lines.append(
                      f"- {row['status']} | {row['label']} | HTTP {row['http_code']} | "
                      f"{row['seconds']}s | {row['url']} | {row['error']}"
                  )
          else:
              api_lines.append("- ATTENTION | 公開疎通結果ファイルなし")

          api_lines.extend(["", "画面ソースから確認したAPIパス:"])
          if endpoints:
              api_lines.extend(f"- {endpoint}" for endpoint in endpoints)
          else:
              api_lines.append("- ATTENTION: 静的抽出できるAPIパスなし")

          (OUT / "esthe-api-baseline.txt").write_text(
              "\n".join(api_lines) + "\n",
              encoding="utf-8",
          )

          overall = "NG" if errors else ("ATTENTION" if warnings else "OK")

          def yq(value: str) -> str:
              return json.dumps(str(value), ensure_ascii=False)

          baseline_lines = [
              "schema_version: 1",
              f"system: {yq('DPRO エステ LINE')}",
              f"step_name: {yq('ESTHE-NEXT-1')}",
              f"current_step: {yq(current_step)}",
              f"next_step: {yq(next_step)}",
              f"completed_at_jst: {yq(now_jst.isoformat())}",
              f"repository: {yq(os.environ.get('GITHUB_REPOSITORY', ''))}",
              f"branch: {yq(os.environ.get('GITHUB_REF_NAME', 'main'))}",
              f"source_commit: {yq(base_sha)}",
              "backup:",
              f"  tag: {yq(backup_tag)}",
              f"  rollback_method: {yq(os.environ['ROLLBACK_METHOD'])}",
              "pre_step_check:",
              f"  status: {yq(precheck_status)}",
              f"  detail: {yq(precheck_detail)}",
              "change_record:",
              f"  summary: {yq(os.environ['CHANGE_SUMMARY'])}",
              f"  worker_changed: {os.environ['WORKER_CHANGED']}",
              f"  supabase_changed: {os.environ['SUPABASE_CHANGED']}",
              f"  api_changed: {os.environ['API_CHANGED']}",
              "validation:",
              f"  overall: {yq(overall)}",
              f"  ok_count: {len(ok_items)}",
              f"  attention_count: {len(warnings)}",
              f"  ng_count: {len(errors)}",
              f"  html_files_checked: {len(html_files)}",
              f"  html_id_files_checked: {id_check_count}",
              f"  javascript_units_checked: {js_check_count}",
              f"  inline_scripts_checked: {inline_script_count}",
              f"  yaml_files_checked: {yaml_check_count}",
              f"  tracked_file_count: {len(tracked_files)}",
              "target_files:",
          ]
          baseline_lines.extend(f"  - {yq(path)}" for path in tracked_files)
          baseline_lines.extend([
              "known_risks:",
          ])
          if warnings:
              baseline_lines.extend(f"  - {yq(item)}" for item in warnings)
          else:
              baseline_lines.append(f"  - {yq('なし')}")
          baseline_lines.extend([
              "next_action:",
              f"  step: {yq(next_step)}",
              f"  purpose: {yq('公開画面の管理情報分離とPCオーナー画面の今日やること整理')}",
          ])

          (OUT / "esthe-current-baseline.yml").write_text(
              "\n".join(baseline_lines) + "\n",
              encoding="utf-8",
          )

          state_lines = [
              "schema_version: 1",
              f"system: {yq('DPRO エステ LINE')}",
              f"current_step: {yq(current_step)}",
              f"next_step: {yq(next_step)}",
              f"updated_at_jst: {yq(now_jst.isoformat())}",
              f"source_commit: {yq(base_sha)}",
              f"backup_tag: {yq(backup_tag)}",
              f"result: {yq(overall)}",
              "changes:",
              f"  worker: {os.environ['WORKER_CHANGED']}",
              f"  supabase: {os.environ['SUPABASE_CHANGED']}",
              f"  api: {os.environ['API_CHANGED']}",
          ]
          (OUT / "esthe-step-state.yml").write_text(
              "\n".join(state_lines) + "\n",
              encoding="utf-8",
          )

          report_lines = [
              "DPRO エステ LINE / ESTHE-NEXT-1 実行結果",
              f"状態: {overall}",
              f"基準Commit: {base_sha}",
              f"バックアップタグ: {backup_tag}",
              f"完了日時JST: {now_jst.isoformat()}",
              f"OK: {len(ok_items)}",
              f"注意: {len(warnings)}",
              f"NG: {len(errors)}",
              "",
              "OK項目:",
          ]
          report_lines.extend(f"- OK: {item}" for item in ok_items)
          report_lines.extend(["", "注意項目:"])
          report_lines.extend(f"- ATTENTION: {item}" for item in warnings)
          report_lines.extend(["", "NG項目:"])
          report_lines.extend(f"- NG: {item}" for item in errors)
          report_lines.extend([
              "",
              "変更記録:",
              "- Worker: 変更なし",
              "- Supabase: 変更なし",
              "- API: 変更なし",
              "- 既存HTML/JavaScript: 変更なし",
              "- 追加: .dpro-next基準台帳のみ",
              "",
              f"次STEP: {next_step}",
          ])
          (OUT / "esthe-next1-report.txt").write_text(
              "\n".join(report_lines) + "\n",
              encoding="utf-8",
          )

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary_path.open("a", encoding="utf-8") as summary:
              summary.write("\n### ESTHE-NEXT-1 自動検査結果\n")
              summary.write(f"- 総合: **{overall}**\n")
              summary.write(f"- OK: {len(ok_items)}\n")
              summary.write(f"- 注意: {len(warnings)}\n")
              summary.write(f"- NG: {len(errors)}\n")
              summary.write(f"- HTML: {len(html_files)}ファイル\n")
              summary.write(f"- JavaScript構文: {js_check_count}単位\n")
              summary.write(f"- YML構文: {yaml_check_count}ファイル\n")
              summary.write(f"- ID重複なし: {id_check_count}ファイル\n")
              summary.write(f"- Worker変更: {os.environ['WORKER_CHANGED']}\n")
              summary.write(f"- Supabase変更: {os.environ['SUPABASE_CHANGED']}\n")
              summary.write(f"- API変更: {os.environ['API_CHANGED']}\n")
              summary.write(f"- 次STEP: `{next_step}`\n")

              if warnings:
                  summary.write("\n#### 注意\n")
                  for item in warnings[:30]:
                      summary.write(f"- {item}\n")

              if errors:
                  summary.write("\n#### NG\n")
                  for item in errors:
                      summary.write(f"- {item}\n")

          print(json.dumps({
              "overall": overall,
              "ok": len(ok_items),
              "attention": len(warnings),
              "ng": len(errors),
              "baseline_sha": base_sha,
              "backup_tag": backup_tag,
          }, ensure_ascii=False, indent=2))

          if errors:
              sys.exit(1)
          PY

      - name: "Upload NEXT-1 inspection artifacts"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "ESTHE-NEXT-1-inspection-${{ github.run_id }}"
          path: |
            .dpro-next/
            .next1_tmp/public-checks.txt
          if-no-files-found: warn
          retention-days: 30

      - name: "Commit baseline ledger, delete this workflow, and push"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail

          test -f ".dpro-next/esthe-current-baseline.yml"
          test -f ".dpro-next/esthe-file-hashes.json"
          test -f ".dpro-next/esthe-api-baseline.txt"
          test -f ".dpro-next/esthe-security-findings.txt"
          test -f ".dpro-next/esthe-step-state.yml"
          test -f ".dpro-next/esthe-next1-report.txt"

          git add .dpro-next
          git rm --ignore-unmatch "$WORKFLOW_FILE"

          if git diff --cached --quiet; then
            echo "::error::Commit対象がありません。基準台帳またはYML削除を確認してください。"
            exit 1
          fi

          git commit -m "DPRO ESTHE NEXT-1 complete: protect baseline and create ledger"
          git push origin "HEAD:${GITHUB_REF_NAME}"

          echo "### 自動Commit・Push" >> "$GITHUB_STEP_SUMMARY"
          echo "- 完了Commit: \`$(git rev-parse HEAD)\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- YML自身: 削除済み" >> "$GITHUB_STEP_SUMMARY"
          echo "- current_step: \`$CURRENT_STEP_AFTER_SUCCESS\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- next_step: \`$NEXT_STEP_AFTER_SUCCESS\`" >> "$GITHUB_STEP_SUMMARY"
