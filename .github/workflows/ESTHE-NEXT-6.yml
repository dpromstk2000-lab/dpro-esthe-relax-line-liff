# DPRO エステ LINE
# STEP名: ESTHE-NEXT-6
#
# 対象:
# - staff.html
# - owner-ipad.html（新規）
# - DPRO NEXT完成台帳
#
# 目的:
# - PC・店舗iPad・スタッフスマホの役割を分離
# - 店舗iPadは当日進捗と施術前確認に集中
# - スタッフ画面は自分の担当と次の1操作に集中
# - 初期表示を重くしない
#
# 変更前バックアップタグ:
# - backup-esthe-before-next6-YYYYMMDD
#
# 前STEP:
# - current_step: ESTHE-NEXT-5-COMPLETE
# - next_step: ESTHE-NEXT-6
#
# Worker変更: なし
# Supabase変更: なし
# API変更: なし
#
# 成功後:
# - current_step: ESTHE-NEXT-6-COMPLETE
# - next_step: ESTHE-NEXT-7
# - YML自身を削除
# - 自動Commit / Push

name: "DPRO ESTHE NEXT-6 - iPad and Staff Field Optimization"

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ESTHE-NEXT-6.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: "dpro-esthe-next"
  cancel-in-progress: false

env:
  STEP_NAME: "ESTHE-NEXT-6"
  WORKFLOW_FILE: ".github/workflows/ESTHE-NEXT-6.yml"
  EXPECTED_PREVIOUS_STEP: "ESTHE-NEXT-5-COMPLETE"
  EXPECTED_CURRENT_NEXT: "ESTHE-NEXT-6"
  CURRENT_STEP_AFTER_SUCCESS: "ESTHE-NEXT-6-COMPLETE"
  NEXT_STEP_AFTER_SUCCESS: "ESTHE-NEXT-7"
  BACKUP_TAG_PREFIX: "backup-esthe-before-next6"
  API_BASE: "https://dpro-esthe-relax-line-api.dpromstk2000.workers.dev"
  PAGES_BASE: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff"
  SHOP_CODE: "esthe_demo_default"

jobs:
  esthe-next-6:
    name: "Apply ESTHE NEXT-6 safely"
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: "Checkout repository with history"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: "Configure Git identity"
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "DPRO NEXT Actions"
          git config user.email "actions@users.noreply.github.com"

      - name: "Confirm ESTHE-NEXT-5 completion"
        shell: bash
        run: |
          set -Eeuo pipefail
          STATE_FILE=".dpro-next/esthe-step-state.yml"
          test -f "$STATE_FILE"
          CURRENT_STEP="$(awk -F': *' '/^current_step:/{gsub(/["'"'"']/, "", $2); print $2; exit}' "$STATE_FILE")"
          NEXT_STEP="$(awk -F': *' '/^next_step:/{gsub(/["'"'"']/, "", $2); print $2; exit}' "$STATE_FILE")"
          [[ "$CURRENT_STEP" == "$EXPECTED_PREVIOUS_STEP" ]] || { echo "::error::前STEP未完了 current_step=$CURRENT_STEP"; exit 1; }
          [[ "$NEXT_STEP" == "$EXPECTED_CURRENT_NEXT" ]] || { echo "::error::next_step不一致 next_step=$NEXT_STEP"; exit 1; }
          echo "### 前STEP完了確認" >> "$GITHUB_STEP_SUMMARY"
          echo "- current_step: \`$CURRENT_STEP\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- next_step: \`$NEXT_STEP\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- 判定: **OK**" >> "$GITHUB_STEP_SUMMARY"

      - name: "Confirm existing Worker APIs"
        shell: bash
        run: |
          set -Eeuo pipefail
          JST_DATE="$(TZ=Asia/Tokyo date +%F)"
          HEALTH_CODE="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 40 -o /tmp/next6-health.json -w "%{http_code}" "${API_BASE}/api/health")"
          SETTINGS_CODE="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 40 -H "x-admin-secret: 1234" -o /tmp/next6-settings.json -w "%{http_code}" "${API_BASE}/api/admin/settings?shop_code=${SHOP_CODE}")"
          DAY_CODE="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 45 -H "x-admin-secret: 1234" -o /tmp/next6-day.json -w "%{http_code}" "${API_BASE}/api/admin/day?shop_code=${SHOP_CODE}&date=${JST_DATE}")"
          [[ "$HEALTH_CODE" =~ ^2 ]] || { echo "::error::health API HTTP $HEALTH_CODE"; exit 1; }
          [[ "$SETTINGS_CODE" =~ ^2 ]] || { echo "::error::settings API HTTP $SETTINGS_CODE"; exit 1; }
          [[ "$DAY_CODE" =~ ^2 ]] || { echo "::error::day API HTTP $DAY_CODE"; exit 1; }
          grep -q '/api/admin/customers/detail' owner.html
          grep -q '/api/admin/karte/save' owner.html
          grep -q '/api/admin/reservations/status' staff.html
          echo "### 既存API再利用" >> "$GITHUB_STEP_SUMMARY"
          echo "- health / settings / day: **OK**" >> "$GITHUB_STEP_SUMMARY"
          echo "- customers/detail / karte/save / status: **既存実装を再利用**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Worker・SQL変更: **不要**" >> "$GITHUB_STEP_SUMMARY"

      - name: "Create change-before backup tag"
        shell: bash
        run: |
          set -Eeuo pipefail
          CHANGE_BEFORE_SHA="$GITHUB_SHA"
          mapfile -t HEAD_FILES < <(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          if [[ "${#HEAD_FILES[@]}" -eq 1 && "${HEAD_FILES[0]}" == "$WORKFLOW_FILE" ]]; then
            CHANGE_BEFORE_SHA="$(git rev-parse "${GITHUB_SHA}^")"
          fi
          JST_DATE="$(TZ=Asia/Tokyo date +%Y%m%d)"
          BASE_TAG="${BACKUP_TAG_PREFIX}-${JST_DATE}"
          BACKUP_TAG="$BASE_TAG"
          if git ls-remote --exit-code --tags origin "refs/tags/$BACKUP_TAG" >/dev/null 2>&1; then
            BACKUP_TAG="${BASE_TAG}-run-${GITHUB_RUN_ID}"
          fi
          git tag -a "$BACKUP_TAG" "$CHANGE_BEFORE_SHA" -m "DPRO ESTHE before NEXT-6: $CHANGE_BEFORE_SHA"
          git push origin "refs/tags/$BACKUP_TAG"
          echo "CHANGE_BEFORE_SHA=$CHANGE_BEFORE_SHA" >> "$GITHUB_ENV"
          echo "BACKUP_TAG=$BACKUP_TAG" >> "$GITHUB_ENV"
          echo "### 変更前バックアップ" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`$CHANGE_BEFORE_SHA\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`$BACKUP_TAG\`" >> "$GITHUB_STEP_SUMMARY"

      - name: "Apply iPad and staff field optimization"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-6-apply>","exec"))'

      - name: "Run HTML JavaScript ID role and performance validation"
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p .next6_tmp
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-6-validation>","exec"))'
          ruby -e 'require "yaml"; YAML.parse_file(ARGV[0]); puts "YML syntax OK"' "$WORKFLOW_FILE"

      - name: "Update NEXT completion ledger"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-6-ledger>","exec"))'

      - name: "Final completion validation"
        shell: bash
        run: |
          set -Eeuo pipefail
          grep -q 'current_step: "ESTHE-NEXT-6-COMPLETE"' .dpro-next/esthe-step-state.yml
          grep -q 'next_step: "ESTHE-NEXT-7"' .dpro-next/esthe-step-state.yml
          grep -q '<!-- STEP ESTHE-NEXT-6 -->' staff.html
          grep -q '<!-- STEP ESTHE-NEXT-6 -->' owner-ipad.html
          grep -q 'id="fieldCommandCenter"' staff.html
          grep -q 'function hasPreTreatmentConfirmation' staff.html
          grep -q 'class="owner-ipad-mode"' owner-ipad.html
          grep -q 'id="preTreatmentConfirmSection"' owner-ipad.html
          grep -q 'owner_ipad_initial_admin_api_requests: 1' .dpro-next/esthe-step-state.yml

      - name: "Upload NEXT-6 validation artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "ESTHE-NEXT-6-validation-${{ github.run_id }}"
          path: |
            .next6_tmp/validation.json
            .dpro-next/esthe-next6-report.txt
            .dpro-next/esthe-next6-change-record.json
          if-no-files-found: warn
          retention-days: 30

      - name: "Commit changes, delete workflow and push"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          git add staff.html owner-ipad.html             .dpro-next/esthe-step-state.yml             .dpro-next/esthe-current-baseline.yml             .dpro-next/esthe-next6-report.txt             .dpro-next/esthe-next6-change-record.json
          git rm --ignore-unmatch "$WORKFLOW_FILE"
          git diff --cached --quiet && { echo "::error::Commit対象がありません"; exit 1; }
          git commit -m "DPRO ESTHE NEXT-6 complete: iPad and staff field optimization"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "### 自動Commit・Push" >> "$GITHUB_STEP_SUMMARY"
          echo "- 完了Commit: \`$(git rev-parse HEAD)\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- YML自身: 削除済み" >> "$GITHUB_STEP_SUMMARY"
          echo "- current_step: \`$CURRENT_STEP_AFTER_SUCCESS\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- next_step: \`$NEXT_STEP_AFTER_SUCCESS\`" >> "$GITHUB_STEP_SUMMARY"

      - name: "Confirm GitHub Pages publication"
        if: success()
        continue-on-error: true
        shell: bash
        run: |
          set -Eeuo pipefail
          PUBLISHED="false"
          for attempt in $(seq 1 24); do
            STAFF_BODY="$(curl -L -sS --retry 2 --connect-timeout 8 --max-time 25 -H "Cache-Control: no-cache" "${PAGES_BASE}/staff.html?next6=${GITHUB_RUN_ID}_${attempt}" || true)"
            IPAD_BODY="$(curl -L -sS --retry 2 --connect-timeout 8 --max-time 25 -H "Cache-Control: no-cache" "${PAGES_BASE}/owner-ipad.html?next6=${GITHUB_RUN_ID}_${attempt}" || true)"
            if [[ "$STAFF_BODY" == *"STEP ESTHE-NEXT-6"* && "$STAFF_BODY" == *'id="fieldCommandCenter"'* && "$IPAD_BODY" == *"STEP ESTHE-NEXT-6"* && "$IPAD_BODY" == *'class="owner-ipad-mode"'* ]]; then
              PUBLISHED="true"
              break
            fi
            sleep 10
          done
          echo "### GitHub Pages公開確認" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$PUBLISHED" == "true" ]]; then
            echo "- 判定: **OK**" >> "$GITHUB_STEP_SUMMARY"
            echo "- staff.html / owner-ipad.html: NEXT-6確認" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- 判定: **注意**" >> "$GITHUB_STEP_SUMMARY"
            echo "- Pages反映待ちの可能性があります。ソースCommitは完了しています。" >> "$GITHUB_STEP_SUMMARY"
          fi
