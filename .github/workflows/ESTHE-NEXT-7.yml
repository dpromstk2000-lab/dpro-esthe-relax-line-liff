# DPRO エステ LINE
# STEP名: ESTHE-NEXT-7
#
# 対象ファイル:
# - member.html
# - index-brush.html
# - DPRO NEXT完成台帳
#
# 目的:
# - LINE会員ページへ来店履歴・前回内容・次回来店目安を追加
# - 前回と同じメニュー・担当で新しい予約へ進める
# - 日時・体調・同意は毎回再確認し、安全性を維持
#
# 変更前バックアップタグ:
# - backup-esthe-before-next7-YYYYMMDD
#
# 前STEP:
# - current_step: ESTHE-NEXT-6-COMPLETE
# - next_step: ESTHE-NEXT-7
#
# Worker変更: なし
# Supabase変更: なし
# API変更: なし
#
# 次STEP:
# - ESTHE-NEXT-8
#
# 成功後:
# - 完成台帳更新
# - 自動Commit / Push
# - このYML自身を削除

name: "DPRO ESTHE NEXT-7 - Member History and Repeat Booking"

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ESTHE-NEXT-7.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: "dpro-esthe-next"
  cancel-in-progress: false

env:
  STEP_NAME: "ESTHE-NEXT-7"
  WORKFLOW_FILE: ".github/workflows/ESTHE-NEXT-7.yml"
  EXPECTED_PREVIOUS_STEP: "ESTHE-NEXT-6-COMPLETE"
  EXPECTED_CURRENT_NEXT: "ESTHE-NEXT-7"
  CURRENT_STEP_AFTER_SUCCESS: "ESTHE-NEXT-7-COMPLETE"
  NEXT_STEP_AFTER_SUCCESS: "ESTHE-NEXT-8"
  BACKUP_TAG_PREFIX: "backup-esthe-before-next7"
  API_BASE: "https://dpro-esthe-relax-line-api.dpromstk2000.workers.dev"
  PAGES_BASE: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff"
  SHOP_CODE: "esthe_demo_default"

jobs:
  esthe-next-7:
    name: "Apply ESTHE NEXT-7 safely"
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: "Checkout repository with history"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: "Configure Git identity"
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "DPRO NEXT Actions"
          git config user.email "actions@users.noreply.github.com"

      - name: "Confirm ESTHE-NEXT-6 completion"
        shell: bash
        run: |
          set -Eeuo pipefail
          STATE_FILE=".dpro-next/esthe-step-state.yml"
          test -f "$STATE_FILE"
          CURRENT_STEP="$(awk -F': *' '/^current_step:/{gsub(/["'"'"']/, "", $2); print $2; exit}' "$STATE_FILE")"
          NEXT_STEP="$(awk -F': *' '/^next_step:/{gsub(/["'"'"']/, "", $2); print $2; exit}' "$STATE_FILE")"
          [[ "$CURRENT_STEP" == "$EXPECTED_PREVIOUS_STEP" ]] || { echo "::error::前STEP未完了 current_step=$CURRENT_STEP"; exit 1; }
          [[ "$NEXT_STEP" == "$EXPECTED_CURRENT_NEXT" ]] || { echo "::error::next_step不一致 next_step=$NEXT_STEP"; exit 1; }
          echo "### 前STEP完了確認" >> "$GITHUB_STEP_SUMMARY"
          echo "- current_step: \`$CURRENT_STEP\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- next_step: \`$NEXT_STEP\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- 判定: **OK**" >> "$GITHUB_STEP_SUMMARY"

      - name: "Confirm existing public APIs"
        shell: bash
        run: |
          set -Eeuo pipefail
          HEALTH_CODE="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 40 -o /tmp/next7-health.json -w "%{http_code}" "${API_BASE}/api/health")"
          SETTINGS_CODE="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 40 -o /tmp/next7-settings.json -w "%{http_code}" "${API_BASE}/api/public/settings?shop_code=${SHOP_CODE}")"
          MYPAGE_CODE="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 45 -o /tmp/next7-mypage.json -w "%{http_code}" "${API_BASE}/api/public/my-page?shop_code=${SHOP_CODE}&phone=08000003002")"
          [[ "$HEALTH_CODE" =~ ^2 ]] || { echo "::error::health API HTTP $HEALTH_CODE"; exit 1; }
          [[ "$SETTINGS_CODE" =~ ^2 ]] || { echo "::error::settings API HTTP $SETTINGS_CODE"; exit 1; }
          [[ "$MYPAGE_CODE" =~ ^2 ]] || { echo "::error::my-page API HTTP $MYPAGE_CODE"; exit 1; }
          python3 - <<'PY'
          import json
          from pathlib import Path
          settings = json.loads(Path("/tmp/next7-settings.json").read_text(encoding="utf-8"))
          mypage = json.loads(Path("/tmp/next7-mypage.json").read_text(encoding="utf-8"))
          if not isinstance(settings.get("menus", []), list):
              raise SystemExit("settings.menus is not a list")
          for key in ("next_reservations", "tickets"):
              if key in mypage and not isinstance(mypage[key], list):
                  raise SystemExit(f"my-page {key} is not a list")
          print("Public settings: OK")
          print("My page: OK")
          PY
          echo "### 既存公開API" >> "$GITHUB_STEP_SUMMARY"
          echo "- health / settings / my-page: **OK**" >> "$GITHUB_STEP_SUMMARY"
          echo "- staff / slots / reservations: **既存予約画面を再利用**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Worker・SQL変更: **不要**" >> "$GITHUB_STEP_SUMMARY"

      - name: "Create change-before backup tag"
        shell: bash
        run: |
          set -Eeuo pipefail
          CHANGE_BEFORE_SHA="$GITHUB_SHA"
          mapfile -t HEAD_FILES < <(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          if [[ "${#HEAD_FILES[@]}" -eq 1 && "${HEAD_FILES[0]}" == "$WORKFLOW_FILE" ]]; then
            CHANGE_BEFORE_SHA="$(git rev-parse "${GITHUB_SHA}^")"
          fi
          JST_DATE="$(TZ=Asia/Tokyo date +%Y%m%d)"
          BASE_TAG="${BACKUP_TAG_PREFIX}-${JST_DATE}"
          BACKUP_TAG="$BASE_TAG"
          if git ls-remote --exit-code --tags origin "refs/tags/$BACKUP_TAG" >/dev/null 2>&1; then
            BACKUP_TAG="${BASE_TAG}-run-${GITHUB_RUN_ID}"
          fi
          git tag -a "$BACKUP_TAG" "$CHANGE_BEFORE_SHA" -m "DPRO ESTHE before NEXT-7: $CHANGE_BEFORE_SHA"
          git push origin "refs/tags/$BACKUP_TAG"
          echo "CHANGE_BEFORE_SHA=$CHANGE_BEFORE_SHA" >> "$GITHUB_ENV"
          echo "BACKUP_TAG=$BACKUP_TAG" >> "$GITHUB_ENV"
          echo "### 変更前バックアップ" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`$CHANGE_BEFORE_SHA\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`$BACKUP_TAG\`" >> "$GITHUB_STEP_SUMMARY"

      - name: "Apply member history and repeat booking"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-7-apply>","exec"))'

      - name: "Run HTML JavaScript ID privacy and business validation"
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p .next7_tmp
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-7-validation>","exec"))'
          ruby -e 'require "yaml"; YAML.parse_file(ARGV[0]); puts "YML syntax OK"' "$WORKFLOW_FILE"

      - name: "Update NEXT completion ledger"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-7-ledger>","exec"))'

      - name: "Final completion validation"
        shell: bash
        run: |
          set -Eeuo pipefail
          grep -q 'current_step: "ESTHE-NEXT-7-COMPLETE"' .dpro-next/esthe-step-state.yml
          grep -q 'next_step: "ESTHE-NEXT-8"' .dpro-next/esthe-step-state.yml
          grep -q '<!-- STEP ESTHE-NEXT-7 -->' member.html
          grep -q '<!-- STEP ESTHE-NEXT-7 -->' index-brush.html
          grep -q 'id="repeatVisitPanel"' member.html
          grep -q 'function buildRepeatBookingPayload' member.html
          grep -q 'id="repeatBookingBanner"' index-brush.html
          grep -q 'function applyRepeatBookingIfAvailable' index-brush.html
          grep -q 'phone_in_repeat_url: false' .dpro-next/esthe-step-state.yml
          grep -q 'consultation_reuse: false' .dpro-next/esthe-step-state.yml

      - name: "Upload NEXT-7 validation artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "ESTHE-NEXT-7-validation-${{ github.run_id }}"
          path: |
            .next7_tmp/validation.json
            .dpro-next/esthe-next7-report.txt
            .dpro-next/esthe-next7-change-record.json
          if-no-files-found: warn
          retention-days: 30

      - name: "Commit changes, delete workflow and push"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          git add member.html index-brush.html             .dpro-next/esthe-step-state.yml             .dpro-next/esthe-current-baseline.yml             .dpro-next/esthe-next7-report.txt             .dpro-next/esthe-next7-change-record.json
          git rm --ignore-unmatch "$WORKFLOW_FILE"
          git diff --cached --quiet && { echo "::error::Commit対象がありません"; exit 1; }
          git commit -m "DPRO ESTHE NEXT-7 complete: member history and repeat booking"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "### 自動Commit・Push" >> "$GITHUB_STEP_SUMMARY"
          echo "- 完了Commit: \`$(git rev-parse HEAD)\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- YML自身: 削除済み" >> "$GITHUB_STEP_SUMMARY"
          echo "- current_step: \`$CURRENT_STEP_AFTER_SUCCESS\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- next_step: \`$NEXT_STEP_AFTER_SUCCESS\`" >> "$GITHUB_STEP_SUMMARY"

      - name: "Confirm GitHub Pages publication"
        if: success()
        continue-on-error: true
        shell: bash
        run: |
          set -Eeuo pipefail
          PUBLISHED="false"
          for attempt in $(seq 1 24); do
            MEMBER_BODY="$(curl -L -sS --retry 2 --connect-timeout 8 --max-time 25 -H "Cache-Control: no-cache" "${PAGES_BASE}/member.html?next7=${GITHUB_RUN_ID}_${attempt}" || true)"
            BRUSH_BODY="$(curl -L -sS --retry 2 --connect-timeout 8 --max-time 25 -H "Cache-Control: no-cache" "${PAGES_BASE}/index-brush.html?next7=${GITHUB_RUN_ID}_${attempt}" || true)"
            if [[ "$MEMBER_BODY" == *"STEP ESTHE-NEXT-7"* && "$MEMBER_BODY" == *'id="repeatVisitPanel"'* && "$BRUSH_BODY" == *"STEP ESTHE-NEXT-7"* && "$BRUSH_BODY" == *'id="repeatBookingBanner"'* ]]; then
              PUBLISHED="true"
              break
            fi
            sleep 10
          done
          echo "### GitHub Pages公開確認" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$PUBLISHED" == "true" ]]; then
            echo "- 判定: **OK**" >> "$GITHUB_STEP_SUMMARY"
            echo "- member.html / index-brush.html: NEXT-7確認" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- 判定: **注意**" >> "$GITHUB_STEP_SUMMARY"
            echo "- Pages反映待ちの可能性があります。ソースCommitは完了しています。" >> "$GITHUB_STEP_SUMMARY"
          fi
