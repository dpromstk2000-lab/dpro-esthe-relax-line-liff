      - name: "Final completion validation"
        shell: bash
        run: |
          set -Eeuo pipefail

          grep -q 'current_step: "ESTHE-NEXT-3-COMPLETE"' .dpro-next/esthe-step-state.yml
          grep -q 'next_step: "ESTHE-NEXT-4"' .dpro-next/esthe-step-state.yml
          grep -q '<!-- STEP ESTHE-NEXT-3 -->' owner.html
          grep -q 'id="visitHubLayer"' owner.html
