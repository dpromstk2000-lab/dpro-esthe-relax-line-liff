      - name: "Run syntax, ID, feature and business validation"
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p .next4_tmp

          python3 <<'PY'
          from __future__ import annotations

          import json
          import re
          import subprocess
          import sys
          from collections import Counter
          from html.parser import HTMLParser
          from pathlib import Path

          path = Path("owner.html")
          text = path.read_text(encoding="utf-8")
          errors = []
          warnings = []
          ok = []

          class Parser(HTMLParser):
              def __init__(self):
                  super().__init__(convert_charrefs=True)
                  self.ids = []
              def handle_starttag(self, tag, attrs):
                  for key, value in attrs:
                      if key.lower() == "id" and value:
                          self.ids.append(value)
              def handle_startendtag(self, tag, attrs):
                  self.handle_starttag(tag, attrs)

          parser = Parser()
          try:
              parser.feed(text)
              parser.close()
              ok.append("HTML解析")
          except Exception as exc:
              errors.append(f"HTML解析NG: {exc}")

          duplicates = sorted(key for key, count in Counter(parser.ids).items() if count > 1)
          if duplicates:
              errors.append("HTML ID重複: " + ", ".join(duplicates))
          else:
              ok.append("HTML ID重複なし")

          scripts = re.findall(
              r'<script\b(?![^>]*\bsrc=)[^>]*>(.*?)</script\s*>',
              text,
              flags=re.DOTALL | re.IGNORECASE,
          )
          for number, script in enumerate(scripts, 1):
              temp = Path(".next4_tmp") / f"owner-inline-{number}.js"
              temp.write_text(script, encoding="utf-8")
              proc = subprocess.run(
                  ["node", "--check", str(temp)],
                  text=True,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  check=False,
              )
              if proc.returncode:
                  detail = (proc.stderr or proc.stdout).replace("\n", " ")[:700]
                  errors.append(f"JavaScript構文NG script#{number}: {detail}")
              else:
                  ok.append(f"JavaScript構文 script#{number}")

          required = [
              "<!-- STEP ESTHE-NEXT-4 -->",
              "ESTHE-NEXT-4-TREATMENT-PROGRESS-BOARD-20260723",
              'id="progressBoard"',
              'id="progressBoardSummary"',
              "const progressBoardColumns = [",
              "function renderProgressBoard(",
              "function progressBoardCardHtml(",
              "function boardReservationTiming(",
              'data-board-detail="${index}"',
              'data-board-next="${index}:${escapeHtml(column.nextStatus)}"',
              'openIntegratedVisit("day"',
              'updateStatus("day"',
              "renderProgressBoard(rows);",
          ]
          missing = [token for token in required if token not in text]
          if missing:
              errors.append("NEXT-4進捗ボード不足: " + ", ".join(missing))
          else:
              ok.append("NEXT-4進捗ボード構成")

          existing = [
              "todayList",
              "todoSummary",
              "reservationList",
              "customerList",
              "customerDetail",
              "saveNoteBtn",
              "ticketList",
              "followupList",
              "templateList",
              "settingsBox",
              "visitHubLayer",
              "openIntegratedVisit",
              "/api/admin/reservations/status",
              "normalizePhone",
              "dproAdminClear",
              "x-admin-secret",
          ]
          missing_existing = [token for token in existing if token not in text]
          if missing_existing:
              errors.append("既存機能維持NG: " + ", ".join(missing_existing))
          else:
              ok.append("既存主要機能維持")

          expected_statuses = [
              "reserved",
              "checked_in",
              "in_treatment",
              "waiting_payment",
              "completed",
          ]
          columns_match = re.search(
              r"""const\s+progressBoardColumns\s*=\s*\[
                  (?P<body>.*?)
                  \]\s*;""",
              text,
              flags=re.DOTALL | re.VERBOSE,
          )
          if not columns_match:
              errors.append("進捗列順序NG: progressBoardColumnsが見つかりません")
          else:
              actual_statuses = re.findall(
                  r"""status\s*:\s*["']([^"']+)["']""",
                  columns_match.group("body"),
              )
              if actual_statuses != expected_statuses:
                  errors.append(
                      "進捗列順序NG: "
                      f"actual={actual_statuses} expected={expected_statuses}"
                  )
              else:
                  ok.append("進捗列順序")

          render_match = re.search(
              r"""function\s+renderProgressBoard\s*\([^)]*\)\s*\{
                  (?P<body>.*?)
                  \n\s*\}""",
              text,
              flags=re.DOTALL | re.VERBOSE,
          )
          if not render_match:
              errors.append("renderProgressBoardが見つかりません")
          else:
              render_body = render_match.group("body")
              if "api(" in render_body or "fetch(" in render_body:
                  errors.append("進捗ボード内で追加APIを呼び出しています")
              else:
                  ok.append("進捗ボード追加APIなし")
              if '["cancelled","no_show"]' not in render_body:
                  warnings.append("キャンセル除外ロジックを目視確認してください")
              else:
                  ok.append("キャンセル等を件数表示へ分離")

          init_match = re.search(r"async function init\(\)\{(?P<body>.*?)\n\}", text, flags=re.DOTALL)
          load_all_match = re.search(r"async function loadAll\(\)\{(?P<body>.*?)\n\}", text, flags=re.DOTALL)
          initial_blocks = "\n".join(
              match.group("body")
              for match in [init_match, load_all_match]
              if match
          )
          if "progressBoard" in initial_blocks and "/api/" in initial_blocks:
              warnings.append("初期処理内の進捗ボード関連記述を目視確認してください")
          if "/api/admin/customers/detail" in initial_blocks:
              errors.append("初期表示に顧客詳細APIが追加されています")
          else:
              ok.append("初期顧客詳細取得なし")

          drag_pattern = re.compile(
              r"""\bdragstart\b|
                  \bdraggable\s*=|
                  addEventListener\(\s*["']drop["']""",
              flags=re.IGNORECASE | re.VERBOSE,
          )
          if drag_pattern.search(text):
              warnings.append("ドラッグ操作の実装があります。NEXT-4追加箇所を目視確認してください")
          else:
              ok.append("ドラッグ操作なし")

          diff = subprocess.run(
              ["git", "diff", "--name-only"],
              text=True,
              stdout=subprocess.PIPE,
              check=True,
          ).stdout.splitlines()
          allowed = {
              "owner.html",
              ".dpro-next/esthe-next4-change-record.json",
              ".dpro-next/esthe-step-state.yml",
              ".dpro-next/esthe-current-baseline.yml",
              ".dpro-next/esthe-next4-report.txt",
          }
          unexpected = sorted(item for item in diff if item not in allowed)
          if unexpected:
              errors.append("想定外変更ファイル: " + ", ".join(unexpected))
          else:
              ok.append("変更範囲正常")

          size = path.stat().st_size
          if size > 950_000:
              errors.append(f"owner.html容量過大: {size} bytes")
          elif size > 550_000:
              warnings.append(f"owner.html容量注意: {size} bytes")
          else:
              ok.append(f"owner.html容量: {size} bytes")

          report = {
              "step": "ESTHE-NEXT-4",
              "ok": len(ok),
              "attention": len(warnings),
              "ng": len(errors),
              "ok_items": ok,
              "attention_items": warnings,
              "ng_items": errors,
          }
          Path(".next4_tmp/validation.json").write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          summary = Path(__import__("os").environ["GITHUB_STEP_SUMMARY"])
          with summary.open("a", encoding="utf-8") as file:
              file.write("\n### NEXT-4 自動検査\n")
              file.write(f"- OK: {len(ok)}\n")
              file.write(f"- 注意: {len(warnings)}\n")
              file.write(f"- NG: {len(errors)}\n")
              if warnings:
                  file.write("\n#### 注意\n")
                  for item in warnings:
                      file.write(f"- {item}\n")
              if errors:
                  file.write("\n#### NG\n")
                  for item in errors:
                      file.write(f"- {item}\n")

          print(json.dumps(report, ensure_ascii=False, indent=2))
          if errors:
              sys.exit(1)
          PY

          ruby -e 'require "yaml"; YAML.parse_file(ARGV[0]); puts "YML syntax OK"' "$WORKFLOW_FILE"

      - name: "Update NEXT completion ledger"
        shell: bash
        run: |
          set -Eeuo pipefail

          python3 <<'PY'
          import datetime as dt
          import json
          import os
