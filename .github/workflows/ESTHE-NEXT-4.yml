# DPRO エステ LINE
# STEP名: ESTHE-NEXT-4
#
# 目的:
# - NEXT-3で統合した「1件の予約＝1回来店・施術案件」を当日進捗ボードで見える化
# - オーナーが「誰が、どの段階で、次に何をするか」を最初の画面で判断できるようにする
#
# 対象ファイル:
# - owner.html
# - .dpro-next/esthe-step-state.yml
# - .dpro-next/esthe-current-baseline.yml
#
# 実施する変更:
# - 今日の予約画面に5列の業務進捗ボードを追加
# - 予約待ち / 来店済み / 施術中 / 会計待ち / 完了を列ごとに表示
# - 予約時刻経過、まもなく来店、施術開始待ち、会計対応を強調
# - ボードカードからNEXT-3の受付・施術詳細を開く
# - ボードカードから既存ステータス更新を使って次の段階へ進める
# - キャンセル・無断キャンセルはボード本体から除外し、件数だけ表示
# - 元の詳細一覧と今日やることは維持
#
# 軽量化:
# - 既存のstate.day.reservationsだけで描画
# - 新しい初期API呼び出しなし
# - 顧客詳細・画像・全期間予約は取得しない
# - ドラッグ&ドロップは追加しない
#
# 変更前バックアップタグ:
# - backup-esthe-before-next4-YYYYMMDD
#
# 前STEP完了確認:
# - current_step: ESTHE-NEXT-3-COMPLETE
# - next_step: ESTHE-NEXT-4
#
# 自動検査:
# - HTML / JavaScript / YML構文
# - HTML ID重複
# - 既存機能維持
# - 5段階ステータス順序
# - ボード列と予約カードの関連付け
# - NEXT-3詳細パネル連携
# - 既存ステータス更新連携
# - 初期API追加なし
# - ファイル容量
# - Worker既存API疎通
# - GitHub Pages公開反映
#
# Worker変更: なし
# Supabase変更: なし
# API変更: なし
#
# 次のSTEP:
# - ESTHE-NEXT-5
#
# 成功後:
# - 完成台帳更新
# - 自動Commit / Push
# - このYML自身を削除

name: "DPRO ESTHE NEXT-4 - Treatment Progress Board"

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ESTHE-NEXT-4.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: "dpro-esthe-next"
  cancel-in-progress: false

env:
  STEP_NAME: "ESTHE-NEXT-4"
  SYSTEM_NAME: "DPRO エステ LINE"
  WORKFLOW_FILE: ".github/workflows/ESTHE-NEXT-4.yml"
  EXPECTED_PREVIOUS_STEP: "ESTHE-NEXT-3-COMPLETE"
  EXPECTED_CURRENT_NEXT: "ESTHE-NEXT-4"
  CURRENT_STEP_AFTER_SUCCESS: "ESTHE-NEXT-4-COMPLETE"
  NEXT_STEP_AFTER_SUCCESS: "ESTHE-NEXT-5"
  BACKUP_TAG_PREFIX: "backup-esthe-before-next4"
  API_BASE: "https://dpro-esthe-relax-line-api.dpromstk2000.workers.dev"
  PAGES_BASE: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff"
  SHOP_CODE: "esthe_demo_default"
  WORKER_CHANGED: "false"
  SUPABASE_CHANGED: "false"
  API_CHANGED: "false"

jobs:
  esthe-next-4:
    name: "Apply ESTHE NEXT-4 safely"
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: "Checkout repository with history"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: "Configure Git identity"
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "DPRO NEXT Actions"
          git config user.email "actions@users.noreply.github.com"

      - name: "Confirm ESTHE-NEXT-3 completion"
        shell: bash
        run: |
          set -Eeuo pipefail

          STATE_FILE=".dpro-next/esthe-step-state.yml"
          test -f "$STATE_FILE"

          CURRENT_STEP="$(awk -F': *' '/^current_step:/{gsub(/["'"'"']/, "", $2); print $2; exit}' "$STATE_FILE")"
          NEXT_STEP="$(awk -F': *' '/^next_step:/{gsub(/["'"'"']/, "", $2); print $2; exit}' "$STATE_FILE")"

          if [[ "$CURRENT_STEP" != "$EXPECTED_PREVIOUS_STEP" ]]; then
            echo "::error::前STEP未完了です。current_step=$CURRENT_STEP / expected=$EXPECTED_PREVIOUS_STEP"
            exit 1
          fi

          if [[ "$NEXT_STEP" != "$EXPECTED_CURRENT_NEXT" ]]; then
            echo "::error::実行対象STEPが一致しません。next_step=$NEXT_STEP / expected=$EXPECTED_CURRENT_NEXT"
            exit 1
          fi

          echo "### 前STEP完了確認" >> "$GITHUB_STEP_SUMMARY"
          echo "- current_step: \`$CURRENT_STEP\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- next_step: \`$NEXT_STEP\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- 判定: **OK**" >> "$GITHUB_STEP_SUMMARY"

      - name: "Confirm existing Worker APIs"
        shell: bash
        run: |
          set -Eeuo pipefail

          JST_DATE="$(TZ=Asia/Tokyo date +%F)"

          HEALTH_CODE="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 40 \
            -o /tmp/esthe-next4-health.json \
            -w "%{http_code}" \
            "${API_BASE}/api/health")"

          DAY_CODE="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 45 \
            -H "Accept: application/json" \
            -H "x-admin-secret: 1234" \
            -o /tmp/esthe-next4-day.json \
            -w "%{http_code}" \
            "${API_BASE}/api/admin/day?shop_code=${SHOP_CODE}&date=${JST_DATE}")"

          if [[ ! "$HEALTH_CODE" =~ ^2 ]]; then
            echo "::error::Worker health確認失敗 HTTP $HEALTH_CODE"
            cat /tmp/esthe-next4-health.json || true
            exit 1
          fi

          if [[ ! "$DAY_CODE" =~ ^2 ]]; then
            echo "::error::既存day API確認失敗 HTTP $DAY_CODE"
            cat /tmp/esthe-next4-day.json || true
            exit 1
          fi

          python3 <<'PY'
          import json
          from pathlib import Path

          health = json.loads(Path("/tmp/esthe-next4-health.json").read_text(encoding="utf-8"))
          day = json.loads(Path("/tmp/esthe-next4-day.json").read_text(encoding="utf-8"))

          if health.get("ok") is not True:
              raise SystemExit("health ok=false")
          if day.get("ok") is not True:
              raise SystemExit("day API ok=false")
          if not isinstance(day.get("reservations", []), list):
              raise SystemExit("day.reservations is not a list")

          print("Worker health: OK")
          print("Day API: OK")
          print("Reservation count:", len(day.get("reservations", [])))
          PY

          echo "### Worker既存API" >> "$GITHUB_STEP_SUMMARY"
          echo "- health: **OK**" >> "$GITHUB_STEP_SUMMARY"
          echo "- admin/day: **OK**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Worker差し替え: **不要**" >> "$GITHUB_STEP_SUMMARY"

      - name: "Create change-before backup tag"
        shell: bash
        run: |
          set -Eeuo pipefail

          CHANGE_BEFORE_SHA="$GITHUB_SHA"
          mapfile -t HEAD_FILES < <(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")

          if [[ "${#HEAD_FILES[@]}" -eq 1 && "${HEAD_FILES[0]}" == "$WORKFLOW_FILE" ]]; then
            CHANGE_BEFORE_SHA="$(git rev-parse "${GITHUB_SHA}^")"
          fi

          JST_DATE="$(TZ=Asia/Tokyo date +%Y%m%d)"
          BASE_TAG="${BACKUP_TAG_PREFIX}-${JST_DATE}"
          BACKUP_TAG="$BASE_TAG"

          if git ls-remote --exit-code --tags origin "refs/tags/$BACKUP_TAG" >/dev/null 2>&1; then
            BACKUP_TAG="${BASE_TAG}-run-${GITHUB_RUN_ID}"
          fi

          git tag -a "$BACKUP_TAG" "$CHANGE_BEFORE_SHA" \
            -m "DPRO ESTHE before NEXT-4: $CHANGE_BEFORE_SHA"
          git push origin "refs/tags/$BACKUP_TAG"

          {
            echo "CHANGE_BEFORE_SHA=$CHANGE_BEFORE_SHA"
            echo "BACKUP_TAG=$BACKUP_TAG"
          } >> "$GITHUB_ENV"

          echo "### 変更前バックアップ" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`$CHANGE_BEFORE_SHA\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`$BACKUP_TAG\`" >> "$GITHUB_STEP_SUMMARY"

      - name: "Apply treatment progress board"
        shell: bash
        run: |
          set -Eeuo pipefail

          python3 <<'PY'
          from __future__ import annotations

          import datetime as dt
          import json
          from pathlib import Path

          ROOT = Path(".")
          OWNER = ROOT / "owner.html"
          text = OWNER.read_text(encoding="utf-8")

          def replace_once(source: str, old: str, new: str, label: str) -> str:
              count = source.count(old)
              if count != 1:
                  raise RuntimeError(f"{label}: 置換対象が1件ではありません count={count}")
              return source.replace(old, new, 1)

          def insert_before_once(source: str, anchor: str, addition: str, label: str) -> str:
              count = source.count(anchor)
              if count != 1:
                  raise RuntimeError(f"{label}: 挿入位置が1件ではありません count={count}")
              return source.replace(anchor, addition + "\n" + anchor, 1)

          if "<!-- STEP ESTHE-NEXT-3 -->" not in text:
              raise RuntimeError("owner.html: NEXT-3基準マーカーがありません")
          if "ESTHE-NEXT-3-RESERVATION-VISIT-INTEGRATION-20260723" not in text:
              raise RuntimeError("owner.html: NEXT-3 VERSIONがありません")
          if 'id="progressBoard"' in text:
              raise RuntimeError("owner.html: NEXT-4進捗ボードが既に存在します")

          text = replace_once(
              text,
              "<!-- STEP ESTHE-NEXT-3 -->",
              "<!-- STEP ESTHE-NEXT-4 -->",
              "STEPマーカー",
          )
          text = replace_once(
              text,
              "<title>DPRO Esthe Relaxation｜STEP ESTHE-NEXT-3｜owner.html</title>",
              "<title>DPRO Esthe Relaxation｜STEP ESTHE-NEXT-4｜owner.html</title>",
              "title",
          )
          text = replace_once(
              text,
              '<div class="badge">STEP ESTHE-NEXT-3｜予約・来店・施術統合</div>',
              '<div class="badge">STEP ESTHE-NEXT-4｜施術進捗・ステータス見える化</div>',
              "badge",
          )
          text = replace_once(
              text,
              'const VERSION = "ESTHE-NEXT-3-RESERVATION-VISIT-INTEGRATION-20260723";',
              'const VERSION = "ESTHE-NEXT-4-TREATMENT-PROGRESS-BOARD-20260723";',
              "VERSION",
          )

          css = r"""
          /* DPRO NEXT-4: 当日業務進捗ボード */
          .progress-board-panel{
            margin-bottom:18px;
            padding:20px;
            border:1px solid var(--line);
            border-radius:var(--radius);
            background:rgba(255,255,255,.96);
            box-shadow:var(--shadow);
          }
          .progress-board-head{
            display:flex;
            align-items:flex-start;
            justify-content:space-between;
            gap:14px;
            margin-bottom:14px;
          }
          .progress-board-head h2{
            margin:0 0 5px;
            font-size:23px;
            letter-spacing:-.035em;
          }
          .progress-board-head p{
            margin:0;
            color:var(--muted);
            font-size:13px;
            font-weight:800;
            line-height:1.65;
          }
          .progress-board-summary{
            display:flex;
            gap:7px;
            flex-wrap:wrap;
            justify-content:flex-end;
          }
          .progress-summary-pill{
            display:inline-flex;
            align-items:center;
            min-height:34px;
            padding:7px 10px;
            border:1px solid var(--line);
            border-radius:999px;
            background:var(--soft);
            color:var(--main);
            font-size:11px;
            font-weight:950;
            white-space:nowrap;
          }
          .progress-summary-pill.attention{
            background:#fff3e4;
            border-color:#edc998;
            color:#8d5908;
          }
          .progress-board-scroll{
            overflow-x:auto;
            padding:1px 1px 8px;
            scrollbar-width:thin;
          }
          .progress-board{
            min-width:1050px;
            display:grid;
            grid-template-columns:repeat(5,minmax(190px,1fr));
            gap:10px;
          }
          .progress-column{
            min-width:0;
            border:1px solid var(--line);
            border-radius:18px;
            background:var(--soft);
            overflow:hidden;
          }
          .progress-column[data-board-status="checked_in"]{background:#fff8e9}
          .progress-column[data-board-status="in_treatment"]{background:#f0faf6}
          .progress-column[data-board-status="waiting_payment"]{background:#fff1ed}
          .progress-column[data-board-status="completed"]{background:#eff6f2}
          .progress-column-head{
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:8px;
            min-height:58px;
            padding:12px;
            border-bottom:1px solid var(--line);
            background:rgba(255,255,255,.8);
          }
          .progress-column-title{
            font-size:13px;
            font-weight:1000;
            line-height:1.35;
            color:var(--main);
          }
          .progress-column-count{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            min-width:30px;
            height:30px;
            border-radius:999px;
            background:#fff;
            border:1px solid var(--line);
            color:var(--main);
            font-size:12px;
            font-weight:1000;
          }
          .progress-column-list{
            display:grid;
            gap:8px;
            padding:9px;
            max-height:570px;
            overflow:auto;
          }
          .progress-board-card{
            border:1px solid var(--line);
            border-left:5px solid var(--main2);
            border-radius:15px;
            padding:11px;
            background:#fff;
            box-shadow:0 7px 20px rgba(88,55,46,.06);
          }
          .progress-board-card.overdue{
            border-left-color:var(--danger);
            background:#fff7f7;
          }
          .progress-board-card.soon{
            border-left-color:var(--warn);
            background:#fffaf0;
          }
          .progress-board-card.attention{
            border-left-color:var(--gold);
          }
          .progress-board-time{
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:8px;
            margin-bottom:6px;
          }
          .progress-board-time strong{
            color:var(--main);
            font-size:17px;
            line-height:1;
          }
          .progress-board-customer{
            font-size:14px;
            font-weight:1000;
            line-height:1.4;
          }
          .progress-board-meta{
            margin-top:4px;
            color:var(--muted);
            font-size:11px;
            font-weight:850;
            line-height:1.55;
          }
          .progress-board-alert{
            display:inline-flex;
            align-items:center;
            margin-top:7px;
            border-radius:999px;
            padding:5px 8px;
            background:var(--soft);
            color:var(--main);
            font-size:10px;
            font-weight:950;
          }
          .progress-board-alert.overdue{background:#fff0f0;color:#ad3737}
          .progress-board-alert.soon{background:#fff4dc;color:#8d600d}
          .progress-board-alert.active{background:#e8f8f1;color:#087a59}
          .progress-board-actions{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:6px;
            margin-top:9px;
          }
          .progress-board-actions .mini{
            width:100%;
            min-height:38px;
            padding:7px 8px;
          }
          .progress-board-empty{
            min-height:96px;
            display:flex;
            align-items:center;
            justify-content:center;
            text-align:center;
            padding:14px 8px;
            color:var(--muted);
            font-size:11px;
            font-weight:900;
            line-height:1.6;
          }
          @media(max-width:760px){
            .progress-board-panel{padding:15px 12px}
            .progress-board-head{display:grid}
            .progress-board-summary{justify-content:flex-start}
            .progress-board{min-width:920px}
          }
          """
          text = insert_before_once(
              text,
              "</style>",
              css,
              "進捗ボードCSS",
          )

          board_html = r"""
          <section class="progress-board-panel" aria-labelledby="progressBoardTitle">
            <div class="progress-board-head">
              <div>
                <h2 id="progressBoardTitle">本日の施術進捗</h2>
                <p>予約から完了までを横並びで確認します。詳細確認と次の状態への更新だけに絞った軽量ボードです。</p>
              </div>
              <div class="progress-board-summary" id="progressBoardSummary"></div>
            </div>
            <div class="progress-board-scroll">
              <div class="progress-board" id="progressBoard"></div>
            </div>
          </section>
          """
          text = replace_once(
              text,
              """    <section id="tabToday">
                <div class="grid">""",
              """    <section id="tabToday">
          """ + board_html + """      <div class="grid">""",
              "進捗ボードHTML",
          )

          board_js = r"""
          const progressBoardColumns = [
            {status:"reserved", label:"予約・来店待ち", nextStatus:"checked_in", nextLabel:"来店受付"},
            {status:"checked_in", label:"来店済み・施術待ち", nextStatus:"in_treatment", nextLabel:"施術開始"},
            {status:"in_treatment", label:"施術中", nextStatus:"waiting_payment", nextLabel:"会計待ちへ"},
            {status:"waiting_payment", label:"会計待ち", nextStatus:"completed", nextLabel:"完了"},
            {status:"completed", label:"完了", nextStatus:"", nextLabel:""}
          ];

          function boardNowMinutes(){
            const parts = new Intl.DateTimeFormat("ja-JP", {
              timeZone:"Asia/Tokyo",
              hour:"2-digit",
              minute:"2-digit",
              hour12:false
            }).formatToParts(new Date()).reduce((result, part) => {
              result[part.type] = part.value;
              return result;
            }, {});
            return Number(parts.hour || 0) * 60 + Number(parts.minute || 0);
          }

          function boardReservationTiming(r){
            const p = isoParts(r.start_at);
            const [hour, minute] = String(p.time || "00:00").split(":").map(Number);
            const startMinutes = (Number(hour) || 0) * 60 + (Number(minute) || 0);
            const diff = startMinutes - boardNowMinutes();
            const isActualToday = state.today === jstDate();

            if(r.status === "reserved" && isActualToday && diff < -5){
              return {className:"overdue", label:"予約時刻を経過"};
            }
            if(r.status === "reserved" && isActualToday && diff >= -5 && diff <= 30){
              return {className:"soon", label:diff <= 0 ? "来店確認" : `あと${diff}分`};
            }
            if(r.status === "checked_in"){
              return {className:"attention", label:"施術開始待ち"};
            }
            if(r.status === "in_treatment"){
              return {className:"active", label:"施術対応中"};
            }
            if(r.status === "waiting_payment"){
              return {className:"overdue", label:"会計対応"};
            }
            if(r.status === "completed"){
              return {className:"active", label:"対応完了"};
            }
            return {className:"", label:"予約確認"};
          }

          function progressBoardCardHtml(r, index, column){
            const p = isoParts(r.start_at);
            const timing = boardReservationTiming(r);
            return `
              <article class="progress-board-card ${escapeHtml(timing.className)}">
                <div class="progress-board-time">
                  <strong>${escapeHtml(p.time || "-")}</strong>
                  <span class="pill ${statusClass(r.status)}">${escapeHtml(statusLabel(r.status))}</span>
                </div>
                <div class="progress-board-customer">${escapeHtml(r.customer_name || "お客様")}</div>
                <div class="progress-board-meta">${escapeHtml(r.menu_name || "-")}</div>
                <div class="progress-board-meta">担当：${escapeHtml(r.staff_name || "指名なし")}</div>
                <span class="progress-board-alert ${escapeHtml(timing.className)}">${escapeHtml(timing.label)}</span>
                <div class="progress-board-actions">
                  <button class="mini" type="button" data-board-detail="${index}">詳細</button>
                  ${column.nextStatus
                    ? `<button class="mini primary" type="button" data-board-next="${index}:${escapeHtml(column.nextStatus)}">${escapeHtml(column.nextLabel)}</button>`
                    : `<button class="mini green" type="button" disabled>完了済み</button>`
                  }
                </div>
              </article>
            `;
          }

          function renderProgressBoard(rows){
            const board = $("progressBoard");
            const summary = $("progressBoardSummary");
            if(!board || !summary) return;

            const indexedRows = rows.map((reservation, index) => ({reservation, index}));
            const cancelledCount = indexedRows.filter(({reservation}) =>
              ["cancelled","no_show"].includes(reservation.status)
            ).length;
            const activeCount = indexedRows.filter(({reservation}) =>
              ["checked_in","in_treatment","waiting_payment"].includes(reservation.status)
            ).length;
            const waitingPaymentCount = indexedRows.filter(({reservation}) =>
              reservation.status === "waiting_payment"
            ).length;
            const completedCount = indexedRows.filter(({reservation}) =>
              reservation.status === "completed"
            ).length;

            summary.innerHTML = `
              <span class="progress-summary-pill">進行中 ${activeCount}件</span>
              <span class="progress-summary-pill ${waitingPaymentCount ? "attention" : ""}">会計待ち ${waitingPaymentCount}件</span>
              <span class="progress-summary-pill">完了 ${completedCount}件</span>
              <span class="progress-summary-pill">取消等 ${cancelledCount}件</span>
            `;

            board.innerHTML = progressBoardColumns.map(column => {
              const items = indexedRows
                .filter(({reservation}) => reservation.status === column.status)
                .sort((a,b) => new Date(a.reservation.start_at || 0) - new Date(b.reservation.start_at || 0));

              return `
                <section class="progress-column" data-board-status="${escapeHtml(column.status)}">
                  <header class="progress-column-head">
                    <div class="progress-column-title">${escapeHtml(column.label)}</div>
                    <span class="progress-column-count">${items.length}</span>
                  </header>
                  <div class="progress-column-list">
                    ${items.length
                      ? items.map(({reservation,index}) => progressBoardCardHtml(reservation,index,column)).join("")
                      : `<div class="progress-board-empty">現在、この段階の予約はありません。</div>`
                    }
                  </div>
                </section>
              `;
            }).join("");

            board.querySelectorAll("[data-board-detail]").forEach(button => {
              button.addEventListener("click", async () => {
                await openIntegratedVisit("day", Number(button.dataset.boardDetail));
              });
            });

            board.querySelectorAll("[data-board-next]").forEach(button => {
              button.addEventListener("click", () => {
                const [index, nextStatus] = button.dataset.boardNext.split(":");
                updateStatus("day", Number(index), nextStatus);
              });
            });
          }

          """
          text = replace_once(
              text,
              "function renderToday(){",
              board_js + "\nfunction renderToday(){",
              "進捗ボードJavaScript",
          )

          text = replace_once(
              text,
              """  $("todayList").innerHTML = rows.length
              ? rows.map((r,i)=>renderReservationCard(r,i,"day")).join("")
              : `<div class="notice">この日の予約はありません。</div>`;

            const followups =""",
              """  $("todayList").innerHTML = rows.length
              ? rows.map((r,i)=>renderReservationCard(r,i,"day")).join("")
              : `<div class="notice">この日の予約はありません。</div>`;

            renderProgressBoard(rows);

            const followups =""",
              "進捗ボード描画呼出し",
          )

          OWNER.write_text(text.rstrip() + "\n", encoding="utf-8")

          now = dt.datetime.now(dt.timezone(dt.timedelta(hours=9))).replace(microsecond=0)
          change_record = {
              "schema_version": 1,
              "system": "DPRO エステ LINE",
              "step": "ESTHE-NEXT-4",
              "completed_at_jst": now.isoformat(),
              "target_files": ["owner.html"],
              "features": {
                  "progress_board": True,
                  "columns": [
                      "reserved",
                      "checked_in",
                      "in_treatment",
                      "waiting_payment",
                      "completed",
