                  file.write("  api_changed: false\n")
          PY

      - name: "Final completion validation"
        shell: bash
        run: |
          set -Eeuo pipefail

          grep -q 'current_step: "ESTHE-NEXT-4-COMPLETE"' .dpro-next/esthe-step-state.yml
          grep -q 'next_step: "ESTHE-NEXT-5"' .dpro-next/esthe-step-state.yml
          grep -q '<!-- STEP ESTHE-NEXT-4 -->' owner.html
          grep -q 'id="progressBoard"' owner.html
          grep -q 'id="progressBoardSummary"' owner.html
          grep -q 'const progressBoardColumns' owner.html
          grep -q 'function renderProgressBoard' owner.html
          grep -q 'openIntegratedVisit("day"' owner.html
          grep -q 'updateStatus("day"' owner.html
          grep -q 'additional_initial_api_requests: 0' .dpro-next/esthe-step-state.yml

      - name: "Upload NEXT-4 validation artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "ESTHE-NEXT-4-validation-${{ github.run_id }}"
          path: |
            .next4_tmp/validation.json
            .dpro-next/esthe-next4-report.txt
            .dpro-next/esthe-next4-change-record.json
          if-no-files-found: warn
          retention-days: 30

      - name: "Commit changes, delete workflow and push"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail

          git add \
            owner.html \
            .dpro-next/esthe-step-state.yml \
            .dpro-next/esthe-current-baseline.yml \
            .dpro-next/esthe-next4-report.txt \
            .dpro-next/esthe-next4-change-record.json

          git rm --ignore-unmatch "$WORKFLOW_FILE"

          if git diff --cached --quiet; then
            echo "::error::Commit対象がありません。"
            exit 1
          fi

          git commit -m "DPRO ESTHE NEXT-4 complete: treatment progress board"
          git push origin "HEAD:${GITHUB_REF_NAME}"

          echo "### 自動Commit・Push" >> "$GITHUB_STEP_SUMMARY"
          echo "- 完了Commit: \`$(git rev-parse HEAD)\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- YML自身: 削除済み" >> "$GITHUB_STEP_SUMMARY"
          echo "- current_step: \`$CURRENT_STEP_AFTER_SUCCESS\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- next_step: \`$NEXT_STEP_AFTER_SUCCESS\`" >> "$GITHUB_STEP_SUMMARY"

      - name: "Confirm GitHub Pages publication"
        if: success()
        continue-on-error: true
        shell: bash
        run: |
          set -Eeuo pipefail

          PUBLISHED="false"
          for attempt in $(seq 1 24); do
            BODY="$(curl -L -sS --retry 2 --connect-timeout 8 --max-time 25 \
              -H "Cache-Control: no-cache" \
              "${PAGES_BASE}/owner.html?next4_check=${GITHUB_RUN_ID}_${attempt}" || true)"

            if [[ "$BODY" == *"STEP ESTHE-NEXT-4"* && "$BODY" == *'id="progressBoard"'* ]]; then
              PUBLISHED="true"
              break
            fi
            sleep 10
          done

          echo "### GitHub Pages公開確認" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$PUBLISHED" == "true" ]]; then
            echo "- 判定: **OK**" >> "$GITHUB_STEP_SUMMARY"
            echo "- owner.html 進捗ボード: 確認" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- 判定: **注意**" >> "$GITHUB_STEP_SUMMARY"
            echo "- Pages反映待ちの可能性があります。ソースCommitは完了しています。" >> "$GITHUB_STEP_SUMMARY"
          fi
