# DPRO エステ LINE
# STEP名: ESTHE-NEXT-10C-R2
#
# R2修正:
# - 初回YMLではadd_init_scriptへ関数文字列を渡したため、
#   sessionStorageへの管理コード設定が実行されなかった
# - system-checkを同一オリジンで開き、1234を保存確認後に再読込する
# - Worker system-check、店舗設定、電話番号正規化がOKの場合だけCOMPLETE
#
# 目的:
# - 本体、system-check、操作体験シート、製品サイトを最終再検査
# - 全STEP結果を完成台帳へ統合
# - current_stepを正式にCOMPLETEへ更新
#
# 対象リポジトリ:
# - dpromstk2000-lab/dpro-esthe-relax-line-liff
#
# 対象ファイル:
# - .dpro-next/esthe-step-state.yml
# - .dpro-next/esthe-current-baseline.yml
# - .dpro-next/esthe-final-completion.yml
# - .dpro-next/esthe-final-completion.json
# - .dpro-next/esthe-next-complete-report.txt
# - 最終検査JSON
#
# 前STEP:
# - 本体: ESTHE-NEXT-10A-R3-COMPLETE
# - 製品サイト: ESTHE-NEXT-10B-R4-COMPLETE
#
# 完成条件:
# - 全STEP完了
# - 静的検査NG 0
# - 公開system-check NG 0
# - 公開画面PASS
# - 製品サイトPASS
# - 操作体験シートA4縦1ページ
# - 公開PDF・PNG SHA256一致
# - PDF内QR 6 / 6 PASS
# - 販売可能・公開デモ可能・オーナー操作可能
#
# Worker変更: なし
# Supabase変更: なし
# API変更: なし
#
# 成功後:
# - current_step: COMPLETE
# - final_version: DPRO-ESTHE-NEXT-1.0.0
# - 自動Commit / Push
# - このYML自身を削除

name: "DPRO ESTHE NEXT-10C-R2 - Final COMPLETE Ledger"

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ESTHE-NEXT-10C-R2.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: "dpro-esthe-next"
  cancel-in-progress: false

env:
  WORKFLOW_FILE: ".github/workflows/ESTHE-NEXT-10C-R2.yml"
  BACKUP_TAG_PREFIX: "backup-esthe-before-next10c-r2-complete"
  FRONT_BASE: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff"
  API_BASE: "https://dpro-esthe-relax-line-api.dpromstk2000.workers.dev"
  PRODUCT_RAW_BASE: "https://raw.githubusercontent.com/dpromstk2000-lab/dpro-line-systems-site/main"
  PRODUCT_PAGE_URL: "https://dpromstk2000-lab.github.io/dpro-line-systems-site/systems/esthe.html"
  CATALOG_URL: "https://dpromstk2000-lab.github.io/dpro-line-systems-site/systems.html"
  BOOKING_URL: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff/index-brush.html"
  OWNER_URL: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff/owner.html"
  IPAD_URL: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff/owner-ipad.html"
  STAFF_URL: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff/staff.html"
  MEMBER_URL: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff/member.html?phone=08000003002"
  SYSTEM_CHECK_URL: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff/system-check.html"
  OPERATION_PDF_URL: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff/deliverables/esthe-next-10/DPRO_ESTHE_NEXT_operation_experience_sheet_20260724.pdf"
  OPERATION_PNG_URL: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff/deliverables/esthe-next-10/DPRO_ESTHE_NEXT_operation_experience_sheet_20260724.png"
  OFFICIAL_LINE_URL: "https://lin.ee/YxJGXV6D"

jobs:
  esthe-next-10c-r2:
    name: "Validate and write final COMPLETE ledger R2"
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: "Checkout ESTHE repository with history"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: "Configure Git identity"
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "DPRO NEXT Actions"
          git config user.email "actions@users.noreply.github.com"

      - name: "Confirm ESTHE source completion baseline"
        shell: bash
        run: |
          set -Eeuo pipefail
          test -f .dpro-next/esthe-step-state.yml
          test -f .dpro-next/esthe-current-baseline.yml
          test -f esthe-next9-static-report.json
          test -f deliverables/esthe-next-10/operation-sheet-validation.json
          test -f deliverables/esthe-next-10/operation-sheet-layout-r2-validation.json

          grep -q 'current_step: "ESTHE-NEXT-10A-R3-COMPLETE"' \
            .dpro-next/esthe-step-state.yml
          grep -q 'public_pdf_sha256_match: true' \
            .dpro-next/esthe-step-state.yml
          grep -q 'public_png_sha256_match: true' \
            .dpro-next/esthe-step-state.yml
          grep -q 'public_pdf_qr_decode_pass: true' \
            .dpro-next/esthe-step-state.yml

          for section in \
            next2_completion \
            next3_completion \
            next4_completion \
            next5_completion \
            next6_completion \
            next7_completion \
            next8_completion \
            next9_completion \
            next10a_r3_completion
          do
            grep -q "^${section}:" .dpro-next/esthe-current-baseline.yml
          done

      - name: "Confirm product-site NEXT-10B-R4 completion"
        shell: bash
        run: |
          set -Eeuo pipefail
          curl -L -sS --retry 3 --connect-timeout 10 --max-time 45 \
            -H "Cache-Control: no-cache, no-store, max-age=0" \
            "$PRODUCT_RAW_BASE/.dpro-next/esthe-next10b-r4.yml?run=$GITHUB_RUN_ID" \
            -o /tmp/esthe-next10c-product-r4.yml
          curl -L -sS --retry 3 --connect-timeout 10 --max-time 45 \
            -H "Cache-Control: no-cache, no-store, max-age=0" \
            "$PRODUCT_RAW_BASE/.dpro-next/esthe-next10b-r4.json?run=$GITHUB_RUN_ID" \
            -o /tmp/esthe-next10c-product-r4.json

          grep -q 'current_step: "ESTHE-NEXT-10B-R4-COMPLETE"' \
            /tmp/esthe-next10c-product-r4.yml
          grep -q 'next_step: "ESTHE-NEXT-10C-FINAL-COMPLETE"' \
            /tmp/esthe-next10c-product-r4.yml
          grep -q 'actual_horizontal_scroll: false' \
            /tmp/esthe-next10c-product-r4.yml
          grep -q 'formerly_failing_heading_within_viewport: true' \
            /tmp/esthe-next10c-product-r4.yml

          python3 - <<'PY'
          import json
          from pathlib import Path
          data=json.loads(Path("/tmp/esthe-next10c-product-r4.json").read_text(encoding="utf-8"))
          assert data["current_step"]=="ESTHE-NEXT-10B-R4-COMPLETE"
          assert data["result"]=="OK"
          validation=data["validation"]
          assert validation["static_ng"]==0
          assert validation["product_desktop_1440"] is True
          assert validation["product_mobile_390"] is True
          assert validation["product_mobile_360"] is True
          assert validation["catalog_desktop_1440"] is True
          assert validation["catalog_mobile_390"] is True
          assert validation["catalog_mobile_360"] is True
          assert validation["catalog_mobile_320"] is True
          assert validation["actual_horizontal_scroll"] is False
          assert validation["critical_content_within_viewport"] is True
          print("Product-site R4 completion: PASS")
          PY

      - name: "Create final change-before backup tag"
        shell: bash
        run: |
          set -Eeuo pipefail
          CHANGE_BEFORE_SHA="$GITHUB_SHA"
          mapfile -t HEAD_FILES < <(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          if [[ "${#HEAD_FILES[@]}" -eq 1 && "${HEAD_FILES[0]}" == "$WORKFLOW_FILE" ]]; then
            CHANGE_BEFORE_SHA="$(git rev-parse "${GITHUB_SHA}^")"
          fi

          BASE_TAG="${BACKUP_TAG_PREFIX}-$(TZ=Asia/Tokyo date +%Y%m%d)"
          BACKUP_TAG="$BASE_TAG"
          if git ls-remote --exit-code --tags origin "refs/tags/$BACKUP_TAG" >/dev/null 2>&1; then
            BACKUP_TAG="${BASE_TAG}-run-${GITHUB_RUN_ID}"
          fi

          git tag -a "$BACKUP_TAG" "$CHANGE_BEFORE_SHA" \
            -m "DPRO ESTHE before final COMPLETE: $CHANGE_BEFORE_SHA"
          git push origin "refs/tags/$BACKUP_TAG"

          echo "CHANGE_BEFORE_SHA=$CHANGE_BEFORE_SHA" >> "$GITHUB_ENV"
          echo "BACKUP_TAG=$BACKUP_TAG" >> "$GITHUB_ENV"

      - name: "Run final local syntax security and ledger validation"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-10C-static>","exec"))'
          ruby -e 'require "yaml"; YAML.parse_file(ARGV[0]); puts "workflow YML OK"' "$WORKFLOW_FILE"

      - name: "Verify Worker APIs and security guards"
        shell: bash
        run: |
          set -Eeuo pipefail

          HEALTH_CODE="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 45 \
            -o /tmp/esthe-next10c-health.json \
            -w "%{http_code}" \
            "$API_BASE/api/health?next10c=$GITHUB_RUN_ID")"
          [[ "$HEALTH_CODE" =~ ^2 ]] || {
            cat /tmp/esthe-next10c-health.json
            echo "::error::Worker health HTTP $HEALTH_CODE"
            exit 1
          }

          WRONG_CODE="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 45 \
            -H "Accept: application/json" \
            -H "x-admin-secret: DPRO-NEXT-WRONG-CODE" \
            -o /tmp/esthe-next10c-wrong-admin.json \
            -w "%{http_code}" \
            "$API_BASE/api/admin/system-check?next10c=$GITHUB_RUN_ID")"
          [[ "$WRONG_CODE" == "400" || "$WRONG_CODE" == "401" || "$WRONG_CODE" == "403" ]] || {
            cat /tmp/esthe-next10c-wrong-admin.json
            echo "::error::誤った管理コードが拒否されません HTTP $WRONG_CODE"
            exit 1
          }

          for item in \
            "system-check:/api/admin/system-check" \
            "settings:/api/admin/settings" \
            "phone:/api/admin/phone-normalize-check"
          do
            name="${item%%:*}"
            path="${item#*:}"
            code="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 60 \
              -H "Accept: application/json" \
              -H "x-admin-secret: 1234" \
              -o "/tmp/esthe-next10c-${name}.json" \
              -w "%{http_code}" \
              "$API_BASE${path}?next10c=$GITHUB_RUN_ID")"
            [[ "$code" =~ ^2 ]] || {
              cat "/tmp/esthe-next10c-${name}.json"
              echo "::error::$name HTTP $code"
              exit 1
            }
          done

          python3 - <<'PY'
          import json
          from pathlib import Path
          health=json.loads(Path("/tmp/esthe-next10c-health.json").read_text(encoding="utf-8"))
          system=json.loads(Path("/tmp/esthe-next10c-system-check.json").read_text(encoding="utf-8"))
          settings=json.loads(Path("/tmp/esthe-next10c-settings.json").read_text(encoding="utf-8"))
          phone=json.loads(Path("/tmp/esthe-next10c-phone.json").read_text(encoding="utf-8"))
          assert health.get("ok") is True
          assert system.get("ok") is not False
          assert settings.get("ok") is not False
          assert phone.get("ok") is True
          assert isinstance(phone.get("samples",[]),list)
          print("Worker / settings / phone normalization / wrong code: PASS")
          PY

      - name: "Wait for exact public operation-sheet PDF and PNG"
        shell: bash
        run: |
          set -Eeuo pipefail

          read -r EXPECTED_PDF_SHA EXPECTED_PNG_SHA < <(
            python3 - <<'PY'
          import json
          from pathlib import Path
          meta=json.loads(
              Path("deliverables/esthe-next-10/operation-sheet-validation.json")
              .read_text(encoding="utf-8")
          )
          print(meta["sha256"]["pdf"],meta["sha256"]["png"])
          PY
          )

          MATCHED="false"
          for attempt in $(seq 1 60); do
            KEY="${EXPECTED_PDF_SHA}-${GITHUB_RUN_ID}-${attempt}"
            PDF_CODE="$(curl -L -sS --compressed --retry 2 \
              --connect-timeout 8 --max-time 40 \
              -H "Cache-Control: no-cache, no-store, max-age=0" \
              -H "Pragma: no-cache" \
              -o /tmp/esthe-next10c-public.pdf \
              -w "%{http_code}" \
              "$OPERATION_PDF_URL?sha=$KEY" || true)"
            PNG_CODE="$(curl -L -sS --compressed --retry 2 \
              --connect-timeout 8 --max-time 40 \
              -H "Cache-Control: no-cache, no-store, max-age=0" \
              -H "Pragma: no-cache" \
              -o /tmp/esthe-next10c-public.png \
              -w "%{http_code}" \
              "$OPERATION_PNG_URL?sha=$KEY" || true)"

            PDF_SHA="$(sha256sum /tmp/esthe-next10c-public.pdf 2>/dev/null | awk '{print $1}' || true)"
            PNG_SHA="$(sha256sum /tmp/esthe-next10c-public.png 2>/dev/null | awk '{print $1}' || true)"

            if [[ "$PDF_CODE" == "200" \
              && "$PNG_CODE" == "200" \
              && "$PDF_SHA" == "$EXPECTED_PDF_SHA" \
              && "$PNG_SHA" == "$EXPECTED_PNG_SHA" ]]; then
              MATCHED="true"
              break
            fi
            sleep 10
          done

          [[ "$MATCHED" == "true" ]] || {
            echo "::error::操作体験シート公開SHA256不一致"
            exit 1
          }

      - name: "Install final PDF and browser validation dependencies"
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y libzbar0
          python3 -m pip install --upgrade pip
          python3 -m pip install \
            pillow pymupdf opencv-python-headless pyzbar playwright
          python3 -m playwright install --with-deps chromium

      - name: "Re-read all six QR codes from final public PDF"
        shell: bash
        env:
          PUBLIC_PDF_PATH: "/tmp/esthe-next10c-public.pdf"
          PUBLIC_PNG_PATH: "/tmp/esthe-next10c-public.png"
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-10C-qr>","exec"))'

      - name: "Run final public screens and system-check"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-10C-public>","exec"))'

      - name: "Write COMPLETE ledger and maintenance policy"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-10C-final>","exec"))'

          grep -q '^current_step: COMPLETE$' \
            .dpro-next/esthe-step-state.yml
          grep -q '^final_version: "DPRO-ESTHE-NEXT-1.0.0"$' \
            .dpro-next/esthe-step-state.yml
          grep -q '^current_step: COMPLETE$' \
            .dpro-next/esthe-final-completion.yml
          grep -q '^result: OK$' \
            .dpro-next/esthe-final-completion.yml
          grep -q 'qr_all_pass: true' \
            .dpro-next/esthe-final-completion.yml
          grep -q 'system_check_pass: true' \
            .dpro-next/esthe-final-completion.yml

          ruby -e 'require "yaml"; YAML.parse_file(ARGV[0]); puts "final ledger YML OK"' \
            .dpro-next/esthe-final-completion.yml
          ruby -e 'require "yaml"; YAML.parse_file(ARGV[0]); puts "state YML OK"' \
            .dpro-next/esthe-step-state.yml

      - name: "Upload final COMPLETE validation artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "ESTHE-NEXT-10C-R2-COMPLETE-${{ github.run_id }}"
          path: |
            .next10c-final-artifact/
            .dpro-next/esthe-next10c-static-validation.json
            .dpro-next/esthe-next10c-operation-sheet-validation.json
            .dpro-next/esthe-next10c-public-validation.json
            .dpro-next/esthe-final-completion.yml
            .dpro-next/esthe-final-completion.json
            .dpro-next/esthe-next-complete-report.txt
          if-no-files-found: warn
          retention-days: 90

      - name: "Commit COMPLETE ledger, delete workflow and push"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail

          git add \
            .dpro-next/esthe-step-state.yml \
            .dpro-next/esthe-current-baseline.yml \
            .dpro-next/esthe-next10c-static-validation.json \
            .dpro-next/esthe-next10c-operation-sheet-validation.json \
            .dpro-next/esthe-next10c-public-validation.json \
            .dpro-next/esthe-final-completion.yml \
            .dpro-next/esthe-final-completion.json \
            .dpro-next/esthe-next-complete-report.txt

          git rm --ignore-unmatch \
            "$WORKFLOW_FILE" \
            ".github/workflows/ESTHE-NEXT-10C.yml" \
            ".github/workflows/ESTHE-NEXT-10A.yml" \
            ".github/workflows/ESTHE-NEXT-10A-R2.yml" \
            ".github/workflows/ESTHE-NEXT-10A-R3.yml"

          git diff --cached --quiet && {
            echo "::error::最終Commit対象がありません"
            exit 1
          }

          git commit -m "DPRO ESTHE NEXT-10C-R2 COMPLETE: final version 1.0.0"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "FINAL_COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: "Confirm final COMPLETE ledger on GitHub and public URLs"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail

          RAW_COMPLETE="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_REF_NAME}/.dpro-next/esthe-final-completion.yml"
          COMPLETE_PUBLISHED="false"
          for attempt in $(seq 1 36); do
            BODY="$(curl -L -sS --retry 2 --connect-timeout 8 --max-time 35 \
              -H "Cache-Control: no-cache, no-store, max-age=0" \
              "$RAW_COMPLETE?final=${FINAL_COMMIT_SHA}_${attempt}" || true)"
            if [[ "$BODY" == *"current_step: COMPLETE"* \
              && "$BODY" == *'final_version: "DPRO-ESTHE-NEXT-1.0.0"'* \
              && "$BODY" == *"system_check_pass: true"* ]]; then
              COMPLETE_PUBLISHED="true"
              break
            fi
            sleep 10
          done
          [[ "$COMPLETE_PUBLISHED" == "true" ]] || {
            echo "::error::最終COMPLETE台帳を確認できません"
            exit 1
          }

          for url in \
            "$BOOKING_URL" \
            "$OWNER_URL" \
            "$IPAD_URL" \
            "$STAFF_URL" \
            "$MEMBER_URL" \
            "$SYSTEM_CHECK_URL" \
            "$PRODUCT_PAGE_URL" \
            "$CATALOG_URL" \
            "$OPERATION_PDF_URL" \
            "$OFFICIAL_LINE_URL"
          do
            code="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 50 \
              -o /dev/null -w "%{http_code}" "$url")"
            [[ "$code" =~ ^2|^3 ]] || {
              echo "::error::最終URL HTTP $code $url"
              exit 1
            }
          done

          echo "### DPRO エステ LINE / DPRO NEXT-10C-R2 COMPLETE" >> "$GITHUB_STEP_SUMMARY"
          echo "- current_step: **COMPLETE**" >> "$GITHUB_STEP_SUMMARY"
          echo "- final_version: **DPRO-ESTHE-NEXT-1.0.0**" >> "$GITHUB_STEP_SUMMARY"
          echo "- 全STEP: **PASS**" >> "$GITHUB_STEP_SUMMARY"
          echo "- system-check: **NG 0**" >> "$GITHUB_STEP_SUMMARY"
          echo "- 管理コードsessionStorage: **1234保存・再読込PASS**" >> "$GITHUB_STEP_SUMMARY"
          echo "- 操作体験シートQR: **6 / 6 PASS**" >> "$GITHUB_STEP_SUMMARY"
          echo "- 製品サイト: **公開PASS**" >> "$GITHUB_STEP_SUMMARY"
          echo "- 販売可能 / 公開デモ可能 / オーナー操作可能: **YES**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Worker / Supabase / API変更: **なし**" >> "$GITHUB_STEP_SUMMARY"
